<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
    <title>赏金集市 · 双向议价</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#f8fafc;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#0f172a;padding-bottom:70px}
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-track{background:#e2e8f0;border-radius:4px}
        ::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:4px}
        .app-container{max-width:500px;margin:0 auto;background:#f8fafc;min-height:100vh;position:relative;box-shadow:0 0 20px rgba(0,0,0,0.05)}
        .page{display:none;animation:fadeInUp .25s cubic-bezier(.2,.9,.4,1.1)}
        .page.active{display:block}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .nav-header{background:rgba(255,255,255,.96);backdrop-filter:blur(12px);padding:12px 18px;border-bottom:1px solid rgba(226,232,240,.6);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20}
        .logo{font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,#0f2b3d,#1e4a6b);background-clip:text;-webkit-background-clip:text;color:transparent}
        .header-balance{background:rgba(30,74,107,.1);padding:6px 14px;border-radius:40px;font-size:.75rem;font-weight:600;color:#1e4a6b;cursor:pointer;transition:all .2s}
        .header-balance:active{background:rgba(30,74,107,.2);transform:scale(.96)}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);display:flex;justify-content:space-around;padding:8px 20px 18px;border-top:1px solid rgba(226,232,240,.6);z-index:20}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:.7rem;color:#94a3b8;cursor:pointer;transition:all .2s;position:relative}
        .nav-item.active{color:#1e4a6b;font-weight:500;transform:translateY(-2px)}
        .nav-icon{font-size:1.5rem}
        .msg-badge{position:absolute;top:-5px;right:-12px;background:#ef4444;color:#fff;border-radius:20px;padding:2px 6px;font-size:.6rem;min-width:18px;text-align:center;display:none;font-weight:600}
        .card{background:#fff;border-radius:24px;padding:16px;margin:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.03),0 1px 2px rgba(0,0,0,.05);border:1px solid #eef2f8;transition:all .2s ease;cursor:pointer}
        .card:active{transform:scale(.98);box-shadow:0 1px 4px rgba(0,0,0,.05)}
        .skeleton-card{background:#fff;border-radius:24px;padding:16px;margin:12px 16px;border:1px solid #eef2f8;animation:pulse 1.2s infinite}
        @keyframes pulse{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
        .skeleton-title{height:20px;background:#e2e8f0;border-radius:12px;width:60%;margin-bottom:12px}
        .skeleton-desc{height:16px;background:#e2e8f0;border-radius:12px;width:90%;margin-bottom:8px}
        .skeleton-meta{height:14px;background:#e2e8f0;border-radius:12px;width:40%}
        .task-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin-bottom:8px}
        .task-title{font-size:1rem;font-weight:700;color:#0f172a}
        .reward-badge{background:linear-gradient(135deg,#fef3c7,#fde68a);padding:4px 10px;border-radius:40px;font-weight:700;font-size:.7rem;color:#b45309}
        .task-desc{font-size:.85rem;color:#475569;margin-bottom:8px;line-height:1.4}
        .task-meta{display:flex;gap:12px;font-size:.65rem;color:#6c7a91;flex-wrap:wrap}
        .distance-badge{background:#e6f7e6;color:#2b6e2f;padding:2px 10px;border-radius:20px;font-weight:500}
        .category-bar,.sort-bar{display:flex;gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid #eef2f8;overflow-x:auto;white-space:nowrap;scrollbar-width:thin}
        .category-chip,.sort-chip{background:#f1f5f9;padding:6px 16px;border-radius:40px;font-size:.8rem;font-weight:500;color:#475569;cursor:pointer;display:inline-block;transition:all .25s ease;opacity:.85}
        .category-chip.active,.sort-chip.active{background:linear-gradient(135deg,#1e4a6b,#0f2b3d);color:#fff;font-weight:700;opacity:1;box-shadow:0 4px 12px rgba(0,0,0,.2);transform:scale(1.02);position:relative}
        .category-chip.active::after,.sort-chip.active::after{content:'';position:absolute;bottom:-6px;left:25%;width:50%;height:3px;background:#fff;border-radius:3px;box-shadow:0 0 4px rgba(255,255,255,.5)}
        .detail-hero{background:linear-gradient(135deg,#1e4a6b,#0f2b3d);border-radius:28px;margin:16px 16px 0;padding:24px 20px;color:#fff;position:relative;overflow:hidden}
        .detail-hero::before{content:"💰";position:absolute;right:-20px;bottom:-20px;font-size:80px;opacity:.15}
        .detail-reward{font-size:1.8rem;font-weight:800;margin-top:8px}
        .detail-status{display:inline-block;padding:4px 12px;border-radius:40px;font-size:.65rem;font-weight:600;background:rgba(255,255,255,.2);backdrop-filter:blur(4px)}
        .info-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #eef2f8}
        .info-icon{width:32px;font-size:1.1rem;text-align:center}
        .info-label{font-size:.7rem;color:#64748b;margin-bottom:2px}
        .info-value{font-weight:600;color:#1e293b;cursor:pointer}
        .desc-section{background:#f9fafc;border-radius:20px;padding:16px;margin-top:16px}
        .form-group{margin-bottom:18px}
        .form-label{font-size:.85rem;font-weight:600;color:#1e293b;margin-bottom:6px;display:block}
        .form-input,.form-textarea,select.form-input{width:100%;padding:12px 16px;border-radius:24px;border:1px solid #e2e8f0;font-size:.9rem;outline:none;background:#fff;transition:all .2s}
        .form-input:focus,.form-textarea:focus{border-color:#1e4a6b;box-shadow:0 0 0 3px rgba(30,74,107,.1)}
        .btn-primary{background:linear-gradient(95deg,#059669,#047857);border:none;border-radius:60px;padding:14px;font-weight:600;color:#fff;width:100%;text-align:center;cursor:pointer;font-size:1rem;transition:all .2s;box-shadow:0 2px 6px rgba(5,150,105,.2)}
        .btn-primary:active{transform:scale(.97);box-shadow:0 1px 3px rgba(5,150,105,.2)}
        .btn-primary:disabled{opacity:.6;transform:none;cursor:not-allowed}
        .btn-secondary{background:#f1f5f9;color:#1e4a6b;border-radius:60px;padding:12px;font-weight:600;border:none;width:100%;cursor:pointer;transition:all .2s}
        .btn-secondary:active{background:#e2e8f0;transform:scale(.98)}
        .btn-danger{background:#fee2e2;color:#b91c1c;border-radius:60px;padding:8px 16px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
        .btn-danger:active{background:#fecaca;transform:scale(.96)}
        .btn-phone,.btn-nav,.btn-location{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:60px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
        .btn-phone{background:#10b981;color:#fff}
        .btn-nav{background:#3b82f6;color:#fff}
        .btn-location{background:#eef2ff;color:#1e4a6b}
        .btn-phone:active,.btn-nav:active,.btn-location:active{transform:scale(.96)}
        .slide-confirm,.slide-action{margin:16px 0;user-select:none}
        .slide-track{position:relative;width:100%;height:52px;background:#eef2ff;border-radius:60px;overflow:hidden;border:1px solid #cbd5e1;touch-action:none}
        .slide-thumb{position:absolute;left:0;top:0;width:70px;height:52px;background:linear-gradient(135deg,#1e4a6b,#0f2b3d);border-radius:60px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.8rem;touch-action:none;transition:none;box-shadow:0 2px 8px rgba(0,0,0,.2)}
        .slide-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#1e4a6b;pointer-events:none;font-size:.9rem;gap:8px;z-index:1;text-align:center}
        .slide-confirm.completed .slide-track,.slide-action.completed .slide-track{background:#d1fae5;border-color:#059669}
        .countdown-timer{background:#fef3c7;border-radius:60px;padding:10px 16px;text-align:center;margin:16px 0;font-weight:700;color:#b45309;display:flex;align-items:center;justify-content:center;gap:8px}
        .countdown-timer.warning{background:#fee2e2;color:#dc2626;animation:pulseWarning 1s infinite}
        @keyframes pulseWarning{0%,100%{opacity:1}50%{opacity:.7}}
        .custom-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000}
        .custom-modal-content{background:#fff;border-radius:32px;width:85%;max-width:320px;padding:24px;text-align:center;box-shadow:0 20px 35px -12px rgba(0,0,0,.3)}
        .custom-modal-content h3{margin-bottom:12px;font-size:1.25rem}
        .custom-modal-buttons{display:flex;gap:12px;margin-top:24px;justify-content:center}
        .custom-modal-buttons button{flex:1;padding:10px;border-radius:40px;border:none;font-weight:600;cursor:pointer}
        .confirm-btn{background:#1e4a6b;color:#fff}
        .cancel-btn{background:#e2e8f0;color:#1e293b}
        .toast-message{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:8px 20px;border-radius:60px;font-size:.85rem;z-index:1100;pointer-events:none;animation:fadeOut 2s forwards;backdrop-filter:blur(8px)}
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
        .chat-container{display:flex;flex-direction:column;height:calc(100vh - 120px);background:#f8fafc}
        .chat-header-bar{background:rgba(255,255,255,.96);backdrop-filter:blur(12px);padding:12px 16px;border-bottom:1px solid #eef2f8;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}
        .chat-back-btn{background:#f1f5f9;border:none;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all .2s}
        .chat-back-btn:active{background:#e2e8f0;transform:scale(.94)}
        .chat-header-name{font-weight:700;font-size:1rem;flex:1}
        .chat-messages-area{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
        .chat-bubble{max-width:80%;display:flex;flex-direction:column;cursor:pointer;transition:background .1s}
        .chat-bubble:active{background:rgba(0,0,0,.03);border-radius:16px}
        .chat-bubble-mine{align-self:flex-end}
        .chat-bubble-other{align-self:flex-start}
        .bubble-text{padding:10px 16px;border-radius:20px;font-size:.85rem;line-height:1.4;word-break:break-word;background:#fff;border:1px solid #e2e8f0;border-bottom-left-radius:4px}
        .chat-bubble-mine .bubble-text{background:#1e4a6b;color:#fff;border-bottom-right-radius:4px;border:none}
        .bubble-image{max-width:100%;border-radius:16px;margin-top:4px;display:block;cursor:zoom-in}
        .bubble-image-wrapper{background:transparent;border:none}
        .bubble-audio{max-width:100%;margin-top:4px;border-radius:16px;display:block}
        .bubble-time{font-size:.6rem;color:#94a3b8;margin-top:4px;margin-left:10px;margin-right:10px}
        .chat-bubble-mine .bubble-time{text-align:right}
        .chat-input-wrapper{background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid #eef2f8;padding:12px 16px;border-radius:24px 24px 0 0}
        .chat-action-row{display:flex;gap:6px;align-items:center;flex-wrap:nowrap}
        .chat-message-input{flex:1;min-width:0;padding:10px 16px;border-radius:40px;border:1px solid #e2e8f0;background:#fff;font-size:.9rem;transition:all .2s}
        .chat-message-input.recording{background:#fee2e2;border-color:#ef4444}
        .send-btn{background:#1e4a6b;border:none;border-radius:40px;padding:10px 16px;font-weight:600;color:#fff;flex-shrink:0}
        .chat-icon-btn{background:transparent;border:none;font-size:1.3rem;cursor:pointer;padding:4px 6px;border-radius:40px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
        .chat-icon-btn:active{background:rgba(0,0,0,.05);transform:scale(.95)}
        .chat-icon-btn svg{width:22px;height:22px;fill:currentColor}
        /* 新增 + 号面板样式 */
        .chat-plus-panel {
            display: none;
            padding: 8px 4px 4px 4px;
            gap: 10px;
            flex-wrap: wrap;
            border-top: 1px solid #eef2f8;
            margin-top: 6px;
            background: #fff;
            border-radius: 12px;
        }
        .chat-plus-panel.show {
            display: flex;
        }
        .plus-item {
            background: #f1f5f9;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .plus-item:active {
            background: #e2e8f0;
            transform: scale(0.96);
        }
        /* 原其他样式保留 */
        .nego-send-btn{background:#f59e0b;border:none;border-radius:40px;padding:6px 16px;font-weight:600;color:#fff;cursor:pointer}
        .profile-header{background:linear-gradient(135deg,#1e4a6b,#0f2b3d);border-radius:28px;margin:16px;padding:20px;color:#fff;display:flex;align-items:center;gap:16px;cursor:pointer}
        .profile-avatar{width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:600;overflow:hidden}
        .profile-name{font-weight:700;font-size:1.1rem}
        .profile-signature{font-size:.75rem;opacity:.8}
        .stats-row{display:flex;background:#fff;margin:0 16px 16px;border-radius:28px;padding:14px;justify-content:space-around;box-shadow:0 2px 6px rgba(0,0,0,.03);cursor:pointer}
        .stat-item{text-align:center;flex:1;cursor:pointer;transition:all .2s}
        .stat-item:active{transform:scale(.96)}
        .stat-number{font-size:1.2rem;font-weight:800;color:#1e4a6b}
        .profile-collapse{background:#fff;border-radius:24px;margin:12px 16px;overflow:hidden;border:1px solid #eef2f8}
        .collapse-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#fff;cursor:pointer}
        .collapse-header:active{background:#f8fafc}
        .collapse-title{font-weight:700;font-size:.9rem}
        .collapse-icon{font-size:1rem;transition:transform .2s}
        .collapse-icon.open{transform:rotate(90deg)}
        .collapse-content{display:none;padding:0 16px 16px;border-top:1px solid #eef2f8}
        .collapse-content.show{display:block}
        .profile-task-item{padding:12px 0;border-bottom:1px solid #eef2f8;cursor:pointer}
        .profile-task-item:last-child{border-bottom:none}
        .profile-task-status{font-size:.65rem;display:inline-block;margin-left:8px;padding:2px 8px;border-radius:20px;background:#f1f5f9;color:#475569}
        .profile-task-status.available{background:#d1fae5;color:#065f46}
        .profile-task-status.ongoing{background:#fed7aa;color:#9a3412}
        .profile-task-status.completed{background:#e2e8f0;color:#334155}
        .profile-task-status.cancelled{background:#fee2e2;color:#b91c1c}
        .logout-btn{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:60px;padding:14px;font-weight:600;width:calc(100% - 32px);margin:16px;cursor:pointer;transition:all .2s}
        .logout-btn:active{transform:scale(.97)}
        .image-preview-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
        .image-preview-modal img{max-width:90%;max-height:90%;object-fit:contain}
        .close-preview{position:absolute;top:20px;right:20px;color:#fff;font-size:2rem;background:rgba(0,0,0,.5);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .empty-state{text-align:center;padding:40px 20px;color:#94a3b8}
        .loading{text-align:center;padding:40px;color:#94a3b8}
        .flex-between{display:flex;justify-content:space-between;align-items:center}
        .text-center{text-align:center}
        .mt-2{margin-top:8px}
        .image-preview-grid{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
        .preview-img-wrapper{position:relative;width:80px;height:80px;border-radius:16px;overflow:hidden;background:#f1f5f9;border:1px solid #e2e8f0}
        .preview-img-wrapper img,.preview-img-wrapper video{width:100%;height:100%;object-fit:cover}
        .remove-img-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px}
        .upload-btn{background:#f1f5f9;border:1px dashed #cbd5e1;border-radius:20px;padding:12px;text-align:center;cursor:pointer;margin-top:8px;font-size:.85rem;transition:all .2s}
        .upload-btn:active{background:#e2e8f0}
        .progress-steps{display:flex;justify-content:space-between;margin:20px 0;position:relative}
        .progress-steps::before{content:'';position:absolute;top:24px;left:10%;right:10%;height:2px;background:#e2e8f0;z-index:0}
        .step{text-align:center;flex:1;position:relative;z-index:1;background:#fff;border-radius:40px;padding:6px 4px}
        .step-dot{width:36px;height:36px;background:#fff;border:2px solid #cbd5e1;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:1rem;background:#f1f5f9}
        .step.active .step-dot{background:#1e4a6b;border-color:#1e4a6b;color:#fff}
        .step.completed .step-dot{background:#059669;border-color:#059669;color:#fff}
        .task-card-in-chat{background:#f8fafc;border-radius:20px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e2e8f0}
        .chat-refresh-indicator{text-align:center;padding:10px;font-size:.75rem;color:#64748b}
        .network-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#ffc107;padding:6px 14px;border-radius:40px;font-size:.7rem;z-index:2000;white-space:nowrap}
        .rating-section{background:#fff;border-radius:24px;padding:16px;margin:12px 16px;border:1px solid #eef2f8}
        .rating-buttons{display:flex;gap:12px;justify-content:center;margin:8px 0}
        .rating-buttons button{padding:8px 24px;border-radius:40px;border:none;font-weight:600;cursor:pointer;transition:all .2s}
        .rating-buttons button:active{transform:scale(.96)}
        .rating-buttons .btn-good{background:#d1fae5;color:#065f46}
        .rating-buttons .btn-bad{background:#fee2e2;color:#b91c1c}
        .rating-buttons .btn-good.selected{background:#059669;color:#fff}
        .rating-buttons .btn-bad.selected{background:#dc2626;color:#fff}
        .rating-comment{width:100%;padding:8px 12px;border-radius:20px;border:1px solid #e2e8f0;margin-top:8px;font-size:.9rem}
        .rating-submit{margin-top:12px;padding:10px;background:#1e4a6b;color:#fff;border:none;border-radius:40px;font-weight:600;width:100%;cursor:pointer}
        .rating-submit:disabled{opacity:.5;cursor:not-allowed}
        .already-rated{text-align:center;color:#64748b;padding:12px}
        .prompt-input{width:100%;padding:10px;border-radius:20px;border:1px solid #e2e8f0;margin:12px 0;font-size:1rem}
        .contact-row{display:flex;gap:12px;margin:8px 16px}
        .contact-row .btn{flex:1;min-width:0;padding:10px 8px;font-size:.85rem;text-align:center}
        .pull-refresh-container{text-align:center;padding:10px 0;color:#94a3b8;font-size:.8rem;position:relative;transition:transform .2s}
        .audio-player{max-width:100%;margin-top:4px;border-radius:16px}
        .voice-call-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
        .voice-call-modal .avatar{font-size:4rem;background:rgba(255,255,255,.1);border-radius:50%;width:100px;height:100px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
        .voice-call-modal .name{font-size:1.5rem;font-weight:600;margin-bottom:8px}
        .voice-call-modal .status{font-size:.9rem;opacity:.7;margin-bottom:30px}
        .voice-call-modal .hangup-btn{background:#ef4444;border:none;border-radius:50%;width:64px;height:64px;font-size:2rem;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .voice-call-modal .hangup-btn:active{transform:scale(.9)}
        .withdraw-btn-sm{padding:4px 12px;font-size:.7rem;border-radius:20px;background:#1e4a6b;color:#fff;border:none;cursor:pointer}
        .wallet-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px}
        .wallet-modal-content{background:#fff;border-radius:32px;width:100%;max-width:420px;max-height:90vh;padding:24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .wallet-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}

<script>
    // ==================== API 地址 ====================
    const getApiBase = () => {
        if (window.Capacitor && window.Capacitor.isNativePlatform()) return 'https://bounty-app-production.up.railway.app/api';
        return '/api';
    };
    const API_BASE = getApiBase();

    let currentUser = null, pendingMedia = [], userLocation = null, allTasks = [], currentCategory = 'all', currentSort = 'time', countdownTimer = null, lastPage = null;
    let chatState = { active: false, taskId: null, otherId: null, otherName: '', reward: 0, title: '', pollInterval: null, messagesArea: null, lastMessageCount: 0 };
    let geocodeCache = new Map();
    let deletedConversations = new Set();
    let tasksCache = { data: null, timestamp: 0, ttl: 5 * 60 * 1000 };
    let refreshThrottle = false, networkToast = null;
    let mediaRecorder = null, audioChunks = [], isRecording = false;
    let longPressTimer = null;

    function showNetworkSlow() {
        if (networkToast) return;
        networkToast = document.createElement('div');
        networkToast.className = 'network-toast';
        networkToast.innerText = '⚠️ 网络较慢，请稍候...';
        document.body.appendChild(networkToast);
        setTimeout(() => { if (networkToast) networkToast.remove(); networkToast = null; }, 3000);
    }

    async function fetchWithTimeout(url, options = {}, timeout = 10000, retries = 1) {
        let lastError;
        for (let i = 0; i <= retries; i++) {
            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response;
            } catch (err) {
                lastError = err;
                if (err.name === 'AbortError') {
                    console.warn(`请求超时 (${timeout}ms)，第 ${i+1} 次重试`);
                    if (i < retries) await new Promise(r => setTimeout(r, 1000));
                    continue;
                }
                if (i < retries) { await new Promise(r => setTimeout(r, 1000)); showNetworkSlow(); }
            }
        }
        throw lastError;
    }

    async function callApi(url, options = {}) {
        const fullUrl = API_BASE + url;
        const token = localStorage.getItem('token');
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        try {
            const res = await fetchWithTimeout(fullUrl, { ...options, headers }, 15000, 1);
            if (res.status === 401) {
                localStorage.removeItem('token'); localStorage.removeItem('user');
                currentUser = null;
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('loginPage').classList.add('active');
                showAlert('登录已过期', '请重新登录');
                throw new Error('Unauthorized');
            }
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
            return data;
        } catch (err) {
            console.error('[API错误]', err);
            if (err.name === 'AbortError') { showToast('请求超时，请检查网络后重试'); throw new Error('请求超时'); }
            showNetworkSlow();
            throw err;
        }
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        const fullUrl = API_BASE + '/upload';
        const token = localStorage.getItem('token');
        const res = await fetch(fullUrl, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        if (!res.ok) throw new Error('上传失败');
        const data = await res.json();
        return data.url;
    }

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function calculateDistance(lat1,lng1,lat2,lng2) {
        const R=6371; const dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
        const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
        const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return (R*c).toFixed(1);
    }

    async function geocodeAddress(address) {
        if (!address) return null;
        if (geocodeCache.has(address)) return geocodeCache.get(address);
        try {
            const result = await callApi('/geocode', { method: 'POST', body: JSON.stringify({ address }) });
            if (result && result.lat && result.lng) { geocodeCache.set(address, result); return result; }
            return null;
        } catch(e) { console.error('地理编码失败', e); return null; }
    }

    async function enrichTasksWithDistance(tasks) {
        if (!userLocation) return tasks;
        const enriched = [];
        for(let task of tasks){
            if(!task.locationAddress){ enriched.push({...task,distance:null}); continue; }
            const coords = await geocodeAddress(task.locationAddress);
            const distance = coords ? calculateDistance(userLocation.lat, userLocation.lng, coords.lat, coords.lng) : null;
            enriched.push({...task, distance});
        }
        return enriched;
    }

    async function getNativeUserLocation() {
        if (window.Capacitor && window.Capacitor.isNativePlatform()) {
            try {
                const { Geolocation } = Capacitor.Plugins;
                let permission = await Geolocation.checkPermissions();
                if (permission.location !== 'granted') {
                    permission = await Geolocation.requestPermissions();
                    if (permission.location !== 'granted') return null;
                }
                const position = await Geolocation.getCurrentPosition({ timeout: 15000, enableHighAccuracy: true });
                return { lat: position.coords.latitude, lng: position.coords.longitude };
            } catch(err) { return null; }
        } else {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    () => resolve(null),
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            });
        }
    }

    function showToast(msg, duration=2000) {
        let toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    function showAlert(title, message) {
        let modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `<div class="custom-modal-content"><h3>${escapeHtml(title)}</h3><p>${escapeHtml(message)}</p><div class="custom-modal-buttons"><button class="confirm-btn">知道了</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.confirm-btn').onclick = () => modal.remove();
    }
    function showConfirm(title, message, onConfirm, onCancel) {
        let modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `<div class="custom-modal-content"><h3>${escapeHtml(title)}</h3><p>${escapeHtml(message)}</p><div class="custom-modal-buttons"><button class="confirm-btn">确定</button><button class="cancel-btn">取消</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.confirm-btn').onclick = () => { modal.remove(); if(onConfirm) onConfirm(); };
        modal.querySelector('.cancel-btn').onclick = () => { modal.remove(); if(onCancel) onCancel(); };
    }
    function showPrompt(title, placeholder, callback) {
        const modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `
            <div class="custom-modal-content">
                <h3>${escapeHtml(title)}</h3>
                <input type="number" id="promptInput" class="prompt-input" placeholder="${escapeHtml(placeholder)}" step="1" min="1">
                <div class="custom-modal-buttons">
                    <button class="confirm-btn" id="promptOk">确定</button>
                    <button class="cancel-btn" id="promptCancel">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const input = modal.querySelector('#promptInput');
        const ok = modal.querySelector('#promptOk');
        const cancel = modal.querySelector('#promptCancel');
        const cleanup = () => modal.remove();
        ok.onclick = () => {
            const val = parseFloat(input.value);
            if (!isNaN(val) && val > 0) {
                cleanup();
                callback(val);
            } else {
                showAlert('提示', '请输入有效的金额');
            }
        };
        cancel.onclick = cleanup;
        input.focus();
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') ok.click(); });
    }
    window.alert = function(msg){ showAlert('提示',msg); };
    window.confirm = function(msg,onOk,onCancel){ showConfirm('确认',msg,onOk,onCancel); return true; };

    async function getDetailedAddress(lat, lng) {
        try {
            const res = await callApi('/regeo', { method: 'POST', body: JSON.stringify({ lat, lng }) });
            return res.address;
        } catch (e) { return `${lat.toFixed(6)}, ${lng.toFixed(6)}`; }
    }

    async function getPreciseLocationNative() {
        showToast('正在获取精确位置...', 3000);
        if (window.Capacitor && window.Capacitor.isNativePlatform()) {
            try {
                const { Geolocation } = Capacitor.Plugins;
                let permission = await Geolocation.checkPermissions();
                if (permission.location !== 'granted') {
                    permission = await Geolocation.requestPermissions();
                    if (permission.location !== 'granted') return null;
                }
                const position = await Geolocation.getCurrentPosition({ timeout: 15000, enableHighAccuracy: true });
                return await getDetailedAddress(position.coords.latitude, position.coords.longitude);
            } catch(e) { return null; }
        } else {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const address = await getDetailedAddress(pos.coords.latitude, pos.coords.longitude);
                    resolve(address);
                }, () => resolve(null), { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
            });
        }
    }

    window.getCurrentLocation = async function() {
        if (!navigator.geolocation && !(window.Capacitor && window.Capacitor.isNativePlatform())) {
            showAlert('提示','设备不支持定位'); return;
        }
        const addressInput = document.getElementById('pubAddress');
        const originalPlaceholder = addressInput.placeholder;
        addressInput.placeholder = '定位中...';
        addressInput.disabled = true;
        const address = await getPreciseLocationNative();
        addressInput.disabled = false;
        addressInput.placeholder = originalPlaceholder;
        if (address) {
            addressInput.value = address;
            const hint = document.getElementById('locationHint');
            if (hint) {
                hint.innerHTML = '✅ 已定位到详细地址';
                setTimeout(() => { hint.innerHTML = '点击定位自动填入详细地址'; }, 3000);
            }
            showToast('定位成功');
        } else {
            showAlert('定位失败', '请手动输入地点或检查权限');
        }
    };

    async function navigateTo(lat, lng, address) {
        const destName = encodeURIComponent(address || '目的地');
        let url = '';
        if (/iphone|ipad|ipod/i.test(navigator.userAgent)) {
            url = `iosamap://navi?sourceApplication=赏金集市&poiname=${destName}&lat=${lat}&lon=${lng}&dev=0&style=2`;
        } else if (/android/i.test(navigator.userAgent)) {
            url = `androidamap://navi?sourceApplication=赏金集市&poiname=${destName}&lat=${lat}&lon=${lng}&dev=0&style=2`;
        } else {
            url = `https://uri.amap.com/navigation?to=${lng},${lat},${destName}&mode=car&callnative=1`;
        }
        window.location.href = url;
        setTimeout(() => {
            if (document.hasFocus()) {
                window.location.href = `https://uri.amap.com/navigation?to=${lng},${lat},${destName}&mode=car&callnative=1`;
            }
        }, 2500);
    }

    function showImagePreview(url) {
        const modal = document.createElement('div');
        modal.className = 'image-preview-modal';
        modal.innerHTML = `<div class="close-preview">✕</div><img src="${url}">`;
        document.body.appendChild(modal);
        modal.querySelector('.close-preview').onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

    function compressImage(file, quality=0.5, maxWidth=600, maxHeight=600) {
        return new Promise((resolve,reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width, height = img.height;
                    if(width > height) {
                        if(width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                    } else {
                        if(height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                    }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    resolve(dataUrl);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }
    async function handleMediaFiles(files) {
        let remain = 3 - pendingMedia.length;
        if(files.length > remain) {
            showAlert('提示', `最多上传3个，当前已有${pendingMedia.length}个`);
            files = Array.from(files).slice(0, remain);
        }
        for(let file of files) {
            if(!file.type.startsWith('image/') && !file.type.startsWith('video/')) continue;
            let dataURL;
            if(file.type.startsWith('image/')) {
                dataURL = await compressImage(file);
            } else {
                dataURL = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }
            pendingMedia.push({type: file.type.startsWith('image/')?'image':'video', dataURL, file});
            updateMediaPreview();
        }
        document.getElementById('mediaInput').value = '';
    }
    function updateMediaPreview() {
        const container = document.getElementById('mediaPreview');
        if(!container) return;
        if(pendingMedia.length === 0) { container.innerHTML = ''; return; }
        container.innerHTML = pendingMedia.map((m,idx) => `
            <div class="preview-img-wrapper">
                ${m.type==='image' ? `<img src="${m.dataURL}">` : `<video src="${m.dataURL}" style="width:100%;height:100%;object-fit:cover;"></video>`}
                <div class="remove-img-btn" data-index="${idx}">✕</div>
            </div>
        `).join('');
        document.querySelectorAll('#mediaPreview .remove-img-btn').forEach(btn => {
            btn.onclick = (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                pendingMedia.splice(idx,1);
                updateMediaPreview();
            };
        });
    }

    const categoryMap = {'取件':['取件','快递','包裹','取货'],'调试':['调试','bug','修复','代码','前端','后端','程序'],'跑腿':['跑腿','送','买','代购','排队']};
    function getTaskCategory(title) {
        const lower = title.toLowerCase();
        for(let [cat,keywords] of Object.entries(categoryMap))
            if(keywords.some(kw=>lower.includes(kw))) return cat;
        return '其他';
    }

    // ==================== 首页 ====================
    async function refreshTaskList(force = false) {
        if (refreshThrottle) return;
        refreshThrottle = true;
        setTimeout(() => { refreshThrottle = false; }, 1000);
        const container = document.getElementById('homeContent');
        if (!force && tasksCache.data && (Date.now() - tasksCache.timestamp) < tasksCache.ttl) {
            allTasks = tasksCache.data;
            applyFilterAndSort();
            return;
        }
        container.innerHTML = '<div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div><div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div>';
        try {
            const tasks = await callApi('/tasks');
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ 暂无悬赏任务</div>';
                tasksCache.data = []; tasksCache.timestamp = Date.now(); allTasks = [];
                applyFilterAndSort(); return;
            }
            let tasksWithCat = tasks.map(t => ({ ...t, category: getTaskCategory(t.title) }));
            if (userLocation) tasksWithCat = await enrichTasksWithDistance(tasksWithCat);
            allTasks = tasksWithCat;
            tasksCache.data = tasksWithCat;
            tasksCache.timestamp = Date.now();
            applyFilterAndSort();

            container.innerHTML = '<div class="empty-state">加载失败，请下拉刷新</div>';
        }
    }

    function initSlide(container, onComplete) {
        const track = container.querySelector('.slide-track');
        const thumb = container.querySelector('.slide-thumb');
        if (!track || !thumb) return;
        if (track.clientWidth===0 || thumb.clientWidth===0) { setTimeout(()=>initSlide(container,onComplete),100); return; }
        let startX=0, isDragging=false;
        const maxLeft = track.clientWidth - thumb.clientWidth;
        function setTransform(x) { thumb.style.transform = `translateX(${x}px)`; }
        function onMove(clientX) {
            if(!isDragging) return;
            let delta = clientX - startX;
            let newLeft = Math.min(maxLeft, Math.max(0, delta));
            setTransform(newLeft);
            if(newLeft >= maxLeft-5) {
                isDragging=false; container.classList.add('completed'); setTransform(maxLeft);
                document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp);
                document.removeEventListener('touchmove',onTouchMove); document.removeEventListener('touchend',onTouchEnd);
                if(onComplete) onComplete();
            }
        }
        function onMouseMove(e) { onMove(e.clientX); }
        function onMouseUp() { isDragging=false; setTransform(0); document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp); container.classList.remove('completed'); }
        function onTouchMove(e) { onMove(e.touches[0].clientX); e.preventDefault(); }
        function onTouchEnd() { isDragging=false; setTransform(0); document.removeEventListener('touchmove',onTouchMove); document.removeEventListener('touchend',onTouchEnd); container.classList.remove('completed'); }
        function onStart(clientX) { startX=clientX; isDragging=true; document.addEventListener('mousemove',onMouseMove); document.addEventListener('mouseup',onMouseUp); document.addEventListener('touchmove',onTouchMove); document.addEventListener('touchend',onTouchEnd); }
        thumb.addEventListener('mousedown',(e)=>{ e.preventDefault(); onStart(e.clientX); });
        thumb.addEventListener('touchstart',(e)=>{ e.preventDefault(); onStart(e.touches[0].clientX); });
        container.classList.remove('completed'); setTransform(0);
    }

    function startCountdown(estimatedMinutes, startTimestamp) {
        if(countdownTimer) clearInterval(countdownTimer);
        const countdownDiv = document.getElementById('countdownDisplay');
        if(!countdownDiv) return;
        const update = () => {
            const elapsed = (Date.now() - startTimestamp) / 1000;
            const remaining = Math.max(0, estimatedMinutes * 60 - elapsed);
            const mins = Math.floor(remaining / 60);
            const secs = Math.floor(remaining % 60);
            if(remaining <= 0) {
                countdownDiv.innerHTML = '⏰ 预计已到达！请滑动确认到达';
                countdownDiv.classList.add('warning');
                clearInterval(countdownTimer);
                countdownTimer = null;
            } else {
                countdownDiv.innerHTML = `🚗 预计剩余时间: ${mins}分${secs.toString().padStart(2,'0')}秒`;
                if(remaining < 60) countdownDiv.classList.add('warning');
                else countdownDiv.classList.remove('warning');
            }
        };
        update();
        countdownTimer = setInterval(update, 1000);
    }

    function renderProgressSteps(task) {
        if(!task.takerId) return '';
        let activeIndex=0;
        if(task.status==='ongoing'){
            if(task.travelStatus==='idle') activeIndex=1;
            else if(task.travelStatus==='traveling') activeIndex=2;
            else if(task.travelStatus==='arrived') activeIndex=3;
            if(task.takerCompleted) activeIndex=4;
        }else if(task.status==='completed') activeIndex=5;
        const steps = [{icon:'📋',label:'已接取'},{icon:'🚗',label:'出发'},{icon:'📍',label:'到达'},{icon:'📎',label:'提交凭证'},{icon:'✅',label:'结算'}];
        let html='<div class="progress-steps">';
        steps.forEach((step,idx)=>{
            const stepNum=idx+1;
            let statusClass='';
            if(stepNum<activeIndex) statusClass='completed';
            else if(stepNum===activeIndex) statusClass='active';
            html+=`<div class="step ${statusClass}"><div class="step-dot">${step.icon}</div><div class="step-label">${step.label}</div></div>`;
        });
        html+='</div>';
        return html;
    }

    async function requestMicrophonePermission() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            return true;
        } catch (err) {
            return false;
        }
    }

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const file = new File([audioBlob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                try {
                    showToast('上传语音中...', 1500);
                    const url = await uploadFile(file);
                    await sendMessage(chatState.taskId, `[audio]${url}[/audio]`, false);
                    await refreshMessagesOnly();
                    updateUnreadBadge();
                } catch (err) {
                    showAlert('发送语音失败', err.message);
                }
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
        } catch (err) {
            let msg = '无法访问麦克风，请检查浏览器权限或在 HTTPS 环境下使用';
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                msg = '麦克风权限被拒绝，请在浏览器设置中允许访问麦克风后重试';
            } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                msg = '未检测到麦克风设备';
            }
            showAlert('录音失败', msg);
            isRecording = false;
        }
    }

    function stopRecordingAndSend() {

            switchPage('detail');

            showAlert('加载失败', errMsg);

    // ==================== 聊天功能 ====================
    const CHAT_POLL_INTERVAL = 3000;

    async function sendMessage(taskId, text, isNego = false) {
        await callApi('/messages', {method:'POST', body:JSON.stringify({taskId, senderId: currentUser.id, senderName: currentUser.nickname, text, isNego})});
    }
    async function deleteMessage(messageId) {
        try {
            await callApi(`/messages/${messageId}`, {method:'DELETE', body:JSON.stringify({})});
            showToast('消息已删除');
            await refreshMessagesOnly();
            await renderMessageList();
            updateUnreadBadge();
        } catch(err) { showAlert('删除失败', err.message); }
    }
    async function deleteConversation(taskId) {
        try {
            await callApi(`/conversations/${taskId}/${currentUser.id}`, {method:'DELETE', body:JSON.stringify({})});
            showToast('聊天已删除');
            deletedConversations.add(taskId);
            const card = document.querySelector(`.task-card[data-taskid="${taskId}"]`);
            if (card) card.remove();
            await updateUnreadBadge();
            if(chatState.active && chatState.taskId === taskId) {
                closeChat();
                switchPage('message');
            }
            const container = document.getElementById('messageContainer');
            if (container && container.querySelectorAll('.task-card').length === 0) {
                container.innerHTML = '<div class="card"><strong>📬 消息记录</strong><div class="empty-state">暂无对话</div></div>';
            }
        } catch(err) { showAlert('删除失败', err.message); }

    async function refreshMessagesOnly() {
        if(!chatState.messagesArea || !chatState.taskId) return;
        try {
            const messages = await callApi(`/messages/${chatState.taskId}`);
            if(!messages || !Array.isArray(messages)) return;
            const newCount = messages.length;
            const hasNew = newCount > (chatState.lastMessageCount || 0);
            chatState.lastMessageCount = newCount;
            let html = '';
            for(const m of messages) {
                const isMine = m.senderId === currentUser.id;
                const isNego = m.text && m.text.includes('💰议价请求:');
                const priceMatch = m.text.match(/¥(\d+)/);
                const negoPrice = priceMatch ? parseInt(priceMatch[1]) : null;
                const imgMatch = m.text.match(/\[img\](.*?)\[\/img\]/);
                const audioMatch = m.text.match(/\[audio\](.*?)\[\/audio\]/);
                let contentHtml = '';
                if (imgMatch) {
                    const imgUrl = imgMatch[1];
                    contentHtml = `<div class="bubble-text ${isMine?'':'bubble-image-wrapper'}" style="background:${isMine?'#1e4a6b':'#fff'}; padding:4px 4px; border:${isMine?'none':'1px solid #e2e8f0'};">
                        <img src="${imgUrl}" class="bubble-image" onclick="event.stopPropagation(); showImagePreview('${imgUrl}')">
                    </div>`;
                } else if (audioMatch) {
                    const audioUrl = audioMatch[1];
                    contentHtml = `<div class="bubble-text ${isMine?'':'bubble-image-wrapper'}" style="background:${isMine?'#1e4a6b':'#fff'}; padding:4px 4px; border:${isMine?'none':'1px solid #e2e8f0'};">
                        <audio controls class="audio-player" src="${audioUrl}"></audio>
                    </div>`;
                } else {
                    contentHtml = `<div class="bubble-text">${escapeHtml(m.text)}</div>`;
                }
                html += `<div class="chat-bubble ${isMine?'chat-bubble-mine':'chat-bubble-other'}" data-message-id="${m._id}" data-is-mine="${isMine}">
                    ${contentHtml}
                    <div class="bubble-time">${m.time||new Date(m.createdAt).toLocaleTimeString()}</div>
                </div>`;
                if(!isMine && isNego && negoPrice && m.senderId !== 'system') {
                    html += `<div style="display:flex; gap:8px; margin:4px 0 8px 12px;"><button class="btn-primary" style="padding:4px 10px; font-size:0.7rem;" onclick="respondToNego('${chatState.taskId}', ${negoPrice}, true)">✅ 同意议价</button><button class="btn-secondary" style="padding:4px 10px; font-size:0.7rem;" onclick="respondToNego('${chatState.taskId}', ${negoPrice}, false)">❌ 拒绝议价</button></div>`;
                }
            }
            chatState.messagesArea.innerHTML = html || '<div class="empty-state">暂无消息</div>';
            if(hasNew) chatState.messagesArea.scrollTop = chatState.messagesArea.scrollHeight;
            document.querySelectorAll('.chat-bubble').forEach(bubble => {
                const isMine = bubble.getAttribute('data-is-mine') === 'true';
                if(!isMine) return;
                const messageId = bubble.getAttribute('data-message-id');
                if(!messageId) return;
                let pressTimer = null;
                const startPress = (e) => {
                    e.preventDefault();
                    pressTimer = setTimeout(() => { showConfirm('删除消息', '确定要删除这条消息吗？', () => deleteMessage(messageId)); }, 500);
                };
                const cancelPress = () => { if(pressTimer) clearTimeout(pressTimer); };
                bubble.removeEventListener('contextmenu', (e) => e.preventDefault());
                bubble.removeEventListener('touchstart', startPress);
                bubble.removeEventListener('touchend', cancelPress);
                bubble.removeEventListener('touchmove', cancelPress);
                bubble.removeEventListener('mousedown', startPress);
                bubble.removeEventListener('mouseup', cancelPress);
                bubble.removeEventListener('mouseleave', cancelPress);
                bubble.addEventListener('contextmenu', (e) => e.preventDefault());
                bubble.addEventListener('touchstart', startPress);
                bubble.addEventListener('touchend', cancelPress);
                bubble.addEventListener('touchmove', cancelPress);
                bubble.addEventListener('mousedown', startPress);
                bubble.addEventListener('mouseup', cancelPress);
                bubble.addEventListener('mouseleave', cancelPress);
            });
        } catch(e) { console.error('刷新消息失败', e); }
    }

    function initChatPullToRefresh() {
        const messagesArea = document.getElementById('chatMsgsArea');
        if(!messagesArea) return;
        let startY = 0, isRefreshing = false;
        let indicator = null;
        const createIndicator = () => {
            if(document.getElementById('chatRefreshIndicator')) return;
            const div = document.createElement('div');
            div.id = 'chatRefreshIndicator';
            div.className = 'chat-refresh-indicator';
            div.innerText = '↓ 下拉刷新';
            messagesArea.parentNode.insertBefore(div, messagesArea);
            return div;
        };
        messagesArea.addEventListener('touchstart', (e) => { if(messagesArea.scrollTop===0) startY = e.touches[0].clientY; });
        messagesArea.addEventListener('touchmove', (e) => {
            if(isRefreshing || messagesArea.scrollTop>0) return;
            const diff = e.touches[0].clientY - startY;
            if(diff>30) {
                e.preventDefault();
                indicator = indicator || createIndicator();
                if(indicator) { indicator.style.display='block'; indicator.style.transform=`translateY(${Math.min(diff-30,60)}px)`; }
            }
        });
        messagesArea.addEventListener('touchend', async () => {
            if(indicator && indicator.style.display==='block') {
                indicator.style.transform=''; indicator.style.display='none';
                isRefreshing=true; indicator.innerText='刷新中...'; indicator.style.display='block';
                await refreshMessagesOnly();
                isRefreshing=false; indicator.style.display='none'; indicator.innerText='↓ 下拉刷新';
            }
        });
    }

        voiceBtn.addEventListener('mouseleave', endPress);
        voiceBtn.addEventListener('touchstart', startPress);
        voiceBtn.addEventListener('touchend', endPress);
        voiceBtn.addEventListener('touchcancel', endPress);

        document.getElementById('sendNegoBtn').onclick = () => {
            showPrompt('请输入议价金额', '金额（元）', async (price) => {
                await sendMessage(chatState.taskId, `💰议价请求:¥${price}`, true);
                showToast('议价请求已发送');
                await refreshMessagesOnly();
                updateUnreadBadge();
            });
        };

        // ===== 新增：+ 号面板控制 =====
        // 移除旧的 outside 监听（如果存在）
        if (window.__plusOutsideHandler) {
            document.removeEventListener('click', window.__plusOutsideHandler);
            window.__plusOutsideHandler = null;
        }
        const plusBtn = document.getElementById('chatPlusBtn');
        const plusPanel = document.getElementById('chatPlusPanel');
        let plusOpen = false;

        plusBtn.addEventListener('click', () => {
            plusOpen = !plusOpen;
            plusPanel.classList.toggle('show', plusOpen);
            plusBtn.textContent = plusOpen ? '✖️' : '➕';
        });

        // 点击外部收起面板
        const outsideClickHandler = function(e) {
            if (plusOpen && !e.target.closest('.chat-input-wrapper')) {
                plusOpen = false;
                plusPanel.classList.remove('show');
                plusBtn.textContent = '➕';
            }
        };
        window.__plusOutsideHandler = outsideClickHandler;
        document.addEventListener('click', outsideClickHandler);

        refreshMessagesOnly();
        initChatPullToRefresh();
        if(chatState.pollInterval) clearInterval(chatState.pollInterval);
        chatState.pollInterval = setInterval(async () => {
            if(chatState.active && chatState.taskId) {
                await refreshMessagesOnly();
            }
        }, CHAT_POLL_INTERVAL);
    }

    async function openChat(taskId, otherId, otherName, reward, title) {
        if(chatState.pollInterval) clearInterval(chatState.pollInterval);
        await callApi(`/messages/read/${taskId}/${currentUser.id}`, {method:'PUT'});
        chatState.active = true;
        chatState.taskId = taskId;
        chatState.otherId = otherId;
        chatState.otherName = otherName;
        chatState.reward = reward;
        chatState.title = title;
        showChatView();
        updateUnreadBadge();
    }

    window.respondToNego = async function(taskId, price, isAccept) {
        const task = await callApi(`/tasks/${taskId}`);
        if (task.status === 'completed' || task.status === 'cancelled') {
            showAlert('提示', '任务已结束，无法议价');
            return;
        }
        if (isAccept) {
            try {
                const result = await callApi(`/tasks/${taskId}/reward`, {
                    method: 'PUT',
                    body: JSON.stringify({ reward: price })
                });
                if (result.success) {
                    await sendMessage(taskId, `✅ 同意议价，价格调整为 ¥${price}`, false);
                    showToast(`已同意议价，新价格 ¥${price}`);
                    if(chatState.active && chatState.taskId === taskId) {
                        chatState.reward = price;
                        await refreshMessagesOnly();
                    } else {
                        renderMessageList();
                        if(document.getElementById('detailPage').classList.contains('active')) viewTask(taskId, lastPage);
                    }
                    refreshTaskList(true);
                    updateUnreadBadge();
                } else {
                    showAlert('修改价格失败', result.error || '可能任务已被接取且后端不允许修改');
                    await sendMessage(taskId, `✅ 同意议价（但价格修改失败）`, false);
                    if(chatState.active && chatState.taskId === taskId) await refreshMessagesOnly();
                }
            } catch (err) {
                showAlert('修改价格失败', err.message);
                await sendMessage(taskId, `✅ 同意议价（但价格修改失败）`, false);
                if(chatState.active && chatState.taskId === taskId) await refreshMessagesOnly();
            }
        } else {
            await sendMessage(taskId, `❌ 拒绝了议价`, false);
            showToast('已拒绝议价');
            if(chatState.active && chatState.taskId === taskId) await refreshMessagesOnly();
            else renderMessageList();
            updateUnreadBadge();
        }
    };

    function closeChat() {
        if(chatState.pollInterval) clearInterval(chatState.pollInterval);
        chatState.active = false;
        chatState.taskId = null;
        chatState.messagesArea = null;
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
        }
        // 清理 + 面板监听
        if (window.__plusOutsideHandler) {
            document.removeEventListener('click', window.__plusOutsideHandler);
            window.__plusOutsideHandler = null;
        }
        const chatInput = document.getElementById('chatInput');
        if (chatInput) {
            chatInput.classList.remove('recording');
            chatInput.placeholder = '输入消息...';
        }
    }

    // ==================== 消息列表 ====================
    async function renderMessageList() {
        if(!currentUser || !currentUser.id) {
            const container = document.getElementById('messageContainer');
            if(container) container.innerHTML = '<div class="card"><strong>📬 消息记录</strong><div class="empty-state">请先登录</div></div>';
            updateUnreadBadge();
            return;
        }
        try {
            const convs = await callApi(`/user/${currentUser.id}/conversations`);
            const container = document.getElementById('messageContainer');
            if(!convs || convs.length === 0) {
                container.innerHTML = '<div class="card"><strong>📬 消息记录</strong><div class="empty-state">暂无对话</div></div>';
                updateUnreadBadge();
                return;
            }
            const filtered = convs.filter(c => !deletedConversations.has(c.taskId) && c.lastMsg);
            if(filtered.length === 0) {
                container.innerHTML = '<div class="card"><strong>📬 消息记录</strong><div class="empty-state">暂无对话</div></div>';
                updateUnreadBadge();
                return;
            }
            let html = '<div class="card"><strong>📬 消息记录</strong></div>';
            for(let c of filtered) {
                let unreadHtml = '';
                if(c.unread > 0) unreadHtml = `<span style="background:#ef4444; color:white; border-radius:20px; padding:2px 6px; font-size:0.65rem; margin-left:6px;">${c.unread}</span>`;
                html += `<div class="card task-card" data-taskid="${c.taskId}" data-otherid="${c.otherId}" data-othername="${escapeHtml(c.otherName)}" data-reward="${c.reward}" data-title="${escapeHtml(c.taskTitle)}">
                    <div class="flex-between"><span>💬 ${escapeHtml(c.otherName)}${unreadHtml}</span><span class="reward-badge">¥${c.reward}</span></div>
                    <div class="task-desc">${escapeHtml((c.lastMsg||'暂无消息').substring(0,50))}</div>
                </div>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('#messageContainer .task-card').forEach(card => {
                card.removeEventListener('click', card._clickHandler);
                card.removeEventListener('contextmenu', card._contextHandler);
                const clickHandler = () => {
                    const taskId = card.getAttribute('data-taskid');
                    const otherId = card.getAttribute('data-otherid');
                    const otherName = card.getAttribute('data-othername');
                    const reward = parseInt(card.getAttribute('data-reward'));
                    const title = card.getAttribute('data-title');
                    openChat(taskId, otherId, otherName, reward, title);
                };
                const contextHandler = (e) => {
                    e.preventDefault();
                    const taskId = card.getAttribute('data-taskid');
                    const otherName = card.getAttribute('data-othername');
                    showConfirm('删除聊天', `确定删除与 ${otherName} 的聊天吗？`, () => { deleteConversation(taskId); });
                };
                card.addEventListener('click', clickHandler);
                card.addEventListener('contextmenu', contextHandler);
                card._clickHandler = clickHandler;
                card._contextHandler = contextHandler;
            });
            updateUnreadBadge();
        } catch(e) { console.error('加载消息列表失败', e); }
    }

    async function updateUnreadBadge() {
        if(!currentUser) return;
        try {
            const convs = await callApi(`/user/${currentUser.id}/conversations`);
            const filtered = convs.filter(c => !deletedConversations.has(c.taskId) && c.lastMsg);
            const totalUnread = filtered.reduce((sum,c) => sum + (c.unread||0), 0);
            const badge = document.getElementById('msgBadge');
            if(badge) { if(totalUnread>0) { badge.innerText = totalUnread>99?'99+':totalUnread; badge.style.display='inline-block'; } else badge.style.display='none'; }
        } catch(e) {}
    }

    // ==================== 个人主页 ====================
    async function loadProfile() {
        const container = document.getElementById('profileContainer');
        container.innerHTML = '<div class="loading">加载中...</div>';
        try {
            const user = await callApi(`/user/${currentUser.id}`);
            currentUser = {...currentUser, ...user};
            localStorage.setItem('user', JSON.stringify(currentUser));
            document.getElementById('headerBalance').innerHTML = `余额: ¥${(currentUser.balance||0).toFixed(2)}`;
            const allTasks = await callApi('/tasks/all');
            const myPubOngoing = (allTasks||[]).filter(t => t.publisherId === currentUser.id && t.status !== 'completed' && t.status !== 'cancelled');
            const myAccOngoing = (allTasks||[]).filter(t => t.takerId === currentUser.id && t.status !== 'completed' && t.status !== 'cancelled');
            const myCompleted = (allTasks||[]).filter(t => (t.publisherId === currentUser.id || t.takerId === currentUser.id) && t.status === 'completed');

            const pubHtml = myPubOngoing.map(t => {
                let progressText = '';
                if(t.status === 'ongoing') {
                    if(t.takerName) {
                        let step = '';
                        if(t.travelStatus === 'idle') step = '待出发';
                        else if(t.travelStatus === 'traveling') step = '行程中';
                        else if(t.travelStatus === 'arrived') step = '已到达，待凭证';
                        progressText = `<div class="progress-text">接取者: ${escapeHtml(t.takerName)} | 状态: ${step}</div>`;
                    } else progressText = `<div class="progress-text">暂无接取者</div>`;
                }
                let cancelBtn = '';
                if(t.status === 'available') cancelBtn = `<div class="task-actions"><button class="btn-danger" onclick="cancelTask('${t._id}')">取消任务</button></div>`;
                let statusClass = '', statusText = '';
                if(t.status === 'available') { statusClass='available'; statusText='悬赏中'; }
                else if(t.status === 'ongoing') { statusClass='ongoing'; statusText='进行中'; }
                else if(t.status === 'completed') { statusClass='completed'; statusText='已完成'; }
                else if(t.status === 'cancelled') { statusClass='cancelled'; statusText='已取消'; }
                return `<div class="profile-task-item" onclick="viewTask('${t._id}','profile')"><div style="display:flex; justify-content:space-between; align-items:center;"><div><div class="profile-task-title">${escapeHtml(t.title)}</div><span class="profile-task-status ${statusClass}">${statusText}</span></div><div class="profile-task-amount">💰 ${t.reward}元</div></div>${progressText}${cancelBtn}</div>`;
            }).join('') || '<div class="empty-state">暂无</div>';
            const accHtml = myAccOngoing.map(t => `<div class="profile-task-item" onclick="viewTask('${t._id}','profile')"><div style="display:flex; justify-content:space-between; align-items:center;"><div><div class="profile-task-title">${escapeHtml(t.title)}</div><span class="profile-task-status ongoing">${t.travelStatus==='idle'?'待出发':(t.travelStatus==='traveling'?'行程中':'已到达')}</span></div><div class="profile-task-amount">💰 ${t.reward}元</div></div><div class="task-actions"><button class="btn-danger" onclick="event.stopPropagation(); cancelAcceptedTask('${t._id}')">取消接取</button></div></div>`).join('') || '<div class="empty-state">暂无</div>';
            let completedHtml = '';
            if(myCompleted.length === 0) completedHtml = '<div class="empty-state">暂无</div>';
            else {
                completedHtml = myCompleted.map(t => {
                    const role = t.publisherId === currentUser.id ? '发布者' : (t.takerId === currentUser.id ? '接取者' : '');
                    return `<div class="profile-task-item" onclick="viewTask('${t._id}','profile')"><div style="display:flex; justify-content:space-between; align-items:center;"><div><div class="profile-task-title">${escapeHtml(t.title)}</div><span class="profile-task-status completed">已完成</span>${role ? `<span style="margin-left:6px; font-size:0.6rem; color:#64748b;">(${role})</span>` : ''}</div><div class="profile-task-amount">💰 ${t.reward}元</div></div></div>`;
                }).join('');
            }

            container.innerHTML = `
                <div class="profile-header" onclick="showEditProfileModal()"><div class="profile-avatar">${currentUser.avatar?`<img src="${currentUser.avatar}">`:`<span>${(currentUser.nickname||currentUser.username).charAt(0)}</span>`}</div><div><div class="profile-name">${escapeHtml(currentUser.nickname||currentUser.username)}</div><div class="profile-signature">${currentUser.signature||'点击编辑'}</div></div><span>✏️</span></div>
                <div class="stats-row" id="walletStats">
                    <div class="stat-item" id="walletEntry" style="cursor:pointer;">
                        <div class="stat-number">👛</div>
                        <div class="stat-label">钱包</div>
                    </div>
                    <div class="stat-item" onclick="showCreditDetail()"><div class="stat-number">⭐${currentUser.credit||60}</div><div class="stat-label">信用</div></div>
                    <div class="stat-item" onclick="showRealNameAuth()"><div class="stat-number">🆔</div><div class="stat-label">${currentUser.idCardVerified?'已实名':'未实名'}</div></div>
                </div>
                <div class="profile-collapse"><div class="collapse-header" data-target="pub"><div class="collapse-title">📤 我发布 <span style="font-size:0.7rem;">(${myPubOngoing.length})</span></div><span class="collapse-icon">▶</span></div><div class="collapse-content" id="collapse-pub">${pubHtml}</div></div>
                <div class="profile-collapse"><div class="collapse-header" data-target="acc"><div class="collapse-title">📥 我接取 <span style="font-size:0.7rem;">(${myAccOngoing.length})</span></div><span class="collapse-icon">▶</span></div><div class="collapse-content" id="collapse-acc">${accHtml}</div></div>
                <div class="profile-collapse"><div class="collapse-header" data-target="completed"><div class="collapse-title">✅ 已完成 <span style="font-size:0.7rem;">(${myCompleted.length})</span></div><span class="collapse-icon">▶</span></div><div class="collapse-content" id="collapse-completed">${completedHtml}</div></div>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            `;

            // 折叠面板交互
            document.querySelectorAll('.collapse-header').forEach(header => {
                header.addEventListener('click', () => {
                    const targetId = header.getAttribute('data-target');
                    const content = document.getElementById(`collapse-${targetId}`);
                    const icon = header.querySelector('.collapse-icon');
                    if(content.classList.contains('show')) { content.classList.remove('show'); icon.classList.remove('open'); }
                    else { content.classList.add('show'); icon.classList.add('open'); }
                });
            });

            // 点击钱包图标打开钱包详情弹窗
            document.getElementById('walletEntry').addEventListener('click', showWalletModal);

        } catch(err) { container.innerHTML = '<div class="empty-state">加载失败</div>'; }
    }

    async function publishTask() {
        if(!currentUser.idCardVerified){ showAlert('提示','请先实名认证'); return; }
        const title = document.getElementById('pubTitle').value.trim();
        if(!title){ showAlert('提示','请输入标题'); return; }
        const reward = parseFloat(document.getElementById('pubReward').value);
        if(isNaN(reward)||reward<=0){ showAlert('提示','请输入有效金额'); return; }
        if(reward>currentUser.balance){ showAlert('提示','余额不足'); return; }
        const locationAddress = document.getElementById('pubAddress').value.trim()||'未知';
        const mediaList = pendingMedia.map(m=>({type:m.type, url:m.dataURL}));
        const btn = document.getElementById('doPublishBtn');
        const originalText = btn.innerText;
        btn.innerText = '发布中...'; btn.disabled=true;
        try {
            const result = await callApi('/tasks', {method:'POST', body:JSON.stringify({
                title, description:document.getElementById('pubDesc').value, reward,
                publisherName:currentUser.nickname, publisherPhone:currentUser.phone,
                locationAddress, mediaList, category:document.getElementById('pubCategory').value
            })});
            if(result._id) {
                showToast('发布成功'); resetPublishForm(); await loadProfile(); refreshTaskList(true); switchPage('home');
            } else showAlert('发布失败', result.error||'未知错误');
        } catch(err) { showAlert('发布出错', err.message); }
        finally { btn.innerText=originalText; btn.disabled=false; }
    }

    function resetPublishForm() {
        document.getElementById('pubTitle').value=''; document.getElementById('pubDesc').value='';
        document.getElementById('pubReward').value=''; document.getElementById('pubAddress').value='';
        document.getElementById('pubCategory').value='取件';
        pendingMedia=[]; updateMediaPreview();
        document.getElementById('locationHint').innerHTML='点击定位自动填入详细地址';
    }

    async function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        errorDiv.innerText = '登录中...';
        try {
            const result = await callApi('/login', {method:'POST', body:JSON.stringify({username,password})});
            if(result.success) {
                localStorage.setItem('token', result.token);
                currentUser = result.user;
                localStorage.setItem('user', JSON.stringify(currentUser));
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('loginPage').classList.remove('active');
                const loc = await getNativeUserLocation();
                if (loc) userLocation = loc;
                await refreshTaskList(true);
                loadProfile();
                renderMessageList();
                updateUnreadBadge();
                switchPage('home');
                initBackButtonHandler();
            } else errorDiv.innerText = result.error || '登录失败';
        } catch(err) { errorDiv.innerText = err.message; }
    }

    let backPressedOnce = false;
    function initBackButtonHandler() {
        if (window.Capacitor && window.Capacitor.isNativePlatform()) {
            Capacitor.Plugins.App.addListener('backButton', handleBackButton);
        } else { window.addEventListener('popstate', handleBackButton); }
    }
    function handleBackButton() {
        const activePage = document.querySelector('.page.active').id;
        if (activePage === 'homePage') {
            if (backPressedOnce) {
                if (window.Capacitor && window.Capacitor.isNativePlatform()) Capacitor.Plugins.App.exitApp();
                else window.close();
            } else { backPressedOnce = true; showToast('再按一次退出应用'); setTimeout(()=>{ backPressedOnce=false; },2000); }
        } else {
            const backBtn = document.getElementById('detailBackBtn');
            if (backBtn && backBtn.closest('.page') && backBtn.closest('.page').classList.contains('active')) backBtn.click();
            else history.back();
        }
    }

    // ==================== 事件绑定 ====================
    document.getElementById('doLoginBtn').onclick = doLogin;
    document.getElementById('doRegisterBtn').onclick = async () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPwd').value;
        const nickname = document.getElementById('regNickname').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        if(!username || !password) { showAlert('提示','请填写用户名和密码'); return; }
        if(password !== confirm) { showAlert('提示','两次密码不一致'); return; }
        try {
            const result = await callApi('/register', {method:'POST', body:JSON.stringify({username,password,nickname,phone})});
            if(result.success) { showToast('注册成功，请登录'); document.getElementById('registerPage').classList.remove('active'); document.getElementById('loginPage').classList.add('active'); }
            else showAlert('注册失败', result.error);
        } catch(err) { showAlert('注册失败', err.message); }
    };
    document.getElementById('doPublishBtn').onclick = publishTask;
    document.getElementById('showRegisterBtn').onclick = (e) => { e.preventDefault(); document.getElementById('loginPage').classList.remove('active'); document.getElementById('registerPage').classList.add('active'); };
    document.getElementById('showLoginBtn').onclick = (e) => { e.preventDefault(); document.getElementById('registerPage').classList.remove('active'); document.getElementById('loginPage').classList.add('active'); };
    document.getElementById('getLocationBtn')?.addEventListener('click', getCurrentLocation);
    document.getElementById('mediaInput')?.addEventListener('change', (e) => { if(e.target.files.length) handleMediaFiles(e.target.files); });

    (async () => {
        const savedUser = localStorage.getItem('user');
        if(savedUser && localStorage.getItem('token')) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('loginPage').classList.remove('active');
            const loc = await getNativeUserLocation();
            if(loc) userLocation = loc;
            await refreshTaskList(true);
            loadProfile();
            initPullToRefresh();
            initMessagePullToRefresh();
            initFiltersAndCategories();
            renderMessageList();
            updateUnreadBadge();
            switchPage('home');
            initBackButtonHandler();
        }
    })();
</script>
</body>
</html>
