<script>
    // ==================== API 地址 ====================
    const getApiBase = () => {
        if (window.Capacitor && window.Capacitor.isNativePlatform()) return 'https://bounty-app-production.up.railway.app/api';
        return '/api';
    };
    const API_BASE = getApiBase();

    // ===== 全局状态 =====
    let currentUser = null, pendingMedia = [], userLocation = null, allTasks = [], currentCategory = 'all', currentSort = 'time', countdownTimer = null, lastPage = null;
    let chatState = { active: false, taskId: null, otherId: null, otherName: '', reward: 0, title: '', pollInterval: null, messagesArea: null, lastMessageCount: 0 };
    let geocodeCache = new Map();
    let deletedConversations = new Set();
    let tasksCache = { data: null, timestamp: 0, ttl: 5 * 60 * 1000 };
    let refreshThrottle = false, networkToast = null;
    let mediaRecorder = null, audioChunks = [], isRecording = false;
    let longPressTimer = null;
    let backPressedOnce = false;

    // ===== 地图变量 =====
    let map = null;
    let geocoder = null;
    let selectedLocation = { lng: 0, lat: 0, address: '' };
    let mapReady = false;
    let mapInitAttempts = 0;
    const MAX_MAP_ATTEMPTS = 3;

    // ===== 工具函数 =====
    function showNetworkSlow() {
        if (networkToast) return;
        networkToast = document.createElement('div');
        networkToast.className = 'network-toast';
        networkToast.innerText = '⚠️ 网络较慢，请稍候...';
        document.body.appendChild(networkToast);
        setTimeout(() => { if (networkToast) networkToast.remove(); networkToast = null; }, 3000);
    }

    async function fetchWithTimeout(url, options = {}, timeout = 10000, retries = 1) {
        let lastError;
        for (let i = 0; i <= retries; i++) {
            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response;
            } catch (err) {
                lastError = err;
                if (err.name === 'AbortError') {
                    console.warn(`请求超时 (${timeout}ms)，第 ${i+1} 次重试`);
                    if (i < retries) await new Promise(r => setTimeout(r, 1000));
                    continue;
                }
                if (i < retries) { await new Promise(r => setTimeout(r, 1000)); showNetworkSlow(); }
            }
        }
        throw lastError;
    }

    async function callApi(url, options = {}) {
        const fullUrl = API_BASE + url;
        const token = localStorage.getItem('token');
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        try {
            const res = await fetchWithTimeout(fullUrl, { ...options, headers }, 15000, 1);
            if (res.status === 401) {
                localStorage.removeItem('token'); localStorage.removeItem('user');
                currentUser = null;
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('loginPage').classList.add('active');
                showAlert('登录已过期', '请重新登录');
                throw new Error('Unauthorized');
            }
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
            return data;
        } catch (err) {
            console.error('[API错误]', err);
            if (err.name === 'AbortError') { showToast('请求超时，请检查网络后重试'); throw new Error('请求超时'); }
            showNetworkSlow();
            throw err;
        }
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        const fullUrl = API_BASE + '/upload';
        const token = localStorage.getItem('token');
        const res = await fetch(fullUrl, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        if (!res.ok) throw new Error('上传失败');
        const data = await res.json();
        return data.url;
    }

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function calculateDistance(lat1,lng1,lat2,lng2) {
        const R=6371; const dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
        const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
        const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return (R*c).toFixed(1);
    }

    async function geocodeAddress(address) {
        if (!address) return null;
        if (geocodeCache.has(address)) return geocodeCache.get(address);
        try {
            const result = await callApi('/geocode', { method: 'POST', body: JSON.stringify({ address }) });
            if (result && result.lat && result.lng) { geocodeCache.set(address, result); return result; }
            return null;
        } catch(e) { console.error('地理编码失败', e); return null; }
    }

    async function enrichTasksWithDistance(tasks) {
        if (!userLocation) return tasks;
        const enriched = [];
        for(let task of tasks){
            if(!task.locationAddress){ enriched.push({...task,distance:null}); continue; }
            const coords = await geocodeAddress(task.locationAddress);
            const distance = coords ? calculateDistance(userLocation.lat, userLocation.lng, coords.lat, coords.lng) : null;
            enriched.push({...task, distance});
        }
        return enriched;
    }

    async function getNativeUserLocation() {
        if (window.Capacitor && window.Capacitor.isNativePlatform()) {
            try {
                const { Geolocation } = Capacitor.Plugins;
                let permission = await Geolocation.checkPermissions();
                if (permission.location !== 'granted') {
                    permission = await Geolocation.requestPermissions();
                    if (permission.location !== 'granted') return null;
                }
                const position = await Geolocation.getCurrentPosition({ timeout: 15000, enableHighAccuracy: true });
                return { lat: position.coords.latitude, lng: position.coords.longitude };
            } catch(err) { return null; }
        } else {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    () => resolve(null),
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            });
        }
    }

    function showToast(msg, duration=2000) {
        let toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    function showAlert(title, message) {
        let modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `<div class="custom-modal-content"><h3>${escapeHtml(title)}</h3><p>${escapeHtml(message)}</p><div class="custom-modal-buttons"><button class="confirm-btn">知道了</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.confirm-btn').onclick = () => modal.remove();
    }
    function showConfirm(title, message, onConfirm, onCancel) {
        let modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `<div class="custom-modal-content"><h3>${escapeHtml(title)}</h3><p>${escapeHtml(message)}</p><div class="custom-modal-buttons"><button class="confirm-btn">确定</button><button class="cancel-btn">取消</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.confirm-btn').onclick = () => { modal.remove(); if(onConfirm) onConfirm(); };
        modal.querySelector('.cancel-btn').onclick = () => { modal.remove(); if(onCancel) onCancel(); };
    }
    function showPrompt(title, placeholder, callback) {
        const modal = document.createElement('div');
        modal.className = 'custom-modal';
        modal.innerHTML = `
            <div class="custom-modal-content">
                <h3>${escapeHtml(title)}</h3>
                <input type="number" id="promptInput" class="prompt-input" placeholder="${escapeHtml(placeholder)}" step="1" min="1">
                <div class="custom-modal-buttons">
                    <button class="confirm-btn" id="promptOk">确定</button>
                    <button class="cancel-btn" id="promptCancel">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const input = modal.querySelector('#promptInput');
        const ok = modal.querySelector('#promptOk');
        const cancel = modal.querySelector('#promptCancel');
        const cleanup = () => modal.remove();
        ok.onclick = () => {
            const val = parseFloat(input.value);
            if (!isNaN(val) && val > 0) {
                cleanup();
                callback(val);
            } else {
                showAlert('提示', '请输入有效的金额');
            }
        };
        cancel.onclick = cleanup;
        input.focus();
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') ok.click(); });
    }
    window.alert = function(msg){ showAlert('提示',msg); };
    window.confirm = function(msg,onOk,onCancel){ showConfirm('确认',msg,onOk,onCancel); return true; };

    async function getDetailedAddress(lat, lng) {
        try {
            const res = await callApi('/regeo', { method: 'POST', body: JSON.stringify({ lat, lng }) });
            return res.address;
        } catch (e) { return `${lat.toFixed(6)}, ${lng.toFixed(6)}`; }
    }

    // ===== 地图功能 =====
    function initMap() {
        if (mapReady) return;
        if (typeof AMap === 'undefined') {
            console.warn('AMap 未加载，尝试重新加载脚本...');
            if (mapInitAttempts >= MAX_MAP_ATTEMPTS) {
                showAlert('地图加载失败', '请检查网络或高德地图 Key 是否正确。您可以直接在输入框中手动输入地址。');
                closeMapModal();
                return;
            }
            mapInitAttempts++;
            const script = document.createElement('script');
            script.src = `https://webapi.amap.com/maps?v=2.0&key=30107d62cf0ec682643d1097a48f7da4&plugin=AMap.PlaceSearch,AMap.Geocoder&callback=onMapScriptLoaded`;
            script.async = true;
            document.head.appendChild(script);
            window.onMapScriptLoaded = function() {
                console.log('高德地图脚本加载成功，重新初始化地图');
                mapReady = false;
                initMap();
            };
            setTimeout(() => {
                if (!mapReady) {
                    console.error('高德地图脚本加载超时');
                    mapInitAttempts = MAX_MAP_ATTEMPTS;
                    showAlert('地图加载超时', '请检查网络后重试，或手动输入地址。');
                    closeMapModal();
                }
            }, 8000);
            return;
        }

        const container = document.getElementById('mapContainer');
        if (!container) return;
        map = new AMap.Map('mapContainer', {
            zoom: 16,
            center: [116.397428, 39.90923],
            resizeEnable: true,
            touchZoom: true,
            dragEnable: true,
            zoomEnable: true,
            mapStyle: 'amap://styles/whitesmoke',
        });
        geocoder = new AMap.Geocoder({
            city: '全国',
            radius: 1000,
            extensions: 'all'
        });

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lng = pos.coords.longitude;
                    const lat = pos.coords.latitude;
                    map.setCenter([lng, lat]);
                    updateAddress(lng, lat);
                },
                () => {},
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        map.on('moveend', () => {
            const center = map.getCenter();
            updateAddress(center.getLng(), center.getLat());
        });

        mapReady = true;
        console.log('高德地图初始化成功');
    }

    async function updateAddress(lng, lat) {
        selectedLocation.lng = lng;
        selectedLocation.lat = lat;
        const addrEl = document.getElementById('selectedAddress');
        addrEl.textContent = '获取地址中...';
        try {
            const address = await getDetailedAddress(lat, lng);
            selectedLocation.address = address;
            addrEl.textContent = address;
        } catch (e) {
            const coordStr = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            addrEl.textContent = coordStr;
            selectedLocation.address = coordStr;
        }
    }

    function openMapModal() {
        const modal = document.getElementById('mapModal');
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        mapInitAttempts = 0;
        setTimeout(() => { initMap(); }, 300);
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    if (map) {
                        map.setCenter([pos.coords.longitude, pos.coords.latitude]);
                        updateAddress(pos.coords.longitude, pos.coords.latitude);
                    }
                },
                () => {},
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
        const addressInput = document.getElementById('pubAddress');
        const addr = addressInput.value.trim();
        if (addr && mapReady) {
            geocoder.getLocation(addr, (status, result) => {
                if (status === 'complete' && result.geocodes.length) {
                    const loc = result.geocodes[0].location;
                    map.setCenter([loc.getLng(), loc.getLat()]);
                    updateAddress(loc.getLng(), loc.getLat());
                }
            });
        }
    }

    function closeMapModal() {
        document.getElementById('mapModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    async function confirmLocation() {
        const addressInput = document.getElementById('pubAddress');
        const addrEl = document.getElementById('selectedAddress');

        const isCoord = /^[-+]?\d+\.\d+,\s*[-+]?\d+\.\d+$/.test(selectedLocation.address);
        if (!selectedLocation.address || isCoord) {
            if (!map) {
                showAlert('地图未就绪', '请稍候再试或手动输入地址');
                closeMapModal();
                return;
            }
            const center = map.getCenter();
            const lng = center.getLng();
            const lat = center.getLat();
            addrEl.textContent = '获取地址中...';
            try {
                const address = await getDetailedAddress(lat, lng);
                selectedLocation.address = address;
                addrEl.textContent = address;
                addressInput.value = address;
                const hint = document.getElementById('locationHint');
                if (hint) {
                    hint.innerHTML = '✅ 已选择位置：' + address;
                    setTimeout(() => { hint.innerHTML = '点击“选择位置”打开地图选点'; }, 3000);
                }
                closeMapModal();
            } catch (e) {
                const coordStr = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                showAlert('地址解析失败', '无法获取详细地址，已填入坐标，您可手动修改。');
                addressInput.value = coordStr;
                selectedLocation.address = coordStr;
                closeMapModal();
            }
            return;
        }

        addressInput.value = selectedLocation.address;
        const hint = document.getElementById('locationHint');
        if (hint) {
            hint.innerHTML = '✅ 已选择位置：' + selectedLocation.address;
            setTimeout(() => { hint.innerHTML = '点击“选择位置”打开地图选点'; }, 3000);
        }
        closeMapModal();
    }

    // ===== 全局手势返回 =====
    let swipeIndicator = null;
    let swipeActive = false;
    function initGlobalSwipeBack() {
        const pages = document.querySelectorAll('.page:not(#homePage)');
        swipeIndicator = document.getElementById('swipeBackIndicator');
        let startX = 0, startY = 0, isSwiping = false;

        pages.forEach(page => {
            const touchStart = (e) => {
                if (!page.classList.contains('active')) return;
                const rect = page.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                if (touchX > rect.width * 0.15) return;
                if (page.scrollLeft > 0 || page.scrollTop > 0) return;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isSwiping = true;
                swipeActive = true;
            };
            const touchMove = (e) => {
                if (!isSwiping || !page.classList.contains('active')) return;
                const deltaX = e.touches[0].clientX - startX;
                const deltaY = e.touches[0].clientY - startY;
                if (deltaX > 10 && Math.abs(deltaY) < 80) {
                    if (swipeIndicator) {
                        swipeIndicator.classList.add('show');
                        swipeIndicator.style.opacity = Math.min(1, (deltaX - 10) / 30);
                    }
                    e.preventDefault();
                    if (deltaX > 45) {
                        isSwiping = false;
                        swipeActive = false;
                        if (swipeIndicator) swipeIndicator.classList.remove('show');
                        handleBackButton();
                    }
                } else {
                    if (swipeIndicator) swipeIndicator.classList.remove('show');
                }
            };
            const touchEnd = () => {
                isSwiping = false;
                swipeActive = false;
                if (swipeIndicator) swipeIndicator.classList.remove('show');
            };
            page.addEventListener('touchstart', touchStart, { passive: true });
            page.addEventListener('touchmove', touchMove, { passive: false });
            page.addEventListener('touchend', touchEnd, { passive: true });
            page.addEventListener('touchcancel', touchEnd, { passive: true });
        });
    }

    // ===== 返回按钮处理 =====
    function handleBackButton() {
        const activePage = document.querySelector('.page.active');
        if (!activePage) return;
        const id = activePage.id;
        if (id === 'homePage') {
            if (backPressedOnce) {
                if (window.Capacitor && window.Capacitor.isNativePlatform()) {
                    Capacitor.Plugins.App.exitApp();
                } else {
                    window.close();
                }
            } else {
                backPressedOnce = true;
                showToast('再按一次退出应用');
                setTimeout(() => { backPressedOnce = false; }, 2000);
            }
        } else if (id === 'myTasksPage') {
            document.getElementById('myTasksBackBtn').click();
            backPressedOnce = false;
        } else if (id === 'detailPage') {
            document.getElementById('detailBackBtn')?.click();
            backPressedOnce = false;
        } else if (id === 'publishPage' || id === 'messagePage' || id === 'profilePage') {
            switchPage('home');
            backPressedOnce = false;
        } else {
            switchPage('home');
            backPressedOnce = false;
        }
    }

    // ===== 首页相关 =====
    async function refreshTaskList(force = false) {
        if (refreshThrottle) return;
        refreshThrottle = true;
        setTimeout(() => { refreshThrottle = false; }, 1000);
        const container = document.getElementById('homeContent');
        if (!force && tasksCache.data && (Date.now() - tasksCache.timestamp) < tasksCache.ttl) {
            allTasks = tasksCache.data;
            applyFilterAndSort();
            return;
        }
        container.innerHTML = '<div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div><div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div>';
        try {
            const tasks = await callApi('/tasks');
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ 暂无悬赏任务</div>';
                tasksCache.data = []; tasksCache.timestamp = Date.now(); allTasks = [];
                applyFilterAndSort(); return;
            }
            let tasksWithCat = tasks.map(t => ({ ...t, category: getTaskCategory(t.title) }));
            if (userLocation) tasksWithCat = await enrichTasksWithDistance(tasksWithCat);
            allTasks = tasksWithCat;
            tasksCache.data = tasksWithCat;
            tasksCache.timestamp = Date.now();
            applyFilterAndSort();
        } catch (err) {
            container.innerHTML = '<div class="empty-state">加载失败，请下拉刷新</div>';
        }
    }

    function applyFilterAndSort() {
        let filtered = [...allTasks];
        if (currentCategory !== 'all') filtered = filtered.filter(t => t.category === currentCategory);
        if (currentSort === 'distance') filtered.sort((a,b) => (parseFloat(a.distance)||999) - (parseFloat(b.distance)||999));
        else if (currentSort === 'reward') filtered.sort((a,b) => b.reward - a.reward);
        else filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        const container = document.getElementById('homeContent');
        if (filtered.length === 0) { container.innerHTML = '<div class="empty-state">✨ 暂无此类任务</div>'; return; }
        container.innerHTML = filtered.map(t => `
            <div class="card" data-taskid="${t._id}">
                <div class="task-header"><span class="task-title">${escapeHtml(t.title)}</span><span class="reward-badge">💰 ${t.reward}元</span></div>
                <div class="task-desc">${escapeHtml((t.description||'').substring(0,60))}</div>
                <div class="task-meta"><span>👤 ${escapeHtml(t.publisherName)}</span><span>📍 ${t.locationAddress||'未知'}</span>${t.distance?`<span class="distance-badge">📏 距您 ${t.distance}km</span>`:''}<span class="distance-badge">🏷️ ${t.category}</span></div>
            </div>
        `).join('');
        container.querySelectorAll('.card').forEach(card => {
            card.removeEventListener('click', card._taskClick);
            const handler = () => viewTask(card.getAttribute('data-taskid'), 'home');
            card.addEventListener('click', handler);
            card._taskClick = handler;
        });
    }

    function initPullToRefresh() {
        const homePage = document.getElementById('homePage');
        let startY = 0, isRefreshing = false;
        const indicator = document.getElementById('refreshIndicator');
        homePage.addEventListener('touchstart', (e) => { if (homePage.scrollTop === 0) startY = e.touches[0].clientY; });
        homePage.addEventListener('touchmove', (e) => {
            if (isRefreshing || homePage.scrollTop > 0) return;
            const diff = e.touches[0].clientY - startY;
            if (diff > 30) {
                e.preventDefault();
                indicator.style.display = 'block';
                indicator.style.transform = `translateY(${Math.min(diff - 30, 60)}px)`;
            }
        });
        homePage.addEventListener('touchend', async () => {
            if (indicator.style.display === 'block') {
                indicator.style.transform = ''; indicator.style.display = 'none';
                isRefreshing = true;
                indicator.innerText = '刷新中...'; indicator.style.display = 'block';
                await refreshTaskList(true);
                isRefreshing = false;
                indicator.style.display = 'none';
                indicator.innerText = '↓ 下拉刷新';
            }
        });
    }

    function initMessagePullToRefresh() {
        const messagePage = document.getElementById('messagePage');
        const indicator = document.getElementById('refreshMessageIndicator');
        if (!messagePage || !indicator) return;
        let startY = 0, isRefreshing = false;
        messagePage.addEventListener('touchstart', (e) => {
            if (messagePage.scrollTop === 0) startY = e.touches[0].clientY;
        });
        messagePage.addEventListener('touchmove', (e) => {
            if (isRefreshing || messagePage.scrollTop > 0) return;
            const diff = e.touches[0].clientY - startY;
            if (diff > 30) {
                e.preventDefault();
                indicator.style.display = 'block';
                indicator.style.transform = `translateY(${Math.min(diff - 30, 60)}px)`;
            }
        });
        messagePage.addEventListener('touchend', async () => {
            if (indicator.style.display === 'block') {
                indicator.style.transform = ''; indicator.style.display = 'none';
                isRefreshing = true;
                indicator.innerText = '刷新中...'; indicator.style.display = 'block';
                await renderMessageList();
                isRefreshing = false;
                indicator.style.display = 'none';
                indicator.innerText = '↓ 下拉刷新';
            }
        });
    }

    function initFiltersAndCategories() {
        document.querySelectorAll('.category-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.category-chip').forEach(c=>c.classList.remove('active'));
                chip.classList.add('active');
                currentCategory = chip.getAttribute('data-cat');
                applyFilterAndSort();
            });
        });
        document.querySelectorAll('.sort-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.sort-chip').forEach(c=>c.classList.remove('active'));
                chip.classList.add('active');
                currentSort = chip.getAttribute('data-sort');
                applyFilterAndSort();
            });
        });
    }

    const categoryMap = {'取件':['取件','快递','包裹','取货'],'调试':['调试','bug','修复','代码','前端','后端','程序'],'跑腿':['跑腿','送','买','代购','排队']};

    // ===== 幻灯片滑动 =====
    function initSlide(container, onComplete) {
        const track = container.querySelector('.slide-track');
        const thumb = container.querySelector('.slide-thumb');
        if (!track || !thumb) return;
        if (track.clientWidth===0 || thumb.clientWidth===0) { setTimeout(()=>initSlide(container,onComplete),100); return; }
        let startX=0, isDragging=false;
        const maxLeft = track.clientWidth - thumb.clientWidth;
        function setTransform(x) { thumb.style.transform = `translateX(${x}px)`; }
        function onMove(clientX) {
            if(!isDragging) return;
            let delta = clientX - startX;
            let newLeft = Math.min(maxLeft, Math.max(0, delta));
            setTransform(newLeft);
            if(newLeft >= maxLeft-5) {
                isDragging=false; container.classList.add('completed'); setTransform(maxLeft);
                document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp);
                document.removeEventListener('touchmove',onTouchMove); document.removeEventListener('touchend',onTouchEnd);
                if(onComplete) onComplete();
            }
        }
        function onMouseMove(e) { onMove(e.clientX); }
        function onMouseUp() { isDragging=false; setTransform(0); document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp); container.classList.remove('completed'); }
        function onTouchMove(e) { onMove(e.touches[0].clientX); e.preventDefault(); }
        function onTouchEnd() { isDragging=false; setTransform(0); document.removeEventListener('touchmove',onTouchMove); document.removeEventListener('touchend',onTouchEnd); container.classList.remove('completed'); }
        function onStart(clientX) { startX=clientX; isDragging=true; document.addEventListener('mousemove',onMouseMove); document.addEventListener('mouseup',onMouseUp); document.addEventListener('touchmove',onTouchMove); document.addEventListener('touchend',onTouchEnd); }
        thumb.addEventListener('mousedown',(e)=>{ e.preventDefault(); onStart(e.clientX); });
        thumb.addEventListener('touchstart',(e)=>{ e.preventDefault(); onStart(e.touches[0].clientX); });
        container.classList.remove('completed'); setTransform(0);
    }

            const slideAccept = document.getElementById('slideAcceptWrapper');

                const imgMatch = m.text.match(/\[img\](.*?)\[\/img\]/);
                const audioMatch = m.text.match(/\[audio\](.*?)\[\/audio\]/);

                    const imgUrl = imgMatch[1];

                    </div>`;
                } else {
                    contentHtml = `<div class="bubble-text">${escapeHtml(m.text)}</div>`;
                }
                html += `<div class="chat-bubble ${isMine?'chat-bubble-mine':'chat-bubble-other'}" data-message-id="${m._id}" data-is-mine="${isMine}">
                    ${contentHtml}
                    <div class="bubble-time">${m.time||new Date(m.createdAt).toLocaleTimeString()}</div>
                </div>`;
                if(!isMine && isNego && negoPrice && m.senderId !== 'system') {
                    html += `<div style="display:flex; gap:8px; margin:4px 0 8px 12px;"><button class="btn-primary" style="padding:4px 10px; font-size:0.7rem;" onclick="respondToNego('${chatState.taskId}', ${negoPrice}, true)">✅ 同意议价</button><button class="btn-secondary" style="padding:4px 10px; font-size:0.7rem;" onclick="respondToNego('${chatState.taskId}', ${negoPrice}, false)">❌ 拒绝议价</button></div>`;

            document.querySelectorAll('.chat-bubble').forEach(bubble => {

                let pressTimer = null;
                const startPress = (e) => {
                    e.preventDefault();
                    pressTimer = setTimeout(() => { showConfirm('删除消息', '确定要删除这条消息吗？', () => deleteMessage(messageId)); }, 500);
                };
                const cancelPress = () => { if(pressTimer) clearTimeout(pressTimer); };
                bubble.removeEventListener('contextmenu', (e) => e.preventDefault());
                bubble.removeEventListener('touchstart', startPress);
                bubble.removeEventListener('touchend', cancelPress);
                bubble.removeEventListener('touchmove', cancelPress);
                bubble.removeEventListener('mousedown', startPress);
                bubble.removeEventListener('mouseup', cancelPress);
                bubble.removeEventListener('mouseleave', cancelPress);
                bubble.addEventListener('contextmenu', (e) => e.preventDefault());
                bubble.addEventListener('touchstart', startPress);
                bubble.addEventListener('touchend', cancelPress);
                bubble.addEventListener('touchmove', cancelPress);
                bubble.addEventListener('mousedown', startPress);
                bubble.addEventListener('mouseup', cancelPress);
                bubble.addEventListener('mouseleave', cancelPress);
            });
        } catch(e) { console.error('刷新消息失败', e); }
    }

    function initChatPullToRefresh() {
        const messagesArea = document.getElementById('chatMsgsArea');
        if(!messagesArea) return;
        let startY = 0, isRefreshing = false;
        let indicator = null;
        const createIndicator = () => {
            if(document.getElementById('chatRefreshIndicator')) return;
            const div = document.createElement('div');
            div.id = 'chatRefreshIndicator';
            div.className = 'chat-refresh-indicator';
            div.innerText = '↓ 下拉刷新';
            messagesArea.parentNode.insertBefore(div, messagesArea);
            return div;
        };
        messagesArea.addEventListener('touchstart', (e) => { if(messagesArea.scrollTop===0) startY = e.touches[0].clientY; });
        messagesArea.addEventListener('touchmove', (e) => {
            if(isRefreshing || messagesArea.scrollTop>0) return;
            const diff = e.touches[0].clientY - startY;
            if(diff>30) {
                e.preventDefault();
                indicator = indicator || createIndicator();
                if(indicator) { indicator.style.display='block'; indicator.style.transform=`translateY(${Math.min(diff-30,60)}px)`; }
            }
        });
        messagesArea.addEventListener('touchend', async () => {
            if(indicator && indicator.style.display==='block') {
                indicator.style.transform=''; indicator.style.display='none';
                isRefreshing=true; indicator.innerText='刷新中...'; indicator.style.display='block';
                await refreshMessagesOnly();
                isRefreshing=false; indicator.style.display='none'; indicator.innerText='↓ 下拉刷新';
            }
        });
    }

    window.respondToNego = async function(taskId, price, isAccept) {
        const task = await callApi(`/tasks/${taskId}`);
        if (task.status === 'completed' || task.status === 'cancelled') {
            showAlert('提示', '任务已结束，无法议价');
            return;
        }
        if (isAccept) {
            try {
                const result = await callApi(`/tasks/${taskId}/reward`, {
                    method: 'PUT',
                    body: JSON.stringify({ reward: price })
                });
                if (result.success) {
                    await sendMessage(taskId, `✅ 同意议价，价格调整为 ¥${price}`, false);
                    showToast(`已同意议价，新价格 ¥${price}`);
                    if(chatState.active && chatState.taskId === taskId) {
                        chatState.reward = price;
                        await refreshMessagesOnly();
                    } else {
                        renderMessageList();
                        if(document.getElementById('detailPage').classList.contains('active')) viewTask(taskId, lastPage);
                    }
                    refreshTaskList(true);
                    updateUnreadBadge();
                } else {
                    showAlert('修改价格失败', result.error || '可能任务已被接取且后端不允许修改');
                    await sendMessage(taskId, `✅ 同意议价（但价格修改失败）`, false);
                    if(chatState.active && chatState.taskId === taskId) await refreshMessagesOnly();
                }
            } catch (err) {
                showAlert('修改价格失败', err.message);
                await sendMessage(taskId, `✅ 同意议价（但价格修改失败）`, false);
                if(chatState.active && chatState.taskId === taskId) await refreshMessagesOnly();
            }
        } else {
            await sendMessage(taskId, `❌ 拒绝了议价`, false);
            showToast('已拒绝议价');
            if(chatState.active && chatState.taskId === taskId) await refreshMessagesOnly();
            else renderMessageList();
            updateUnreadBadge();
        }
    };

    }

    let currentMyTasksType = 'pub';
    async function navigateToMyTasks(type) {
        currentMyTasksType = type;
        const titles = { pub: '我发布的任务', acc: '我接取的任务', completed: '已完成的任务' };
        document.getElementById('myTasksTitle').innerText = titles[type] || '我的任务';

    async function loadMyTasks(type) {
        const listContainer = document.getElementById('myTasksList');
        try {
            const allTasks = await callApi('/tasks/all');
            let filtered = [];
            if (type === 'pub') {
                filtered = allTasks.filter(t => t.publisherId === currentUser.id && t.status !== 'cancelled');
                filtered.sort((a,b) => (a.status === 'ongoing' ? 0 : 1) - (b.status === 'ongoing' ? 0 : 1));
            } else if (type === 'acc') {
                filtered = allTasks.filter(t => t.takerId === currentUser.id && t.status !== 'cancelled');
                filtered.sort((a,b) => (a.status === 'ongoing' ? 0 : 1) - (b.status === 'ongoing' ? 0 : 1));
            } else if (type === 'completed') {
                filtered = allTasks.filter(t => (t.publisherId === currentUser.id || t.takerId === currentUser.id) && t.status === 'completed');
                filtered.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
            }
            if (filtered.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">暂无任务</div>';
                return;
            }
            let html = '';
            for (let task of filtered) {
                let statusText = '';
                let statusClass = '';
                if (task.status === 'available') { statusText='悬赏中'; statusClass='available'; }
                else if (task.status === 'ongoing') { 
                    if (task.travelStatus === 'idle') statusText='待出发';
                    else if (task.travelStatus === 'traveling') statusText='行程中';
                    else if (task.travelStatus === 'arrived') statusText='已到达，待凭证';
                    else statusText='进行中';
                    statusClass='ongoing';
                }
                else if (task.status === 'completed') { statusText='已完成'; statusClass='completed'; }
                else statusText='已取消';

                let role = '';
                if (task.publisherId === currentUser.id && task.takerId) role = '发布者';
                else if (task.takerId === currentUser.id) role = '接取者';
                html += `<div class="card" data-taskid="${task._id}" onclick="viewTask('${task._id}','myTasks')">
                    <div class="task-header"><span class="task-title">${escapeHtml(task.title)}</span><span class="reward-badge">💰 ${task.reward}元</span></div>
                    <div class="task-desc">${escapeHtml((task.description||'').substring(0,60))}</div>
                    <div class="task-meta">
                        <span>👤 ${escapeHtml(task.publisherName)}</span>
                        <span>📍 ${task.locationAddress||'未知'}</span>
                        <span class="distance-badge">${statusText}</span>
                        ${role ? `<span class="distance-badge">${role}</span>` : ''}
                    </div>
                </div>`;
            }
            listContainer.innerHTML = html;
        } catch(e) {
            listContainer.innerHTML = '<div class="empty-state">加载失败，请稍后重试</div>';
        }
    }

    async function requestMicrophonePermission() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            return true;
        } catch (err) {
            return false;
        }
    }

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const file = new File([audioBlob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                try {
                    showToast('上传语音中...', 1500);
                    const url = await uploadFile(file);
                    await sendMessage(chatState.taskId, `[audio]${url}[/audio]`, false);
                    await refreshMessagesOnly();
                    updateUnreadBadge();
                } catch (err) {
                    showAlert('发送语音失败', err.message);
                }
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
        } catch (err) {
            let msg = '无法访问麦克风，请检查浏览器权限或在 HTTPS 环境下使用';
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                msg = '麦克风权限被拒绝，请在浏览器设置中允许访问麦克风后重试';
            } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                msg = '未检测到麦克风设备';
            }
            showAlert('录音失败', msg);
            isRecording = false;
        }
    }

    // ===== 压缩图片 =====
    function compressImage(file, quality=0.5, maxWidth=600, maxHeight=600) {
        return new Promise((resolve,reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width, height = img.height;
                    if(width > height) {
                        if(width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                    } else {
                        if(height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                    }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    resolve(dataUrl);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }
    async function handleMediaFiles(files) {
        let remain = 3 - pendingMedia.length;
        if(files.length > remain) {
            showAlert('提示', `最多上传3个，当前已有${pendingMedia.length}个`);
            files = Array.from(files).slice(0, remain);
        }
        for(let file of files) {
            if(!file.type.startsWith('image/') && !file.type.startsWith('video/')) continue;
            let dataURL;
            if(file.type.startsWith('image/')) {
                dataURL = await compressImage(file);
            } else {
                dataURL = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }
            pendingMedia.push({type: file.type.startsWith('image/')?'image':'video', dataURL, file});
            updateMediaPreview();
        }
        document.getElementById('mediaInput').value = '';
    }
    function updateMediaPreview() {
        const container = document.getElementById('mediaPreview');
        if(!container) return;
        if(pendingMedia.length === 0) { container.innerHTML = ''; return; }
        container.innerHTML = pendingMedia.map((m,idx) => `
            <div class="preview-img-wrapper">
                ${m.type==='image' ? `<img src="${m.dataURL}">` : `<video src="${m.dataURL}" style="width:100%;height:100%;object-fit:cover;"></video>`}
                <div class="remove-img-btn" data-index="${idx}">✕</div>
            </div>
        `).join('');
        document.querySelectorAll('#mediaPreview .remove-img-btn').forEach(btn => {
            btn.onclick = (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                pendingMedia.splice(idx,1);
                updateMediaPreview();
            };
        });
    }

            document.getElementById('loginPage').classList.remove('active');
            const loc = await getNativeUserLocation();
            if(loc) userLocation = loc;
            await refreshTaskList(true);
            loadProfile();
            renderMessageList();
            updateUnreadBadge();
            switchPage('home');
            initBackButtonHandler();
        }
    })();
</script>
</body>
</html>
