<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>赏金集市 · 原生版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#f5f7fb;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#1e293b;padding-bottom:70px}
        .app-container{width:100%;background:#f5f7fb;min-height:100vh}
        .page{display:none;animation:fadeIn .25s ease}
        .page.active{display:block}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .nav-header{background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);padding:12px 16px;border-bottom:1px solid rgba(226,232,240,0.8);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20}
        .logo{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#0f2b3d,#1e4a6b);background-clip:text;-webkit-background-clip:text;color:transparent}
        .header-balance{background:#eef2ff;padding:4px 10px;border-radius:40px;font-size:.75rem;font-weight:600;color:#1e4a6b;cursor:pointer}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);display:flex;justify-content:space-around;padding:6px 20px 16px;border-top:1px solid rgba(226,232,240,0.8);z-index:20}
        .nav-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.7rem;color:#94a3b8;cursor:pointer}
        .nav-item.active{color:#1e4a6b;transform:translateY(-2px);font-weight:500}
        .nav-icon{font-size:1.4rem}
        .msg-badge{position:absolute;top:-5px;right:-10px;background:#ef4444;color:#fff;border-radius:20px;padding:2px 6px;font-size:.6rem;min-width:18px;text-align:center;display:none}
        .card{background:#fff;border-radius:20px;padding:16px;margin:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border:1px solid #eef2f8;cursor:pointer;transition:transform .1s ease}
        .task-card:active{transform:scale(.98)}
        .detail-hero{background:linear-gradient(135deg,#1e4a6b,#0f2b3d);border-radius:20px;margin:12px 12px 0 12px;padding:20px 16px;color:#fff;position:relative;overflow:hidden}
        .detail-hero::before{content:"💰";position:absolute;right:-20px;bottom:-20px;font-size:80px;opacity:.1}
        .detail-reward{font-size:1.6rem;font-weight:800;margin-top:6px}
        .detail-status{display:inline-block;padding:3px 10px;border-radius:40px;font-size:.65rem;font-weight:600;background:rgba(255,255,255,0.2);backdrop-filter:blur(4px);margin-bottom:8px}
        .info-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #eef2f8}
        .info-icon{width:28px;font-size:1rem;text-align:center}
        .info-content{flex:1}
        .info-label{font-size:.65rem;color:#64748b;margin-bottom:2px}
        .info-value{font-weight:600;color:#1e293b;cursor:pointer}
        .desc-section{background:#f8fafc;border-radius:20px;padding:12px;margin-top:12px}
        .form-group{margin-bottom:16px}
        .form-label{font-size:.85rem;font-weight:600;color:#1e293b;margin-bottom:6px;display:block}
        .form-input,.form-textarea{width:100%;padding:10px 14px;border-radius:20px;border:1px solid #e2e8f0;font-size:.9rem;outline:none;background:#fff}
        .form-textarea{min-height:80px}
        .btn-primary{background:linear-gradient(95deg,#059669,#047857);border:none;border-radius:60px;padding:12px;font-weight:600;color:#fff;width:100%;text-align:center;cursor:pointer;font-size:.95rem}
        .btn-primary:disabled{opacity:.6;cursor:not-allowed}
        .btn-secondary{background:#f1f5f9;color:#1e4a6b;border-radius:60px;padding:10px;font-weight:600;border:none;width:100%;cursor:pointer}
        .btn-danger{background:#fee2e2;color:#b91c1c;border-radius:60px;padding:6px 12px;font-weight:600;border:none;cursor:pointer}
        .btn-success{background:#10b981;color:#fff;border-radius:60px;padding:6px 12px;font-weight:600;border:none;cursor:pointer}
        .btn-phone{background:#10b981;color:#fff;border-radius:60px;padding:8px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;justify-content:center}
        .btn-nav{background:#3b82f6;color:#fff;border-radius:60px;padding:8px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;justify-content:center}
        .btn-location{background:#eef2ff;color:#1e4a6b;border-radius:40px;padding:6px 12px;font-weight:500;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
        .location-row{display:flex;gap:8px;align-items:center}
        .image-preview-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
        .preview-img-wrapper{position:relative;width:70px;height:70px;border-radius:16px;overflow:hidden;background:#f1f5f9;border:1px solid #e2e8f0}
        .preview-img-wrapper img,.preview-img-wrapper video{width:100%;height:100%;object-fit:cover}
        .remove-img-btn{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border-radius:50%;width:20px;height:20px;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .upload-btn{background:#f1f5f9;border:1px dashed #cbd5e1;border-radius:16px;padding:10px;text-align:center;cursor:pointer;margin-top:8px;font-size:.8rem}
        .profile-header{background:linear-gradient(135deg,#1e4a6b,#0f2b3d);border-radius:20px;margin:12px;padding:16px;color:#fff;display:flex;align-items:center;gap:12px;cursor:pointer}
        .profile-avatar{width:60px;height:60px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:600;overflow:hidden}
        .profile-avatar img{width:100%;height:100%;object-fit:cover}
        .stats-row{display:flex;background:#fff;margin:0 12px 12px;border-radius:20px;padding:12px;justify-content:space-around}
        .stat-item{text-align:center;flex:1;cursor:pointer}
        .stat-number{font-size:1.2rem;font-weight:800;color:#1e4a6b}
        .stat-label{font-size:.65rem;color:#64748b;margin-top:2px}
        .flex-between{display:flex;justify-content:space-between;align-items:center}
        .text-center{text-align:center}
        .mt-2{margin-top:8px}
        .empty-state{text-align:center;padding:30px 20px;color:#94a3b8}
        .loading{text-align:center;padding:30px;color:#94a3b8}
        .reward-badge{background:linear-gradient(135deg,#fef3c7,#fde68a);padding:3px 10px;border-radius:40px;font-weight:700;font-size:.75rem;color:#b45309}
        .task-meta{display:flex;gap:10px;font-size:.65rem;color:#6c7a91;margin-top:6px;flex-wrap:wrap}
        .task-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin-bottom:6px}
        .task-title{font-size:1rem;font-weight:700;color:#0f172a}
        .task-desc{font-size:.85rem;color:#475569;margin-bottom:6px}
        .distance-badge{background:#e6f7e6;color:#2b6e2f;padding:2px 8px;border-radius:20px;font-weight:500;font-size:.65rem}
        .slide-confirm,.slide-action{margin:12px 0;user-select:none}
        .slide-track{position:relative;width:100%;height:50px;background:#eef2ff;border-radius:50px;overflow:hidden;border:1px solid #cbd5e1;touch-action:none}
        .slide-thumb{position:absolute;left:0;top:0;width:70px;height:50px;background:linear-gradient(135deg,#1e4a6b,#0f2b3d);border-radius:50px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.6rem;touch-action:none;transition:none}
        .slide-text{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#1e4a6b;pointer-events:none;font-size:.85rem;gap:8px;z-index:1}
        .slide-confirm.completed .slide-track,.slide-action.completed .slide-track{background:#d1fae5;border-color:#059669}
        .countdown-timer{background:#fef3c7;border-radius:40px;padding:8px 12px;text-align:center;margin:12px 0;font-weight:700;color:#b45309;display:flex;align-items:center;justify-content:center;gap:6px;font-size:.9rem}
        .countdown-timer.warning{background:#fee2e2;color:#dc2626;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
        .custom-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
        .custom-modal-content{background:#fff;border-radius:28px;width:85%;max-width:320px;padding:20px;text-align:center}
        .custom-modal-content h3{margin-bottom:12px}
        .custom-modal-buttons{display:flex;gap:12px;margin-top:20px;justify-content:center}
        .custom-modal-buttons button{flex:1;padding:10px;border-radius:40px;border:none;font-weight:600;cursor:pointer}
        .custom-modal-buttons .confirm-btn{background:#1e4a6b;color:#fff}
        .custom-modal-buttons .cancel-btn{background:#e2e8f0;color:#1e293b}
        .toast-message{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;padding:8px 16px;border-radius:40px;font-size:.8rem;z-index:1100;pointer-events:none;animation:fadeOut 2s forwards}
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
        .chat-container{display:flex;flex-direction:column;height:calc(100vh - 120px);background:#f5f7fb}
        .chat-header-bar{background:#fff;padding:12px;border-bottom:1px solid #eef2f8;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
        .chat-back-btn{background:#f1f5f9;border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer}
        .chat-header-name{font-weight:700;font-size:1rem;color:#1e293b;flex:1}
        .chat-messages-area{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
        .chat-bubble{max-width:80%;display:flex;flex-direction:column;cursor:pointer;transition:background .2s}
        .chat-bubble:active{background:rgba(0,0,0,0.05)}
        .chat-bubble-mine{align-self:flex-end}
        .chat-bubble-other{align-self:flex-start}
        .bubble-text{padding:10px 14px;border-radius:20px;font-size:.85rem;line-height:1.4;word-break:break-word;background:#fff;border:1px solid #e2e8f0;border-bottom-left-radius:4px}
        .chat-bubble-mine .bubble-text{background:#1e4a6b;color:#fff;border-bottom-right-radius:4px;border:none}
        .bubble-time{font-size:.6rem;color:#94a3b8;margin-top:2px;margin-left:8px;margin-right:8px}
        .chat-bubble-mine .bubble-time{text-align:right}
        .chat-input-wrapper{background:#fff;border-top:1px solid #eef2f8;padding:10px 12px;border-radius:24px 24px 0 0}
        .flex-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
        .nego-input{flex:1;min-width:100px;padding:8px 12px;border-radius:30px;border:1px solid #e2e8f0;outline:none;background:#f8fafc}
        .nego-send-btn{background:#f59e0b;border:none;border-radius:30px;padding:6px 12px;font-weight:600;color:#fff;cursor:pointer;font-size:.8rem}
        .chat-action-row{display:flex;gap:8px;align-items:center}
        .chat-message-input{flex:1;padding:8px 12px;border-radius:30px;border:1px solid #e2e8f0;outline:none;background:#f8fafc;font-size:.9rem}
        .send-btn{background:#1e4a6b;border:none;border-radius:30px;padding:8px 16px;font-weight:600;color:#fff;cursor:pointer;font-size:.85rem}
        .task-card-in-chat{background:#f8fafc;border-radius:16px;padding:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:1px solid #e2e8f0}
        .category-bar,.sort-bar{display:flex;gap:10px;padding:8px 12px;background:#fff;border-bottom:1px solid #eef2f8;overflow-x:auto;white-space:nowrap}
        .category-chip,.sort-chip{background:#f1f5f9;padding:4px 10px;border-radius:40px;font-size:.7rem;color:#1e4a6b;cursor:pointer;display:inline-block}
        .category-chip.active,.sort-chip.active{background:#1e4a6b;color:#fff}
        .profile-collapse{background:#fff;border-radius:20px;margin:12px;overflow:hidden;border:1px solid #eef2f8}
        .collapse-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#fff;cursor:pointer}
        .collapse-header:active{background:#f8fafc}
        .collapse-title{font-weight:700;font-size:.9rem;color:#1e293b;display:flex;align-items:center;gap:6px}
        .collapse-icon{font-size:1rem;transition:transform .2s}
        .collapse-icon.open{transform:rotate(90deg)}
        .collapse-content{display:none;padding:0 16px 12px 16px;background:#fff;border-top:1px solid #eef2f8}
        .collapse-content.show{display:block}
        .profile-task-item{padding:10px 0;border-bottom:1px solid #eef2f8;cursor:pointer}
        .profile-task-item:last-child{border-bottom:none}
        .profile-task-title{font-weight:600;font-size:.85rem;color:#0f172a;display:inline-block}
        .profile-task-status{font-size:.65rem;display:inline-block;margin-left:6px;padding:2px 6px;border-radius:20px;background:#f1f5f9;color:#475569}
        .profile-task-status.available{background:#d1fae5;color:#065f46}
        .profile-task-status.ongoing{background:#fed7aa;color:#9a3412}
        .profile-task-status.completed{background:#e2e8f0;color:#334155}
        .profile-task-status.cancelled{background:#fee2e2;color:#b91c1c}
        .profile-task-amount{font-weight:700;color:#b45309;font-size:.85rem;text-align:right}
        .task-actions{margin-top:8px;display:flex;justify-content:flex-end;gap:8px}
        .logout-btn{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:60px;padding:12px;font-weight:600;font-size:.95rem;width:calc(100% - 24px);margin:12px;cursor:pointer}
        .progress-text{font-size:.7rem;color:#1e4a6b;margin-top:4px}
        .contact-buttons{display:flex;gap:12px;margin:12px 12px 0 12px}
        .contact-buttons button{flex:1}
        .progress-steps{display:flex;justify-content:space-between;margin:16px;position:relative}
        .progress-steps::before{content:'';position:absolute;top:24px;left:10%;right:10%;height:2px;background:#e2e8f0;z-index:0}
        .step{text-align:center;flex:1;position:relative;z-index:1;background:#fff;border-radius:30px;padding:6px 2px}
        .step-dot{width:32px;height:32px;background:#fff;border:2px solid #cbd5e1;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:1rem;background:#f1f5f9}
        .step.active .step-dot{background:#1e4a6b;border-color:#1e4a6b;color:#fff}
        .step.completed .step-dot{background:#059669;border-color:#059669;color:#fff}
        .step-label{font-size:.6rem;color:#64748b}
        .step.active .step-label{color:#1e4a6b;font-weight:600}
        .step.completed .step-label{color:#059669}
        .refresh-container{text-align:center;width:100%;padding:12px 0;background:transparent;font-size:.8rem;color:#64748b;position:relative;transition:transform .2s}
        .chat-refresh-indicator{text-align:center;padding:10px;font-size:.75rem;color:#64748b;background:transparent;width:100%}
        .image-preview-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
        .image-preview-modal img{max-width:90%;max-height:90%;object-fit:contain;transition:transform .2s}
        .image-preview-modal .close-preview{position:absolute;top:20px;right:20px;color:#fff;font-size:2rem;background:rgba(0,0,0,0.5);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <div id="loginPage" class="page active">
            <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
                <div class="card" style="width:100%;cursor:default;">
                    <div class="text-center"><div style="font-size:2.5rem;">💰</div><h2 style="color:#1e4a6b;">赏金集市 · 双向议价</h2><p style="color:#64748b;">悬赏任务 · 轻松赚钱</p></div>
                    <div class="form-group"><input type="text" id="loginUsername" class="form-input" placeholder="用户名" value="xiaoming"></div>
                    <div class="form-group"><input type="password" id="loginPassword" class="form-input" placeholder="密码" value="123456"></div>
                    <button class="btn-primary" id="doLoginBtn">登录</button>
                    <div class="text-center mt-2"><a href="#" id="showRegisterBtn" style="color:#1e4a6b;">注册账号</a></div>
                    <div class="text-center mt-2" style="font-size:0.7rem;">测试: xiaoming/123456 | hong/123456</div>
                    <div id="loginError" style="color:#ef4444; font-size:0.8rem; text-align:center; margin-top:8px;"></div>
                </div>
            </div>
        </div>
        <div id="registerPage" class="page">
            <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
                <div class="card" style="width:100%; cursor:default;">
                    <h3 class="text-center">注册账号</h3>
                    <div class="form-group"><input type="text" id="regUsername" class="form-input" placeholder="用户名"></div>
                    <div class="form-group"><input type="password" id="regPassword" class="form-input" placeholder="密码"></div>
                    <div class="form-group"><input type="password" id="regConfirmPwd" class="form-input" placeholder="确认密码"></div>
                    <div class="form-group"><input type="text" id="regNickname" class="form-input" placeholder="昵称"></div>
                    <div class="form-group"><input type="tel" id="regPhone" class="form-input" placeholder="手机号"></div>
                    <button class="btn-primary" id="doRegisterBtn">注册</button>
                    <div class="text-center mt-2"><a href="#" id="showLoginBtn" style="color:#1e4a6b;">返回登录</a></div>
                    <div id="registerError" style="color:#ef4444; font-size:0.8rem; text-align:center; margin-top:8px;"></div>
                </div>
            </div>
        </div>
        <div id="mainApp" style="display:none;">
            <div class="nav-header"><span class="logo">💰 赏金集市 · 双向议价</span><div><span class="header-balance" id="headerBalance">余额: ¥0</span></div></div>
            <div id="homePage" class="page" style="overflow-y:auto; height:calc(100vh - 120px);">
                <div class="category-bar" id="categoryBar"><span class="category-chip active" data-cat="all">全部</span><span class="category-chip" data-cat="取件">取件</span><span class="category-chip" data-cat="调试">调试</span><span class="category-chip" data-cat="跑腿">跑腿</span></div>
                <div class="sort-bar"><span class="sort-chip" data-sort="distance">距离最近</span><span class="sort-chip" data-sort="reward">赏金最高</span><span class="sort-chip active" data-sort="time">最新发布</span></div>
                <div id="refreshIndicator" class="refresh-container" style="display:none;">↓ 下拉刷新</div>
                <div id="homeContent" class="loading">加载中...</div>
            </div>
            <div id="detailPage" class="page"><div id="detailContainer"></div><div class="back-button" style="margin:8px 12px 20px;"><button class="btn-secondary" id="detailBackBtn" style="margin:0;">← 返回上一页</button></div></div>
            <div id="publishPage" class="page">
                <div class="card" style="cursor:default;">
                    <h3>✨ 发布悬赏</h3>
                    <div class="form-group"><input type="text" id="pubTitle" class="form-input" placeholder="标题"></div>
                    <div class="form-group"><textarea id="pubDesc" class="form-textarea" placeholder="描述"></textarea></div>
                    <div class="form-group"><label class="form-label">任务类目</label><select id="pubCategory" class="form-input"><option value="取件">取件</option><option value="调试">调试</option><option value="跑腿">跑腿</option><option value="其他">其他</option></select></div>
                    <div class="form-group"><input type="number" id="pubReward" class="form-input" placeholder="赏金 (¥)" min="0" step="1"></div>
                    <div class="form-group"><div class="location-row"><input type="text" id="pubAddress" class="form-input" placeholder="任务地点"><button class="btn-location" id="getLocationBtn" type="button">📍 定位</button></div><div style="font-size:0.7rem; color:#64748b; margin-top:4px;" id="locationHint">点击定位自动填入详细地址</div></div>
                    <div class="form-group"><div class="form-label">📎 图片/视频（最多3个）</div><div id="mediaPreview" class="image-preview-grid"></div><input type="file" id="mediaInput" accept="image/*,video/*" multiple style="display:none;"><div class="upload-btn" onclick="document.getElementById('mediaInput').click()">+ 选择文件</div></div>
                    <button class="btn-primary" id="doPublishBtn">🚀 发布任务</button>
                </div>
            </div>
            <div id="messagePage" class="page"><div id="messageContainer" class="loading">加载中...</div></div>
            <div id="profilePage" class="page"><div id="profileContainer" class="loading">加载中...</div></div>
            <div class="bottom-nav">
                <div class="nav-item" onclick="switchPage('home')"><span class="nav-icon">🏠</span><span>首页</span></div>
                <div class="nav-item" onclick="switchPage('publish')"><span class="nav-icon">✏️</span><span>发布</span></div>
                <div class="nav-item" onclick="switchPage('message')" id="navMessage"><span class="nav-icon">💬</span><span>消息</span><span id="msgBadge" class="msg-badge">0</span></div>
                <div class="nav-item" onclick="switchPage('profile')"><span class="nav-icon">👤</span><span>我的</span></div>
            </div>
        </div>
    </div>
</div>
<script>

    const getApiBase = () => {

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function calculateDistance(lat1,lng1,lat2,lng2) {
        const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLng=(lng2-lng1)*Math.PI/180;
        const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
        const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return (R*c).toFixed(1);
    }

    async function geocodeAddress(address) {
        if (!address) return null;
        if (geocodeCache.has(address)) return geocodeCache.get(address);
        try {
            const url = `https://restapi.amap.com/v3/geocode/geo?address=${encodeURIComponent(address)}&key=${AMAP_KEY}&output=JSON`;
            const resp = await fetch(url); const data = await resp.json();
            if (data.status==='1' && data.geocodes && data.geocodes.length>0) {
                const loc = data.geocodes[0].location.split(','); const lng=parseFloat(loc[0]), lat=parseFloat(loc[1]);
                const result={lat,lng}; geocodeCache.set(address,result); return result;
            } return null;
        } catch(e){ console.error('地理编码失败',e); return null; }
    }

    async function enrichTasksWithDistance(tasks) {
        if (!userLocation) return tasks;
        const enriched=[];
        for(let task of tasks){
            if(!task.locationAddress){ enriched.push({...task,distance:null}); continue; }
            const coords=await geocodeAddress(task.locationAddress);
            if(coords){ const distance=calculateDistance(userLocation.lat,userLocation.lng,coords.lat,coords.lng); enriched.push({...task,distance}); }
            else enriched.push({...task,distance:null});
        }
        return enriched;
    }

    async function getDetailedAddress(lat, lng) {

            const url = `https://restapi.amap.com/v3/geocode/regeo?output=json&location=${lng},${lat}&key=${AMAP_KEY}&radius=1000&extensions=all`;
            const res = await fetch(url);

            if (data.status === '1' && data.regeocode) {
                let formatted = data.regeocode.formatted_address;
                let streetNumber = data.regeocode.addressComponent.streetNumber?.street || '';
                let building = data.regeocode.addressComponent.building?.name || '';
                if (streetNumber) formatted += ' ' + streetNumber;
                if (building) formatted += ' ' + building;
                return formatted;
            }
            throw new Error('无法获取详细地址');
        } catch(e) {
            console.error('[逆地理编码] 失败，返回经纬度', e);
            return `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        }
    }

        img.ontouchstart = (e) => {
            if(e.touches.length === 2) {
                e.preventDefault();
                let startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                let onMove = (moveEvent) => {
                    if(moveEvent.touches.length !== 2) return;
                    let newDist = Math.hypot(moveEvent.touches[0].clientX - moveEvent.touches[1].clientX, moveEvent.touches[0].clientY - moveEvent.touches[1].clientY);
                    let newScale = scale * (newDist / startDist);
                    newScale = Math.min(3, Math.max(0.5, newScale));
                    img.style.transform = `scale(${newScale})`;
                };
                let onEnd = () => {
                    scale = parseFloat(img.style.transform.replace('scale(', '').replace(')', '')) || 1;
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('touchend', onEnd);
                };
                document.addEventListener('touchmove', onMove);
                document.addEventListener('touchend', onEnd);
            }
        };
    }

    function compressImage(file, quality=0.5, maxWidth=600, maxHeight=600) {
        return new Promise((resolve,reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width, height = img.height;
                    if(width > height) {
                        if(width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if(height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    resolve(dataUrl);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }
    async function handleMediaFiles(files) {
        let remain = 3 - pendingMedia.length;
        if(files.length > remain) {
            showAlert('提示', `最多上传3个，当前已有${pendingMedia.length}个`);
            files = Array.from(files).slice(0, remain);
        }
        for(let file of files) {
            if(!file.type.startsWith('image/') && !file.type.startsWith('video/')) continue;
            let dataURL;
            if(file.type.startsWith('image/')) {
                dataURL = await compressImage(file);
            } else {
                dataURL = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }
            pendingMedia.push({type: file.type.startsWith('image/')?'image':'video', dataURL, file});
            updateMediaPreview();
        }
        document.getElementById('mediaInput').value = '';
    }

    function initSlide(container, onComplete) {
        const track = container.querySelector('.slide-track');
        const thumb = container.querySelector('.slide-thumb');
        if (!track || !thumb) return;
        if (track.clientWidth===0 || thumb.clientWidth===0) { setTimeout(()=>initSlide(container,onComplete),100); return; }
        let startX=0, isDragging=false;
        const maxLeft = track.clientWidth - thumb.clientWidth;
        function setTransform(x) { thumb.style.transform = `translateX(${x}px)`; }
        function onMove(clientX) {
            if(!isDragging) return;
            let delta = clientX - startX;
            let newLeft = Math.min(maxLeft, Math.max(0, delta));
            setTransform(newLeft);
            if(newLeft >= maxLeft-5) {
                isDragging=false; container.classList.add('completed'); setTransform(maxLeft);
                document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp);
                document.removeEventListener('touchmove',onTouchMove); document.removeEventListener('touchend',onTouchEnd);
                if(onComplete) onComplete();
            }
        }
        function onMouseMove(e) { onMove(e.clientX); }
        function onMouseUp() { isDragging=false; setTransform(0); document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp); container.classList.remove('completed'); }
        function onTouchMove(e) { onMove(e.touches[0].clientX); e.preventDefault(); }
        function onTouchEnd() { isDragging=false; setTransform(0); document.removeEventListener('touchmove',onTouchMove); document.removeEventListener('touchend',onTouchEnd); container.classList.remove('completed'); }
        function onStart(clientX) { startX=clientX; isDragging=true; document.addEventListener('mousemove',onMouseMove); document.addEventListener('mouseup',onMouseUp); document.addEventListener('touchmove',onTouchMove); document.addEventListener('touchend',onTouchEnd); }
        thumb.addEventListener('mousedown',(e)=>{ e.preventDefault(); onStart(e.clientX); });
        thumb.addEventListener('touchstart',(e)=>{ e.preventDefault(); onStart(e.touches[0].clientX); });
        container.classList.remove('completed'); setTransform(0);
    }

    function startCountdown(estimatedMinutes, startTimestamp) {
        if(countdownTimer) clearInterval(countdownTimer);
        const countdownDiv = document.getElementById('countdownDisplay');
        if(!countdownDiv) return;
        const update = () => {
            const elapsed = (Date.now()-startTimestamp)/1000;
            const remaining = Math.max(0, estimatedMinutes*60 - elapsed);
            const mins = Math.floor(remaining/60), secs = Math.floor(remaining%60);
            if(remaining<=0) { countdownDiv.innerHTML='⏰ 预计已到达！请滑动确认到达'; countdownDiv.classList.add('warning'); clearInterval(countdownTimer); countdownTimer=null; }
            else { countdownDiv.innerHTML=`🚗 预计剩余时间: ${mins}分${secs.toString().padStart(2,'0')}秒`; if(remaining<60) countdownDiv.classList.add('warning'); else countdownDiv.classList.remove('warning'); }
        };
        update(); countdownTimer = setInterval(update, 1000);
    }

    function renderProgressSteps(task) {

            else if(task.travelStatus==='arrived') activeIndex=3;

        const steps = [{icon:'📋',label:'已接取'},{icon:'🚗',label:'出发'},{icon:'📍',label:'到达'},{icon:'📎',label:'提交凭证'},{icon:'✅',label:'结算'}];
        let html='<div class="progress-steps">';
        steps.forEach((step,idx)=>{
            const stepNum=idx+1;
            let statusClass='';
            if(stepNum<activeIndex) statusClass='completed';
            else if(stepNum===activeIndex) statusClass='active';
            html+=`<div class="step ${statusClass}"><div class="step-dot">${step.icon}</div><div class="step-label">${step.label}</div></div>`;
        });
        html+='</div>';
        return html;
    }

    async function submitProof(taskId, proofFiles) {
        const proofMedia=[];
        for(let file of proofFiles){
            const dataURL = await new Promise((resolve)=>{ const reader=new FileReader(); reader.onload=(e)=>resolve(e.target.result); reader.readAsDataURL(file); });
            proofMedia.push({type:file.type.startsWith('image/')?'image':'video', url:dataURL});
        }
        const result = await callApi(`/tasks/${taskId}/submit-proof`, {method:'POST', body:JSON.stringify({userId:currentUser.id, proofMedia})});
        return result;
    }

    async function publishTask() {
        if(!currentUser.idCardVerified){ showAlert('提示','请先实名认证'); return; }
        const title = document.getElementById('pubTitle').value.trim();
        if(!title){ showAlert('提示','请输入标题'); return; }
        const reward = parseFloat(document.getElementById('pubReward').value);
        if(isNaN(reward)||reward<=0){ showAlert('提示','请输入有效金额'); return; }
        if(reward>currentUser.balance){ showAlert('提示','余额不足'); return; }
        const locationAddress = document.getElementById('pubAddress').value.trim()||'未知';
        const mediaList = pendingMedia.map(m=>({type:m.type, url:m.dataURL}));
        const btn = document.getElementById('doPublishBtn');
        const originalText = btn.innerText;
        btn.innerText = '发布中...'; btn.disabled=true;
        try {
            const result = await callApi('/tasks', {method:'POST', body:JSON.stringify({
                title, description:document.getElementById('pubDesc').value, reward,
                publisherId:currentUser.id, publisherName:currentUser.nickname, publisherPhone:currentUser.phone,
                locationAddress, mediaList, category:document.getElementById('pubCategory').value
            })});
            if(result._id) {
                showToast('发布成功'); resetPublishForm(); await loadProfile(); refreshTaskList(); switchPage('home');
            } else showAlert('发布失败', result.error||'未知错误');
        } catch(err) { showAlert('发布出错', err.message); }
        finally { btn.innerText=originalText; btn.disabled=false; }
    }

    async function refreshMessagesOnly() {
        if(!chatState.messagesArea || !chatState.taskId) return;
        const messages = await callApi(`/messages/${chatState.taskId}`);
        if(!messages || !Array.isArray(messages)) return;
        const newCount = messages.length;
        const hasNew = newCount > (chatState.lastMessageCount || 0);
        chatState.lastMessageCount = newCount;
        let html = '';
        for(const m of messages) {
            const isMine = m.senderId === currentUser.id;
            const isNego = m.text && m.text.includes('💰议价请求:');
            const priceMatch = m.text.match(/¥(\d+)/);
            const negoPrice = priceMatch ? parseInt(priceMatch[1]) : null;
            html += `<div class="chat-bubble ${isMine?'chat-bubble-mine':'chat-bubble-other'}" data-message-id="${m._id}" data-is-mine="${isMine}"><div class="bubble-text">${escapeHtml(m.text)}</div><div class="bubble-time">${m.time||new Date(m.createdAt).toLocaleTimeString()}</div></div>`;
            if(!isMine && isNego && negoPrice && m.senderId !== 'system') {
                html += `<div style="display:flex; gap:8px; margin:4px 0 8px 12px;"><button class="btn-primary" style="padding:4px 10px; font-size:0.7rem;" onclick="respondToNego('${chatState.taskId}', ${negoPrice}, true)">✅ 同意议价</button><button class="btn-secondary" style="padding:4px 10px; font-size:0.7rem;" onclick="respondToNego('${chatState.taskId}', ${negoPrice}, false)">❌ 拒绝议价</button></div>`;
            }
        }
        chatState.messagesArea.innerHTML = html || '<div class="empty-state">暂无消息</div>';
        if(hasNew) chatState.messagesArea.scrollTop = chatState.messagesArea.scrollHeight;

        document.querySelectorAll('.chat-bubble').forEach(bubble => {
            const isMine = bubble.getAttribute('data-is-mine') === 'true';
            if(!isMine) return;
            const messageId = bubble.getAttribute('data-message-id');
            if(!messageId) return;
            let pressTimer = null;
            const startPress = (e) => {
                e.preventDefault();
                pressTimer = setTimeout(() => { showConfirm('删除消息', '确定要删除这条消息吗？', () => deleteMessage(messageId)); }, 500);
            };
            const cancelPress = () => { if(pressTimer) clearTimeout(pressTimer); };
            bubble.addEventListener('contextmenu', (e) => e.preventDefault());
            bubble.addEventListener('touchstart', startPress);
            bubble.addEventListener('touchend', cancelPress);
            bubble.addEventListener('touchmove', cancelPress);
            bubble.addEventListener('mousedown', startPress);
            bubble.addEventListener('mouseup', cancelPress);
            bubble.addEventListener('mouseleave', cancelPress);
        });
    }

    function initChatPullToRefresh() {
        const messagesArea = document.getElementById('chatMsgsArea');
        if(!messagesArea) return;
        let startY = 0, isRefreshing = false;
        let indicator = null;
        const createIndicator = () => {
            if(document.getElementById('chatRefreshIndicator')) return;
            const div = document.createElement('div');
            div.id = 'chatRefreshIndicator';
            div.className = 'chat-refresh-indicator';
            div.innerText = '↓ 下拉刷新';
            messagesArea.parentNode.insertBefore(div, messagesArea);
            return div;
        };
        messagesArea.addEventListener('touchstart', (e) => { if(messagesArea.scrollTop===0) startY = e.touches[0].clientY; });
        messagesArea.addEventListener('touchmove', (e) => {
            if(isRefreshing || messagesArea.scrollTop>0) return;
            const diff = e.touches[0].clientY - startY;
            if(diff>30) {
                e.preventDefault();
                indicator = indicator || createIndicator();
                if(indicator) { indicator.style.display='block'; indicator.style.transform=`translateY(${Math.min(diff-30,60)}px)`; }
            }
        });
        messagesArea.addEventListener('touchend', async () => {
            if(indicator && indicator.style.display==='block') {
                indicator.style.transform=''; indicator.style.display='none';
                isRefreshing=true; indicator.innerText='刷新中...'; indicator.style.display='block';
                await refreshMessagesOnly();
                isRefreshing=false; indicator.style.display='none'; indicator.innerText='↓ 下拉刷新';
            }
        });
    }

    function showChatView() {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById('messagePage').classList.add('active');
        const container = document.getElementById('messageContainer');
        container.innerHTML = `
            <div class="chat-container">
                <div class="chat-header-bar"><button class="chat-back-btn" id="chatBackBtn">←</button><span class="chat-header-name">${escapeHtml(chatState.otherName)}</span></div>
                <div class="task-card-in-chat" onclick="viewTask('${chatState.taskId}','message')"><div><strong>${escapeHtml(chatState.title)}</strong><br><span class="reward-badge">💰 ${chatState.reward}元</span></div><span>👉 详情</span></div>
                <div class="chat-messages-area" id="chatMsgsArea">加载中...</div>
                <div class="chat-input-wrapper"><div class="flex-row"><input type="number" id="negoPriceInput" class="nego-input" placeholder="💰议价 (当前¥${chatState.reward})" step="1"><button class="nego-send-btn" id="sendNegoBtn">发起议价</button></div><div class="chat-action-row"><input type="text" id="chatInput" class="chat-message-input" placeholder="输入消息..."><button class="send-btn" id="sendChatBtn">发送</button></div></div>
            </div>
        `;
        chatState.messagesArea = document.getElementById('chatMsgsArea');
        chatState.lastMessageCount = 0;
        document.getElementById('chatBackBtn').onclick = () => {
            closeChat();
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
            document.getElementById('messagePage').classList.add('active');
            renderMessageList();
            updateUnreadBadge();
        };
        document.getElementById('sendChatBtn').onclick = async () => {
            const txt = document.getElementById('chatInput').value.trim();
            if(!txt) return;
            await sendMessage(chatState.taskId, txt, false);
            document.getElementById('chatInput').value = '';
            await refreshMessagesOnly();
            await renderMessageList();
            updateUnreadBadge();
        };
        document.getElementById('sendNegoBtn').onclick = async () => {
            const price = parseFloat(document.getElementById('negoPriceInput').value);
            if(isNaN(price) || price<=0) { showAlert('提示','输入有效价格'); return; }
            await sendMessage(chatState.taskId, `💰议价请求:¥${price}`, true);
            showToast('议价请求已发送');
            document.getElementById('negoPriceInput').value = '';
            await refreshMessagesOnly();
            await renderMessageList();
            updateUnreadBadge();
        };
        refreshMessagesOnly();
        initChatPullToRefresh();
        if(chatState.pollInterval) clearInterval(chatState.pollInterval);
        chatState.pollInterval = setInterval(async () => { if(chatState.active && chatState.taskId) await refreshMessagesOnly(); }, 3000);
    }

    async function openChat(taskId, otherId, otherName, reward, title) {
        if(chatState.pollInterval) clearInterval(chatState.pollInterval);
        await callApi(`/messages/read/${taskId}/${currentUser.id}`, {method:'PUT'});
        chatState.active = true;
        chatState.taskId = taskId;
        chatState.otherId = otherId;
        chatState.otherName = otherName;
        chatState.reward = reward;
        chatState.title = title;
        showChatView();
        updateUnreadBadge();
    }

    window.respondToNego = async function(taskId, price, isAccept) {
        const task = await callApi(`/tasks/${taskId}`);
        if(task.status !== 'available') { showAlert('提示','任务已被接取'); return; }
        if(isAccept) {
            await callApi(`/tasks/${taskId}/reward`, {method:'PUT', body:JSON.stringify({userId: currentUser.id, reward: price})});
            await sendMessage(taskId, `✅ 同意议价，价格调整为 ¥${price}`, false);
            showToast(`已同意议价，新价格 ¥${price}`);
            if(chatState.taskId === taskId) chatState.reward = price;
            refreshTaskList();
            if(document.getElementById('detailPage').classList.contains('active')) viewTask(taskId, lastPage);
            renderMessageList();
            updateUnreadBadge();
        } else {
            await sendMessage(taskId, `❌ 拒绝了议价`, false);
            showToast('已拒绝议价');
            renderMessageList();
            updateUnreadBadge();
        }
        await refreshMessagesOnly();
    };

    function closeChat() {
        if(chatState.pollInterval) clearInterval(chatState.pollInterval);
        chatState.active = false;
        chatState.taskId = null;
        chatState.messagesArea = null;
    }

    async function renderMessageList() {
        if(!currentUser || !currentUser.id) {
            const container = document.getElementById('messageContainer');
            if(container) container.innerHTML = '<div class="card"><strong>📬 消息记录</strong><div class="empty-state">请先登录</div></div>';
            updateUnreadBadge();
            return;
        }
        const convs = await callApi(`/user/${currentUser.id}/conversations`);
        const container = document.getElementById('messageContainer');
        if(!convs || convs.length === 0) {
            container.innerHTML = '<div class="card"><strong>📬 消息记录</strong><div class="empty-state">暂无对话</div></div>';
            updateUnreadBadge();
            return;
        }
        let html = '<div class="card"><strong>📬 消息记录</strong></div>';
        for(let c of convs) {
            // 如果没有消息且未读为0，则跳过该会话（不显示）
            if (!c.lastMsg && c.unread === 0) continue;
            let unreadHtml = '';
            if(c.unread > 0) {
                unreadHtml = `<span style="background:#ef4444; color:white; border-radius:20px; padding:2px 6px; font-size:0.65rem; margin-left:6px;">${c.unread}</span>`;
            }
            html += `<div class="card task-card" data-taskid="${c.taskId}" data-otherid="${c.otherId}" data-othername="${escapeHtml(c.otherName)}" data-reward="${c.reward}" data-title="${escapeHtml(c.taskTitle)}">
                <div class="flex-between"><span>💬 ${escapeHtml(c.otherName)}${unreadHtml}</span><span class="reward-badge">¥${c.reward}</span></div>
                <div class="task-desc">${escapeHtml((c.lastMsg||'暂无消息').substring(0,50))}</div>
            </div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('#messageContainer .task-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.closest('.task-card')) {
                    const taskId = card.getAttribute('data-taskid');
                    const otherId = card.getAttribute('data-otherid');
                    const otherName = card.getAttribute('data-othername');
                    const reward = parseInt(card.getAttribute('data-reward'));
                    const title = card.getAttribute('data-title');
                    openChat(taskId, otherId, otherName, reward, title);
                }
            });
            let pressTimer = null;
            const startPress = (e) => {
                e.preventDefault();
                pressTimer = setTimeout(() => {
                    const taskId = card.getAttribute('data-taskid');
                    const otherName = card.getAttribute('data-othername');
                    showConfirm('删除聊天记录', `确定删除与 ${otherName} 的所有聊天记录吗？`, () => { deleteConversation(taskId); });
                }, 500);
            };
            const cancelPress = () => { if(pressTimer) clearTimeout(pressTimer); };
            card.addEventListener('contextmenu', (e) => e.preventDefault());
            card.addEventListener('touchstart', startPress);
            card.addEventListener('touchend', cancelPress);
            card.addEventListener('touchmove', cancelPress);
            card.addEventListener('mousedown', startPress);
            card.addEventListener('mouseup', cancelPress);
            card.addEventListener('mouseleave', cancelPress);
        });
        updateUnreadBadge();
    }

    async function updateUnreadBadge() {
        if(!currentUser) return;
        const convs = await callApi(`/user/${currentUser.id}/conversations`);
        const totalUnread = convs.reduce((sum,c) => sum + (c.unread||0), 0);
        const badge = document.getElementById('msgBadge');
        if(badge) { if(totalUnread>0) { badge.innerText = totalUnread>99?'99+':totalUnread; badge.style.display='inline-block'; } else badge.style.display='none'; }
    }

    // ---------- 个人主页 ----------
    async function loadProfile() {
        const container = document.getElementById('profileContainer');
        container.innerHTML = '<div class="loading">加载中...</div>';
        try {
            const user = await callApi(`/user/${currentUser.id}`);
            currentUser = {...currentUser, ...user};
            localStorage.setItem('user', JSON.stringify(currentUser));
            document.getElementById('headerBalance').innerHTML = `余额: ¥${(currentUser.balance||0).toFixed(2)}`;
            const allTasks = await callApi('/tasks/all');
            const myPub = (allTasks||[]).filter(t => t.publisherId === currentUser.id && t.status !== 'cancelled');
            const myAcc = (allTasks||[]).filter(t => t.takerId === currentUser.id && t.status !== 'completed' && t.status !== 'cancelled');
            const myCompleted = (allTasks||[]).filter(t => t.takerId === currentUser.id && t.status === 'completed');
            const pubHtml = myPub.map(t => {
                let progressText = '';
                if(t.status === 'ongoing') {
                    if(t.takerName) {
                        let step = '';
                        if(t.travelStatus === 'idle') step = '待出发';
                        else if(t.travelStatus === 'traveling') step = '行程中';
                        else if(t.travelStatus === 'arrived') step = '已到达，待凭证';
                        progressText = `<div class="progress-text">接取者: ${escapeHtml(t.takerName)} | 状态: ${step}</div>`;
                    } else progressText = `<div class="progress-text">暂无接取者</div>`;
                }
                let cancelBtn = '';
                if(t.status === 'available') {
                    cancelBtn = `<div class="task-actions"><button class="btn-danger" onclick="cancelTask('${t._id}')">取消任务</button></div>`;
                }
                let statusClass = '', statusText = '';
                if(t.status === 'available') { statusClass='available'; statusText='悬赏中'; }
                else if(t.status === 'ongoing') { statusClass='ongoing'; statusText='进行中'; }
                else if(t.status === 'completed') { statusClass='completed'; statusText='已完成'; }
                else if(t.status === 'cancelled') { statusClass='cancelled'; statusText='已取消'; }
                return `<div class="profile-task-item" onclick="viewTask('${t._id}','profile')"><div style="display:flex; justify-content:space-between; align-items:center;"><div><div class="profile-task-title">${escapeHtml(t.title)}</div><span class="profile-task-status ${statusClass}">${statusText}</span></div><div class="profile-task-amount">💰 ${t.reward}元</div></div>${progressText}${cancelBtn}</div>`;
            }).join('') || '<div class="empty-state">暂无</div>';
            const accHtml = myAcc.map(t => `<div class="profile-task-item" onclick="viewTask('${t._id}','profile')"><div style="display:flex; justify-content:space-between; align-items:center;"><div><div class="profile-task-title">${escapeHtml(t.title)}</div><span class="profile-task-status ongoing">${t.travelStatus==='idle'?'待出发':(t.travelStatus==='traveling'?'行程中':'已到达')}</span></div><div class="profile-task-amount">💰 ${t.reward}元</div></div><div class="task-actions"><button class="btn-danger" onclick="event.stopPropagation(); cancelAcceptedTask('${t._id}')">取消接取</button></div></div>`).join('') || '<div class="empty-state">暂无</div>';
            const completedHtml = myCompleted.map(t => `<div class="profile-task-item" onclick="viewTask('${t._id}','profile')"><div style="display:flex; justify-content:space-between; align-items:center;"><div><div class="profile-task-title">${escapeHtml(t.title)}</div><span class="profile-task-status completed">已完成</span></div><div class="profile-task-amount">💰 ${t.reward}元</div></div></div>`).join('') || '<div class="empty-state">暂无</div>';
            container.innerHTML = `
                <div class="profile-header" onclick="showEditProfileModal()"><div class="profile-avatar">${currentUser.avatar?`<img src="${currentUser.avatar}">`:`<span>${(currentUser.nickname||currentUser.username).charAt(0)}</span>`}</div><div><div class="profile-name">${escapeHtml(currentUser.nickname||currentUser.username)}</div><div class="profile-signature">${currentUser.signature||'点击编辑'}</div></div><span>✏️</span></div>
                <div class="stats-row"><div class="stat-item" onclick="showWalletDetail()"><div class="stat-number">💰</div><div class="stat-label">钱包</div></div><div class="stat-item" onclick="showCreditDetail()"><div class="stat-number">⭐${currentUser.credit||60}</div><div class="stat-label">信用</div></div><div class="stat-item" onclick="showRealNameAuth()"><div class="stat-number">🆔</div><div class="stat-label">${currentUser.idCardVerified?'已实名':'未实名'}</div></div></div>
                <div class="profile-collapse"><div class="collapse-header" data-target="pub"><div class="collapse-title">📤 我发布 <span style="font-size:0.7rem;">(${myPub.length})</span></div><span class="collapse-icon">▶</span></div><div class="collapse-content" id="collapse-pub">${pubHtml}</div></div>
                <div class="profile-collapse"><div class="collapse-header" data-target="acc"><div class="collapse-title">📥 我接取 <span style="font-size:0.7rem;">(${myAcc.length})</span></div><span class="collapse-icon">▶</span></div><div class="collapse-content" id="collapse-acc">${accHtml}</div></div>
                <div class="profile-collapse"><div class="collapse-header" data-target="completed"><div class="collapse-title">✅ 已完成 <span style="font-size:0.7rem;">(${myCompleted.length})</span></div><span class="collapse-icon">▶</span></div><div class="collapse-content" id="collapse-completed">${completedHtml}</div></div>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            `;
            document.querySelectorAll('.collapse-header').forEach(header => {
                header.addEventListener('click', () => {
                    const targetId = header.getAttribute('data-target');
                    const content = document.getElementById(`collapse-${targetId}`);
                    const icon = header.querySelector('.collapse-icon');
                    if(content.classList.contains('show')) { content.classList.remove('show'); icon.classList.remove('open'); }
                    else { content.classList.add('show'); icon.classList.add('open'); }
                });
            });
        } catch(err) { container.innerHTML = '<div class="empty-state">加载失败</div>'; }
    }

    function switchPage(page) {
        if(page === 'message') {
            if(chatState.active) closeChat();
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
            document.getElementById('messagePage').classList.add('active');
            renderMessageList();
            return;
        }
        if(page === 'publish') resetPublishForm();
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById(`${page}Page`).classList.add('active');
        if(page === 'home') refreshTaskList();
        if(page === 'profile') loadProfile();
    }

    document.getElementById('doLoginBtn').onclick = doLogin;
    document.getElementById('doRegisterBtn').onclick = async () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPwd').value;
        const nickname = document.getElementById('regNickname').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        if(!username || !password) { showAlert('提示','请填写用户名和密码'); return; }

        try {
            const result = await callApi('/register', {method:'POST', body:JSON.stringify({username,password,nickname,phone})});
            if(result.success) { showToast('注册成功，请登录'); document.getElementById('registerPage').classList.remove('active'); document.getElementById('loginPage').classList.add('active'); }
            else showAlert('注册失败', result.error);
        } catch(err) { showAlert('注册失败', err.message); }
    };
    document.getElementById('doPublishBtn').onclick = publishTask;
    document.getElementById('showRegisterBtn').onclick = (e) => { e.preventDefault(); document.getElementById('loginPage').classList.remove('active'); document.getElementById('registerPage').classList.add('active'); };
    document.getElementById('showLoginBtn').onclick = (e) => { e.preventDefault(); document.getElementById('registerPage').classList.remove('active'); document.getElementById('loginPage').classList.add('active'); };
    document.getElementById('getLocationBtn')?.addEventListener('click', getCurrentLocation);
    document.getElementById('mediaInput')?.addEventListener('change', (e) => { if(e.target.files.length) handleMediaFiles(e.target.files); });

    (async () => {
        const savedUser = localStorage.getItem('user');
        if(savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('loginPage').classList.remove('active');
            const loc = await getNativeUserLocation();
            if(loc) userLocation = loc;
            await refreshTaskList();
            loadProfile();
            initPullToRefresh();
            initFiltersAndCategories();
            renderMessageList();
            updateUnreadBadge();
            switchPage('home');
            initBackButtonHandler();
        }
    })();
</script>
</body>
</html>
