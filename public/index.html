<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>赏金集市 · 双向议价版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f5f7fb; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #1e293b; padding-bottom: 70px; }
        .app-container { width: 100%; background: #f5f7fb; min-height: 100vh; }
        .page { display: none; animation: fadeIn 0.25s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .nav-header { background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); padding: 12px 16px; border-bottom: 1px solid rgba(226,232,240,0.8); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 20; }
        .logo { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #0f2b3d, #1e4a6b); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .header-balance { background: #eef2ff; padding: 4px 10px; border-radius: 40px; font-size: 0.75rem; font-weight: 600; color: #1e4a6b; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 6px 20px 16px; border-top: 1px solid rgba(226,232,240,0.8); z-index: 20; }
        .nav-item { position: relative; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 0.7rem; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: #1e4a6b; transform: translateY(-2px); font-weight: 500; }
        .nav-icon { font-size: 1.4rem; }
        .msg-badge { position: absolute; top: -5px; right: -10px; background: #ef4444; color: white; border-radius: 20px; padding: 2px 6px; font-size: 0.6rem; min-width: 18px; text-align: center; display: none; }
        .card { background: #fff; border-radius: 20px; padding: 16px; margin: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #eef2f8; cursor: pointer; transition: transform 0.1s ease; }
        .task-card:active { transform: scale(0.98); }
        .detail-hero { background: linear-gradient(135deg, #1e4a6b, #0f2b3d); border-radius: 20px; margin: 12px 12px 0 12px; padding: 20px 16px; color: white; position: relative; overflow: hidden; }
        .detail-hero::before { content: "💰"; position: absolute; right: -20px; bottom: -20px; font-size: 80px; opacity: 0.1; }
        .detail-reward { font-size: 1.6rem; font-weight: 800; margin-top: 6px; }
        .detail-status { display: inline-block; padding: 3px 10px; border-radius: 40px; font-size: 0.65rem; font-weight: 600; background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); margin-bottom: 8px; }
        .info-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eef2f8; }
        .info-icon { width: 28px; font-size: 1rem; text-align: center; }
        .info-content { flex: 1; }
        .info-label { font-size: 0.65rem; color: #64748b; margin-bottom: 2px; }
        .info-value { font-weight: 600; color: #1e293b; cursor: pointer; }
        .desc-section { background: #f8fafc; border-radius: 20px; padding: 12px; margin-top: 12px; }
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 0.85rem; font-weight: 600; color: #1e293b; margin-bottom: 6px; display: block; }
        .form-input, .form-textarea { width: 100%; padding: 10px 14px; border-radius: 20px; border: 1px solid #e2e8f0; font-size: 0.9rem; outline: none; background: white; }
        .form-textarea { min-height: 80px; }
        .btn-primary { background: linear-gradient(95deg, #059669, #047857); border: none; border-radius: 60px; padding: 12px; font-weight: 600; color: white; width: 100%; text-align: center; cursor: pointer; font-size: 0.95rem; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { background: #f1f5f9; color: #1e4a6b; border-radius: 60px; padding: 10px; font-weight: 600; border: none; width: 100%; cursor: pointer; }
        .btn-danger { background: #fee2e2; color: #b91c1c; border-radius: 60px; padding: 6px 12px; font-weight: 600; border: none; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border-radius: 60px; padding: 6px 12px; font-weight: 600; border: none; cursor: pointer; }
        .btn-phone { background: #10b981; color: white; border-radius: 60px; padding: 8px; font-weight: 600; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; justify-content: center; }
        .btn-nav { background: #3b82f6; color: white; border-radius: 60px; padding: 8px; font-weight: 600; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; justify-content: center; }
        .btn-location { background: #eef2ff; color: #1e4a6b; border-radius: 40px; padding: 6px 12px; font-weight: 500; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .location-row { display: flex; gap: 8px; align-items: center; }
        .image-preview-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .preview-img-wrapper { position: relative; width: 70px; height: 70px; border-radius: 16px; overflow: hidden; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .preview-img-wrapper img, .preview-img-wrapper video { width: 100%; height: 100%; object-fit: cover; }
        .remove-img-btn { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .upload-btn { background: #f1f5f9; border: 1px dashed #cbd5e1; border-radius: 16px; padding: 10px; text-align: center; cursor: pointer; margin-top: 8px; font-size: 0.8rem; }
        .profile-header { background: linear-gradient(135deg, #1e4a6b, #0f2b3d); border-radius: 20px; margin: 12px; padding: 16px; color: white; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .profile-avatar { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 600; overflow: hidden; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .stats-row { display: flex; background: #fff; margin: 0 12px 12px; border-radius: 20px; padding: 12px; justify-content: space-around; }
        .stat-item { text-align: center; flex: 1; cursor: pointer; }
        .stat-number { font-size: 1.2rem; font-weight: 800; color: #1e4a6b; }
        .stat-label { font-size: 0.65rem; color: #64748b; margin-top: 2px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 8px; }
        .empty-state { text-align: center; padding: 30px 20px; color: #94a3b8; }
        .loading { text-align: center; padding: 30px; color: #94a3b8; }
        .reward-badge { background: linear-gradient(135deg, #fef3c7, #fde68a); padding: 3px 10px; border-radius: 40px; font-weight: 700; font-size: 0.75rem; color: #b45309; }
        .task-meta { display: flex; gap: 10px; font-size: 0.65rem; color: #6c7a91; margin-top: 6px; flex-wrap: wrap; }
        .task-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 6px; }
        .task-title { font-size: 1rem; font-weight: 700; color: #0f172a; }
        .task-desc { font-size: 0.85rem; color: #475569; margin-bottom: 6px; }
        .distance-badge { background: #e6f7e6; color: #2b6e2f; padding: 2px 8px; border-radius: 20px; font-weight: 500; font-size: 0.65rem; }
        .slide-confirm, .slide-action { margin: 12px 0; user-select: none; }
        .slide-track { position: relative; width: 100%; height: 50px; background: #eef2ff; border-radius: 50px; overflow: hidden; border: 1px solid #cbd5e1; touch-action: none; }
        .slide-thumb { position: absolute; left: 0; top: 0; width: 70px; height: 50px; background: linear-gradient(135deg, #1e4a6b, #0f2b3d); border-radius: 50px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.6rem; touch-action: none; transition: none; }
        .slide-text { position: absolute; left: 0; right: 0; top: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #1e4a6b; pointer-events: none; font-size: 0.85rem; gap: 8px; z-index: 1; }
        .slide-confirm.completed .slide-track, .slide-action.completed .slide-track { background: #d1fae5; border-color: #059669; }
        .countdown-timer { background: #fef3c7; border-radius: 40px; padding: 8px 12px; text-align: center; margin: 12px 0; font-weight: 700; color: #b45309; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.9rem; }
        .countdown-timer.warning { background: #fee2e2; color: #dc2626; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .modal-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; border-radius: 28px; width: 85%; max-width: 340px; padding: 20px; max-height: 80vh; overflow-y: auto; margin: 0 auto; }
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 120px); background: #f5f7fb; }
        .chat-header-bar { background: white; padding: 12px; border-bottom: 1px solid #eef2f8; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
        .chat-back-btn { background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        .chat-header-name { font-weight: 700; font-size: 1rem; color: #1e293b; flex: 1; }
        .chat-messages-area { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { max-width: 80%; display: flex; flex-direction: column; }
        .chat-bubble-mine { align-self: flex-end; }
        .chat-bubble-other { align-self: flex-start; }
        .bubble-text { padding: 10px 14px; border-radius: 20px; font-size: 0.85rem; line-height: 1.4; word-break: break-word; background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .chat-bubble-mine .bubble-text { background: #1e4a6b; color: white; border-bottom-right-radius: 4px; border: none; }
        .bubble-time { font-size: 0.6rem; color: #94a3b8; margin-top: 2px; margin-left: 8px; margin-right: 8px; }
        .chat-bubble-mine .bubble-time { text-align: right; }
        .chat-input-wrapper { background: white; border-top: 1px solid #eef2f8; padding: 10px 12px; border-radius: 24px 24px 0 0; }
        .flex-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .nego-input { flex: 1; min-width: 100px; padding: 8px 12px; border-radius: 30px; border: 1px solid #e2e8f0; outline: none; background: #f8fafc; }
        .nego-send-btn { background: #f59e0b; border: none; border-radius: 30px; padding: 6px 12px; font-weight: 600; color: white; cursor: pointer; font-size: 0.8rem; }
        .chat-action-row { display: flex; gap: 8px; align-items: center; }
        .chat-message-input { flex: 1; padding: 8px 12px; border-radius: 30px; border: 1px solid #e2e8f0; outline: none; background: #f8fafc; font-size: 0.9rem; }
        .send-btn { background: #1e4a6b; border: none; border-radius: 30px; padding: 8px 16px; font-weight: 600; color: white; cursor: pointer; font-size: 0.85rem; }
        .task-card-in-chat { background: #f8fafc; border-radius: 16px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #e2e8f0; }
        .category-bar, .sort-bar { display: flex; gap: 10px; padding: 8px 12px; background: white; border-bottom: 1px solid #eef2f8; overflow-x: auto; white-space: nowrap; }
        .category-chip, .sort-chip { background: #f1f5f9; padding: 4px 10px; border-radius: 40px; font-size: 0.7rem; color: #1e4a6b; cursor: pointer; display: inline-block; }
        .category-chip.active, .sort-chip.active { background: #1e4a6b; color: white; }
        .profile-collapse { background: #fff; border-radius: 20px; margin: 12px; overflow: hidden; border: 1px solid #eef2f8; }
        .collapse-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #fff; cursor: pointer; }
        .collapse-header:active { background: #f8fafc; }
        .collapse-title { font-weight: 700; font-size: 0.9rem; color: #1e293b; display: flex; align-items: center; gap: 6px; }
        .collapse-icon { font-size: 1rem; transition: transform 0.2s; }
        .collapse-icon.open { transform: rotate(90deg); }
        .collapse-content { display: none; padding: 0 16px 12px 16px; background: #fff; border-top: 1px solid #eef2f8; }
        .collapse-content.show { display: block; }
        .profile-task-item { padding: 10px 0; border-bottom: 1px solid #eef2f8; }
        .profile-task-item:last-child { border-bottom: none; }
        .profile-task-title { font-weight: 600; font-size: 0.85rem; color: #0f172a; cursor: pointer; display: inline-block; }
        .profile-task-status { font-size: 0.65rem; display: inline-block; margin-left: 6px; padding: 2px 6px; border-radius: 20px; background: #f1f5f9; color: #475569; }
        .profile-task-status.available { background: #d1fae5; color: #065f46; }
        .profile-task-status.ongoing { background: #fed7aa; color: #9a3412; }
        .profile-task-status.completed { background: #e2e8f0; color: #334155; }
        .profile-task-status.cancelled { background: #fee2e2; color: #b91c1c; }
        .profile-task-amount { font-weight: 700; color: #b45309; font-size: 0.85rem; text-align: right; }
        .task-actions { margin-top: 8px; display: flex; justify-content: flex-end; gap: 8px; }
        .logout-btn { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; border-radius: 60px; padding: 12px; font-weight: 600; font-size: 0.95rem; width: calc(100% - 24px); margin: 12px; cursor: pointer; }
        .progress-text { font-size: 0.7rem; color: #1e4a6b; margin-top: 4px; }
        .contact-buttons { display: flex; gap: 12px; margin: 12px 12px 0 12px; }
        .contact-buttons button { flex: 1; }
        .progress-steps { display: flex; justify-content: space-between; margin: 16px; position: relative; }
        .progress-steps::before { content: ''; position: absolute; top: 24px; left: 10%; right: 10%; height: 2px; background: #e2e8f0; z-index: 0; }
        .step { text-align: center; flex: 1; position: relative; z-index: 1; background: #fff; border-radius: 30px; padding: 6px 2px; }
        .step-dot { width: 32px; height: 32px; background: white; border: 2px solid #cbd5e1; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-size: 1rem; background: #f1f5f9; }
        .step.active .step-dot { background: #1e4a6b; border-color: #1e4a6b; color: white; }
        .step.completed .step-dot { background: #059669; border-color: #059669; color: white; }
        .step-label { font-size: 0.6rem; color: #64748b; }
        .step.active .step-label { color: #1e4a6b; font-weight: 600; }
        .step.completed .step-label { color: #059669; }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <!-- 登录页面 -->
        <div id="loginPage" class="page active">
            <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
                <div class="card" style="width:100%; cursor:default;">
                    <div class="text-center">
                        <div style="font-size:2.5rem;">💰</div>
                        <h2 style="color:#1e4a6b;">赏金集市 · 双向议价</h2>
                        <p style="color:#64748b;">悬赏任务 · 轻松赚钱</p>
                    </div>
                    <div class="form-group"><input type="text" id="loginUsername" class="form-input" placeholder="用户名" value="xiaoming"></div>
                    <div class="form-group"><input type="password" id="loginPassword" class="form-input" placeholder="密码" value="123456"></div>
                    <button class="btn-primary" id="doLoginBtn">登录</button>
                    <div class="text-center mt-2"><a href="#" id="showRegisterBtn" style="color:#1e4a6b;">注册账号</a></div>
                    <div class="text-center mt-2" style="font-size:0.7rem;">测试: xiaoming/123456 | hong/123456</div>
                    <div id="loginError" style="color:#ef4444; font-size:0.8rem; text-align:center; margin-top:8px;"></div>
                    <hr style="margin: 12px 0;">
                    <button class="btn-primary" id="initDataBtn" style="background:#eef2ff; color:#1e4a6b;">📦 初始化测试数据</button>
                </div>
            </div>
        </div>
        
        <!-- 注册页面 -->
        <div id="registerPage" class="page">
            <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
                <div class="card" style="width:100%; cursor:default;">
                    <h3 class="text-center">注册账号</h3>
                    <div class="form-group"><input type="text" id="regUsername" class="form-input" placeholder="用户名"></div>
                    <div class="form-group"><input type="password" id="regPassword" class="form-input" placeholder="密码"></div>
                    <div class="form-group"><input type="password" id="regConfirmPwd" class="form-input" placeholder="确认密码"></div>
                    <div class="form-group"><input type="text" id="regNickname" class="form-input" placeholder="昵称"></div>
                    <div class="form-group"><input type="tel" id="regPhone" class="form-input" placeholder="手机号"></div>
                    <button class="btn-primary" id="doRegisterBtn">注册</button>
                    <div class="text-center mt-2"><a href="#" id="showLoginBtn" style="color:#1e4a6b;">返回登录</a></div>
                    <div id="registerError" style="color:#ef4444; font-size:0.8rem; text-align:center; margin-top:8px;"></div>
                </div>
            </div>
        </div>
        
        <!-- 主应用 -->
        <div id="mainApp" style="display:none;">
            <div class="nav-header">
                <span class="logo">💰 赏金集市 · 双向议价</span>
                <div><span class="header-balance" id="headerBalance">余额: ¥0</span></div>
            </div>
            <div id="homePage" class="page" style="overflow-y:auto; height:calc(100vh - 120px);">
                <div class="category-bar" id="categoryBar">
                    <span class="category-chip active" data-cat="all">全部</span>
                    <span class="category-chip" data-cat="取件">取件</span>
                    <span class="category-chip" data-cat="调试">调试</span>
                    <span class="category-chip" data-cat="跑腿">跑腿</span>
                </div>
                <div class="sort-bar">
                    <span class="sort-chip" data-sort="distance">距离最近</span>
                    <span class="sort-chip" data-sort="reward">赏金最高</span>
                    <span class="sort-chip active" data-sort="time">最新发布</span>
                </div>
                <div id="refreshIndicator" class="refresh-container" style="display:none;">↓ 下拉刷新</div>
                <div id="homeContent" class="loading">加载中...</div>
            </div>
            <div id="detailPage" class="page"><div id="detailContainer"></div><div class="back-button" style="margin:8px 12px 20px;"><button class="btn-secondary" style="margin:0;" onclick="switchPage('home')">← 返回首页</button></div></div>
            <div id="publishPage" class="page">
                <div class="card" style="cursor:default;">
                    <h3>✨ 发布悬赏</h3>
                    <div class="form-group"><input type="text" id="pubTitle" class="form-input" placeholder="标题"></div>
                    <div class="form-group"><textarea id="pubDesc" class="form-textarea" placeholder="描述"></textarea></div>
                    <div class="form-group"><label class="form-label">任务类目</label>
                        <select id="pubCategory" class="form-input">
                            <option value="取件">取件</option>
                            <option value="调试">调试</option>
                            <option value="跑腿">跑腿</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group"><input type="number" id="pubReward" class="form-input" placeholder="赏金 (¥)" min="0" step="1"></div>
                    <div class="form-group">
                        <div class="location-row">
                            <input type="text" id="pubAddress" class="form-input" placeholder="任务地点">
                            <button class="btn-location" id="getLocationBtn" type="button">📍 定位</button>
                        </div>
                        <div style="font-size:0.7rem; color:#64748b; margin-top:4px;" id="locationHint">点击定位自动填入街道门牌</div>
                    </div>
                    <div class="form-group">
                        <div class="form-label">📎 图片/视频（最多3个）</div>
                        <div id="mediaPreview" class="image-preview-grid"></div>
                        <input type="file" id="mediaInput" accept="image/*,video/*" multiple style="display:none;">
                        <div class="upload-btn" onclick="document.getElementById('mediaInput').click()">+ 选择文件</div>
                    </div>
                    <button class="btn-primary" id="doPublishBtn">🚀 发布任务</button>
                </div>
            </div>
            <div id="messagePage" class="page"><div id="messageContainer" class="loading">加载中...</div></div>
            <div id="profilePage" class="page"><div id="profileContainer" class="loading">加载中...</div></div>
            <div class="bottom-nav">
                <div class="nav-item" onclick="switchPage('home')"><span class="nav-icon">🏠</span><span>首页</span></div>
                <div class="nav-item" onclick="switchPage('publish')"><span class="nav-icon">✏️</span><span>发布</span></div>
                <div class="nav-item" onclick="switchPage('message')" id="navMessage">
                    <span class="nav-icon">💬</span>
                    <span>消息</span>
                    <span id="msgBadge" class="msg-badge">0</span>
                </div>
                <div class="nav-item" onclick="switchPage('profile')"><span class="nav-icon">👤</span><span>我的</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== 配置 ====================
    const API_BASE = '/api';
    let currentUser = null;
    let pendingMedia = [];
    let userLocation = null; // {lat, lng}
    let allTasks = [];
    let currentCategory = 'all';

    const locationCoords = {

        '徐家汇': { lat: 31.1987, lng: 121.4342 },

        return locationCoords['默认'];
    }
    
    function calculateDistance(lat1, lng1, lat2, lng2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return (R * c).toFixed(1);
    }
    
    function getTravelTimeMinutes(address) {
        if (!userLocation) return 15;
        const coords = getTaskCoords(address);
        const dist = parseFloat(calculateDistance(userLocation.lat, userLocation.lng, coords.lat, coords.lng));
        if (isNaN(dist)) return 15;
        return Math.min(60, Math.max(5, Math.round(dist * 2)));
    }

    // 图片压缩（优化：降低质量至0.5，尺寸缩小至600px）
    function compressImage(file, quality = 0.5, maxWidth = 600, maxHeight = 600) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    resolve(dataUrl);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }
    
    // 处理媒体文件（最多3个）
    async function handleMediaFiles(files) {
        let remain = 3 - pendingMedia.length;
        if (files.length > remain) { alert(`最多上传3个，当前已有${pendingMedia.length}个`); files = Array.from(files).slice(0, remain); }
        for (let file of files) {
            if (!file.type.startsWith('image/') && !file.type.startsWith('video/')) continue;
            let dataURL;
            if (file.type.startsWith('image/')) {
                dataURL = await compressImage(file);
            } else {
                dataURL = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }
            pendingMedia.push({ type: file.type.startsWith('image/') ? 'image' : 'video', dataURL, file });
            updateMediaPreview();
        }
        document.getElementById('mediaInput').value = '';
    }

        document.querySelectorAll('#mediaPreview .remove-img-btn').forEach(btn => {

    // 高精度定位
    async function getPreciseLocation() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject('浏览器不支持定位');
                return;
            }
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=zh`);
                        const geoData = await geoRes.json();
                        if (geoData && (geoData.city || geoData.locality)) {
                            let address = geoData.city || geoData.locality || '';
                            if (geoData.principalSubdivision) address = geoData.principalSubdivision + (address ? ' ' + address : '');
                            if (geoData.street) address += (address ? ' ' : '') + geoData.street;
                            if (geoData.houseNumber) address += (address ? ' ' : '') + geoData.houseNumber;
                            if (address && address !== 'Unnamed Road') {
                                resolve(address);
                                return;
                            }
                        }
                        throw new Error();
                    } catch(e) {
                        resolve(`${latitude.toFixed(6)}, ${longitude.toFixed(6)}`);
                    }
                },
                (err) => {
                    if (err.code === 1) reject('用户拒绝定位权限，请手动输入地址');
                    else reject(err.message);
                }
            );
        });
    }

    function initPullToRefresh() {

        homePage.addEventListener('touchstart', (e) => {
            if (homePage.scrollTop === 0) startY = e.touches[0].clientY;
        });
        homePage.addEventListener('touchmove', (e) => {
            if (isRefreshing || homePage.scrollTop > 0) return;
            const diff = e.touches[0].clientY - startY;
            if (diff > 30) {
                e.preventDefault();
                indicator.style.display = 'block';
                indicator.style.transform = `translateY(${Math.min(diff, 60)}px)`;
            }
        });
        homePage.addEventListener('touchend', async () => {
            if (indicator.style.display === 'block') {
                indicator.style.transform = '';
                indicator.style.display = 'none';
                isRefreshing = true;
                indicator.innerText = '刷新中...';
                indicator.style.display = 'block';
                await refreshTaskList();
                isRefreshing = false;
                indicator.style.display = 'none';

    // 滑动组件
    function initSlide(container, onComplete) {
        const track = container.querySelector('.slide-track');
        const thumb = container.querySelector('.slide-thumb');
        if (!track || !thumb) return;
        thumb.style.transition = 'none';
        let startX = 0, startLeft = 0, isDragging = false;
        const maxLeft = track.clientWidth - thumb.clientWidth;
        const onMove = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let newLeft = startLeft + (clientX - startX);
            newLeft = Math.min(maxLeft, Math.max(0, newLeft));
            thumb.style.left = newLeft + 'px';
            if (newLeft >= maxLeft - 5) {
                isDragging = false;
                container.classList.add('completed');
                thumb.style.left = maxLeft + 'px';
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onUp);
                if (onComplete) onComplete();
            }
        };
        const onUp = () => {
            if (isDragging) {
                thumb.style.left = '0px';
                isDragging = false;
                container.classList.remove('completed');
            }
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onUp);
        };
        const onStart = (e) => {
            e.preventDefault();
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            startLeft = parseInt(thumb.style.left, 10) || 0;
            isDragging = true;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
            document.addEventListener('touchmove', onMove);
            document.addEventListener('touchend', onUp);
        };
        thumb.addEventListener('mousedown', onStart);
        thumb.addEventListener('touchstart', onStart);
        container.classList.remove('completed');
        thumb.style.left = '0px';
    }
    
    function startCountdown(estimatedMinutes, startTimestamp) {
        if (countdownTimer) clearInterval(countdownTimer);
        const countdownDiv = document.getElementById('countdownDisplay');
        if (!countdownDiv) return;
        const update = () => {
            const elapsed = (Date.now() - startTimestamp) / 1000;
            const remaining = Math.max(0, estimatedMinutes * 60 - elapsed);
            const mins = Math.floor(remaining / 60), secs = Math.floor(remaining % 60);
            if (remaining <= 0) {
                countdownDiv.innerHTML = '⏰ 预计已到达！请滑动确认到达';
                countdownDiv.classList.add('warning');
                clearInterval(countdownTimer);
                countdownTimer = null;
            } else {
                countdownDiv.innerHTML = `🚗 预计剩余时间: ${mins}分${secs.toString().padStart(2,'0')}秒`;
                if (remaining < 60) countdownDiv.classList.add('warning'); else countdownDiv.classList.remove('warning');
            }
        };
        update();
        countdownTimer = setInterval(update, 1000);
    }
    
    function renderProgressSteps(task) {
        if (!task.takerId) return '';
        let activeIndex = 0;
        if (task.status === 'ongoing') {
            if (task.travelStatus === 'idle') activeIndex = 1;
            else if (task.travelStatus === 'traveling') activeIndex = 2;
            else if (task.travelStatus === 'arrived') activeIndex = 3;
            if (task.takerCompleted) activeIndex = 4;
        } else if (task.status === 'completed') activeIndex = 5;
        const steps = [
            { icon: '📋', label: '已接取' }, { icon: '🚗', label: '出发' },
            { icon: '📍', label: '到达' }, { icon: '📎', label: '提交凭证' }, { icon: '✅', label: '结算' }
        ];
        let html = '<div class="progress-steps">';
        steps.forEach((step, idx) => {
            const stepNum = idx + 1;
            let statusClass = '';
            if (stepNum < activeIndex) statusClass = 'completed';
            else if (stepNum === activeIndex) statusClass = 'active';
            html += `<div class="step ${statusClass}"><div class="step-dot">${step.icon}</div><div class="step-label">${step.label}</div></div>`;
        });
        html += '</div>';
        return html;
    }

                    ${task.publisherPhone ? `<button class="btn-phone" id="callPublisherPhoneBtn" style="flex:1;">📞 拨打电话</button>` : `<button class="btn-phone" disabled style="flex:1; opacity:0.6;">📞 无手机号</button>`}
                </div>
            `;
        }
        
        if (task.status === 'ongoing' && isMine && task.takerId) {
            detailHtml += `<div class="contact-buttons"><button class="btn-primary" id="contactTakerBtn">💬 联系接取者</button><button class="btn-phone" id="callTakerBtn">📞 拨打接取者电话</button></div>`;
        }
        
        if (task.status === 'available' && !isMine) detailHtml += `<div style="margin:8px 12px 20px;"><div class="slide-confirm" id="slideAcceptWrapper"><div class="slide-track"><div class="slide-thumb">→</div><div class="slide-text">👉 滑动接取任务 👈</div></div></div></div>`;
        
        if (task.status === 'ongoing' && isTaker) {
            if (task.locationAddress) {
                const coords = getTaskCoords(task.locationAddress);
                detailHtml += `<div style="margin:8px 12px;"><button class="btn-nav" id="navigateBtn" data-task-lat="${coords.lat}" data-task-lng="${coords.lng}" data-task-addr="${escapeHtml(task.locationAddress)}">🧭 高德导航</button></div>`;
            }
            if (task.travelStatus === 'idle') detailHtml += `<div class="slide-action" id="slideStartWrapper"><div class="slide-track"><div class="slide-thumb">→</div><div class="slide-text">🚗 滑动出发 🚗</div></div></div>`;
            else if (task.travelStatus === 'traveling') {
                detailHtml += `<div id="countdownDisplay" class="countdown-timer">计算中...</div>`;
                detailHtml += `<div class="slide-action" id="slideArriveWrapper"><div class="slide-track"><div class="slide-thumb">→</div><div class="slide-text">📍 滑动到达 📍</div></div></div>`;
            } else if (task.travelStatus === 'arrived' && !task.takerCompleted) {
                detailHtml += `<div class="slide-action" id="slideCompleteWrapper"><div class="slide-track"><div class="slide-thumb">→</div><div class="slide-text">📎 滑动并上传凭证完成 ✅</div></div></div>`;
            }
            detailHtml += `<div style="margin:8px 12px;"><button class="btn-danger" id="cancelAcceptBtn">❌ 取消接取</button></div>`;
        }
        
        // 发布者确认完成按钮
        if (task.status === 'ongoing' && task.takerCompleted && isMine) {
            detailHtml += `<div style="margin:8px 12px;"><button class="btn-primary" id="confirmCompleteBtn">✅ 确认完成并支付赏金</button></div>`;
        }
        
        document.getElementById('detailContainer').innerHTML = detailHtml;
        
        const taskIdStr = task._id.toString();
        document.getElementById('publisherName')?.addEventListener('click', () => {
            const modal = document.createElement('div');
            modal.className = 'modal-mask';
            modal.innerHTML = `<div class="modal-content"><h3>发布者资料</h3><div>昵称: ${escapeHtml(publisherInfo.nickname)}</div><div>信用: ${publisherInfo.credit}</div><div>家乡: ${publisherInfo.hometown || '未填写'}</div><div>签名: ${publisherInfo.signature || '无'}</div><button onclick="this.closest('.modal-mask').remove()">关闭</button></div>`;
            document.body.appendChild(modal);
        });
        document.getElementById('takerInfoRow')?.addEventListener('click', async () => {
            const takerInfo = await callApi(`/user/${task.takerId}`);
            const modal = document.createElement('div');
            modal.className = 'modal-mask';
            modal.innerHTML = `<div class="modal-content"><h3>接取者资料</h3><div>昵称: ${escapeHtml(takerInfo.nickname)}</div><div>信用: ${takerInfo.credit}</div><div>家乡: ${takerInfo.hometown || '未填写'}</div><div>签名: ${takerInfo.signature || '无'}</div><button onclick="this.closest('.modal-mask').remove()">关闭</button></div>`;
            document.body.appendChild(modal);
        });
        document.getElementById('contactPublisherBeforeAcceptBtn')?.addEventListener('click', () => openChat(taskIdStr, task.publisherId, task.publisherName, task.reward, task.title));
        document.getElementById('contactTakerBtn')?.addEventListener('click', () => openChat(taskIdStr, task.takerId, task.takerName, task.reward, task.title));
        document.getElementById('contactPublisherBtn')?.addEventListener('click', () => openChat(taskIdStr, task.publisherId, task.publisherName, task.reward, task.title));
        const callPublisherPhoneBtn = document.getElementById('callPublisherPhoneBtn');
        if (callPublisherPhoneBtn && callPublisherPhoneBtn.getAttribute('disabled') !== 'disabled') {
            callPublisherPhoneBtn.onclick = () => { window.location.href = `tel:${task.publisherPhone}`; };
        }
        const callTakerBtn = document.getElementById('callTakerBtn');
        if (callTakerBtn) {
            callTakerBtn.onclick = async () => {
                const takerInfo = await callApi(`/user/${task.takerId}`);
                if (takerInfo.phone) window.location.href = `tel:${takerInfo.phone}`;
                else alert('接取者未绑定手机号');
            };
        }
        
        const navBtn = document.getElementById('navigateBtn');
        if (navBtn) {
            navBtn.onclick = async () => {
                try {
                    const currentPos = await getCurrentUserLocation();
                    const destLat = parseFloat(navBtn.getAttribute('data-task-lat'));
                    const destLng = parseFloat(navBtn.getAttribute('data-task-lng'));
                    const destAddr = navBtn.getAttribute('data-task-addr');
                    const url = `https://uri.amap.com/navigation?from=${currentPos.lng},${currentPos.lat}&to=${destLng},${destLat},${encodeURIComponent(destAddr)}&mode=car&callnative=1`;
                    window.open(url, '_blank');
                } catch (err) {
                    alert('无法获取您的位置：' + err);
                }
            };
        }
        
        const slideAccept = document.getElementById('slideAcceptWrapper');
        if (slideAccept) initSlide(slideAccept, async () => {
            const res = await callApi(`/tasks/${taskId}/accept`, { method: 'PUT', body: JSON.stringify({ takerId: currentUser.id, takerName: currentUser.nickname }) });
            if (res.success) { alert('接取成功'); refreshTaskList(); loadProfile(); viewTask(taskId); } else alert(res.error);
        });
        const slideStart = document.getElementById('slideStartWrapper');
        if (slideStart) initSlide(slideStart, async () => {
            const minutes = getTravelTimeMinutes(task.locationAddress);
            const result = await callApi(`/tasks/${taskId}/status`, { method: 'PUT', body: JSON.stringify({ travelStatus: 'traveling', estimatedMinutes: minutes, travelStartTime: Date.now() }) });
            if (result.success) { alert('出发！'); viewTask(taskId); } else alert('操作失败');
        });
        const slideArrive = document.getElementById('slideArriveWrapper');
        if (slideArrive) {
            if (task.travelStartTime && task.estimatedMinutes) startCountdown(task.estimatedMinutes, task.travelStartTime);
            initSlide(slideArrive, async () => {
                const result = await callApi(`/tasks/${taskId}/status`, { method: 'PUT', body: JSON.stringify({ travelStatus: 'arrived' }) });
                if (result.success) { if (countdownTimer) clearInterval(countdownTimer); alert('已到达目的地！'); viewTask(taskId); } else alert('操作失败');
            });
        }
        const slideComplete = document.getElementById('slideCompleteWrapper');
        if (slideComplete) {
            initSlide(slideComplete, async () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*,video/*';
                input.multiple = true;
                input.onchange = async (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) return;
                    const result = await submitProof(taskIdStr, files);
                    if (result.success) {
                        alert('凭证已提交，等待发布者确认');
                        refreshTaskList();
                        loadProfile();
                        viewTask(taskId);
                    } else {
                        alert('提交失败：' + (result.error || '未知错误'));
                    }
                };
                input.click();
            });
        }
        const cancelAcceptBtn = document.getElementById('cancelAcceptBtn');
        if (cancelAcceptBtn) cancelAcceptBtn.onclick = async () => {
            if (confirm('取消接取将扣除5信用分')) {
                const res = await callApi(`/tasks/${taskId}/cancel-accept`, { method: 'PUT', body: JSON.stringify({ userId: currentUser.id }) });
                if (res.success) { alert('已取消'); loadProfile(); refreshTaskList(); switchPage('home'); } else alert(res.error);
            }
        };
        const confirmCompleteBtn = document.getElementById('confirmCompleteBtn');
        if (confirmCompleteBtn) {
            confirmCompleteBtn.onclick = async () => {
                if (confirm('确认任务已完成？赏金将支付给接取者。')) {
                    const res = await callApi(`/tasks/${taskId}/confirm-payment`, { method: 'POST', body: JSON.stringify({ userId: currentUser.id }) });
                    if (res.success) {
                        alert('结算成功');
                        viewTask(taskId);
                        refreshTaskList();
                        loadProfile();
                    } else alert(res.error);
                }
            };
        }
        switchPage('detail');
    };
    
    // ==================== 消息相关 ====================
    async function sendMessage(taskId, text, isNego = false) {
        await callApi('/messages', {
            method: 'POST',
            body: JSON.stringify({ taskId, senderId: currentUser.id, senderName: currentUser.nickname, text, isNego })
        });
    }
    
    async function refreshMessagesOnly() {
        if (!chatState.messagesArea || !chatState.taskId) return;
        const messages = await callApi(`/messages/${chatState.taskId}`);
        if (!messages || !Array.isArray(messages)) return;
        const newCount = messages.length;
        const hasNew = newCount > (chatState.lastMessageCount || 0);
        chatState.lastMessageCount = newCount;
        let html = '';
        for (const m of messages) {
            const isMine = m.senderId === currentUser.id;
            const isNego = m.text && m.text.includes('💰议价请求:');
            const priceMatch = m.text.match(/¥(\d+)/);
            const negoPrice = priceMatch ? parseInt(priceMatch[1]) : null;
            html += `<div class="chat-bubble ${isMine ? 'chat-bubble-mine' : 'chat-bubble-other'}"><div class="bubble-text">${escapeHtml(m.text)}</div><div class="bubble-time">${m.time || new Date(m.createdAt).toLocaleTimeString()}</div></div>`;
            if (!isMine && isNego && negoPrice && m.senderId !== 'system') {
                html += `<div style="display:flex; gap:8px; margin:4px 0 8px 12px;"><button class="btn-primary" style="padding:4px 10px; font-size:0.7rem;" onclick="respondToNego('${chatState.taskId}', ${negoPrice}, true)">✅ 同意议价</button><button class="btn-secondary" style="padding:4px 10px; font-size:0.7rem;" onclick="respondToNego('${chatState.taskId}', ${negoPrice}, false)">❌ 拒绝议价</button></div>`;
            }
        }
        chatState.messagesArea.innerHTML = html || '<div class="empty-state">暂无消息</div>';
        if (hasNew) chatState.messagesArea.scrollTop = chatState.messagesArea.scrollHeight;
    }
    
    function showChatView() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('messagePage').classList.add('active');
        const container = document.getElementById('messageContainer');
        container.innerHTML = `
            <div class="chat-container">
                <div class="chat-header-bar"><button class="chat-back-btn" id="chatBackBtn">←</button><span class="chat-header-name">${escapeHtml(chatState.otherName)}</span><button id="manualRefreshBtn" style="background:#eef2ff; border:none; border-radius:20px; padding:4px 10px; font-size:0.7rem;">🔄 刷新</button></div>
                <div class="task-card-in-chat" onclick="viewTask('${chatState.taskId}')"><div><strong>${escapeHtml(chatState.title)}</strong><br><span class="reward-badge">💰 ${chatState.reward}元</span></div><span>👉 详情</span></div>
                <div class="chat-messages-area" id="chatMsgsArea">加载中...</div>
                <div class="chat-input-wrapper">
                    <div class="flex-row"><input type="number" id="negoPriceInput" class="nego-input" placeholder="💰议价 (当前¥${chatState.reward})" step="1"><button class="nego-send-btn" id="sendNegoBtn">发起议价</button></div>
                    <div class="chat-action-row"><input type="text" id="chatInput" class="chat-message-input" placeholder="输入消息..."><button class="send-btn" id="sendChatBtn">发送</button></div>
                </div>
            </div>
        `;
        chatState.messagesArea = document.getElementById('chatMsgsArea');
        chatState.lastMessageCount = 0;
        document.getElementById('chatBackBtn').onclick = () => {
            closeChat();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('messagePage').classList.add('active');
            renderMessageList();
            updateUnreadBadge();
        };
        document.getElementById('manualRefreshBtn').onclick = async () => { await refreshMessagesOnly(); alert('已刷新'); };
        
        document.getElementById('sendChatBtn').onclick = async () => {
            const txt = document.getElementById('chatInput').value.trim();
            if (!txt) return;
            await sendMessage(chatState.taskId, txt, false);
            document.getElementById('chatInput').value = '';
            await refreshMessagesOnly();
            await renderMessageList();
            updateUnreadBadge();
        };
        document.getElementById('sendNegoBtn').onclick = async () => {
            const price = parseFloat(document.getElementById('negoPriceInput').value);
            if (isNaN(price) || price <= 0) return alert('输入有效价格');
            await sendMessage(chatState.taskId, `💰议价请求:¥${price}`, true);
            alert('议价请求已发送');
            document.getElementById('negoPriceInput').value = '';
            await refreshMessagesOnly();
            await renderMessageList();
            updateUnreadBadge();
        };
        refreshMessagesOnly();
        if (chatState.pollInterval) clearInterval(chatState.pollInterval);
        chatState.pollInterval = setInterval(async () => { if (chatState.active && chatState.taskId) await refreshMessagesOnly(); }, 3000);
    }
    
    async function openChat(taskId, otherId, otherName, reward, title) {
        if (chatState.pollInterval) clearInterval(chatState.pollInterval);
        await callApi(`/messages/read/${taskId}/${currentUser.id}`, { method: 'PUT' });
        chatState.active = true;
        chatState.taskId = taskId;
        chatState.otherId = otherId;
        chatState.otherName = otherName;
        chatState.reward = reward;
        chatState.title = title;
        showChatView();
        updateUnreadBadge();
    }
    
    window.respondToNego = async function(taskId, price, isAccept) {
        const task = await callApi(`/tasks/${taskId}`);
        if (task.status !== 'available') { alert('任务已被接取'); return; }
        if (isAccept) {
            await callApi(`/tasks/${taskId}/reward`, {
                method: 'PUT',
                body: JSON.stringify({ userId: currentUser.id, reward: price })
            });
            await sendMessage(taskId, `✅ 同意议价，价格调整为 ¥${price}`, false);
            alert(`已同意议价，新价格 ¥${price}`);
            if (chatState.taskId === taskId) chatState.reward = price;
            refreshTaskList();
            if (document.getElementById('detailPage').classList.contains('active')) {
                viewTask(taskId);
            }
            renderMessageList();
            updateUnreadBadge();
        } else {
            await sendMessage(taskId, `❌ 拒绝了议价`, false);
            alert('已拒绝议价');
            renderMessageList();
            updateUnreadBadge();
        }
        await refreshMessagesOnly();
    };
    
    function closeChat() {
        if (chatState.pollInterval) clearInterval(chatState.pollInterval);
        chatState.active = false;
        chatState.taskId = null;
        chatState.messagesArea = null;
    }
    
    async function renderMessageList() {
        if (!currentUser || !currentUser.id) {
            const container = document.getElementById('messageContainer');
            if (container) container.innerHTML = '<div class="card"><strong>📬 消息记录</strong><div class="empty-state">请先登录</div></div>';
            updateUnreadBadge();
            return;
        }
        const convs = await callApi(`/user/${currentUser.id}/conversations`);
        const container = document.getElementById('messageContainer');
        if (!convs || convs.length === 0) {
            container.innerHTML = '<div class="card"><strong>📬 消息记录</strong><div class="empty-state">暂无对话</div></div>';
            updateUnreadBadge();
            return;
        }
        let html = '<div class="card"><strong>📬 消息记录</strong></div>';
        for (let c of convs) {
            let unreadHtml = '';
            if (c.unread > 0) {
                unreadHtml = `<span style="background:#ef4444; color:white; border-radius:20px; padding:2px 6px; font-size:0.65rem; margin-left:6px;">${c.unread}</span>`;
            }
            html += `
                <div class="card task-card" 
                     data-taskid="${c.taskId}" 
                     data-otherid="${c.otherId}" 
                     data-othername="${escapeHtml(c.otherName)}" 
                     data-reward="${c.reward}" 
                     data-title="${escapeHtml(c.taskTitle)}">
                    <div class="flex-between">
                        <span>💬 ${escapeHtml(c.otherName)}${unreadHtml}</span>
                        <span class="reward-badge">¥${c.reward}</span>
                    </div>
                    <div class="task-desc">${escapeHtml((c.lastMsg || '暂无消息').substring(0, 50))}</div>
                </div>
            `;
        }
        container.innerHTML = html;
        document.querySelectorAll('#messageContainer .task-card').forEach(card => {
            card.addEventListener('click', () => {
                const taskId = card.getAttribute('data-taskid');
                const otherId = card.getAttribute('data-otherid');
                const otherName = card.getAttribute('data-othername');
                const reward = parseInt(card.getAttribute('data-reward'));
                const title = card.getAttribute('data-title');
                openChat(taskId, otherId, otherName, reward, title);
            });
        });
        updateUnreadBadge();
    }
    
    async function updateUnreadBadge() {
        if (!currentUser) return;
        const convs = await callApi(`/user/${currentUser.id}/conversations`);
        const totalUnread = convs.reduce((sum, c) => sum + (c.unread || 0), 0);
        const badge = document.getElementById('msgBadge');
        if (badge) {
            if (totalUnread > 0) {
                badge.innerText = totalUnread > 99 ? '99+' : totalUnread;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }
    }
    
    // ==================== 个人主页 ====================
    async function loadProfile() {
        const container = document.getElementById('profileContainer');
        container.innerHTML = '<div class="loading">加载中...</div>';
        try {
            const user = await callApi(`/user/${currentUser.id}`);
            currentUser = { ...currentUser, ...user };
            localStorage.setItem('user', JSON.stringify(currentUser));
            document.getElementById('headerBalance').innerHTML = `余额: ¥${(currentUser.balance || 0).toFixed(2)}`;
            const allTasks = await callApi('/tasks/all');
            const myPub = (allTasks || []).filter(t => t.publisherId === currentUser.id);
            const myAcc = (allTasks || []).filter(t => t.takerId === currentUser.id && t.status !== 'completed');
            const myCompleted = (allTasks || []).filter(t => t.takerId === currentUser.id && t.status === 'completed');
            
            const pubHtml = myPub.map(t => {
                let progressText = '';
                if (t.status === 'ongoing') {
                    if (t.takerName) {
                        let step = '';
                        if (t.travelStatus === 'idle') step = '待出发';
                        else if (t.travelStatus === 'traveling') step = '行程中';
                        else if (t.travelStatus === 'arrived') step = '已到达，待凭证';
                        progressText = `<div class="progress-text">接取者: ${escapeHtml(t.takerName)} | 状态: ${step}</div>`;
                    } else progressText = `<div class="progress-text">暂无接取者</div>`;
                }
                let cancelBtn = '';
                if (t.status === 'available') {
                    cancelBtn = `<div class="task-actions"><button class="btn-danger" onclick="cancelTask('${t._id}')">取消任务</button></div>`;
                }
                let statusClass = '';
                let statusText = '';
                if (t.status === 'available') { statusClass = 'available'; statusText = '悬赏中'; }
                else if (t.status === 'ongoing') { statusClass = 'ongoing'; statusText = '进行中'; }
                else if (t.status === 'completed') { statusClass = 'completed'; statusText = '已完成'; }
                else if (t.status === 'cancelled') { statusClass = 'cancelled'; statusText = '已取消'; }
                return `
                    <div class="profile-task-item">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <div class="profile-task-title" onclick="viewTask('${t._id}')">${escapeHtml(t.title)}</div>
                                <span class="profile-task-status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="profile-task-amount">💰 ${t.reward}元</div>
                        </div>
                        ${progressText}
                        ${cancelBtn}
                    </div>
                `;
            }).join('') || '<div class="empty-state">暂无</div>';
            
            const accHtml = myAcc.map(t => `
                <div class="profile-task-item">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div class="profile-task-title" onclick="viewTask('${t._id}')">${escapeHtml(t.title)}</div>
                            <span class="profile-task-status ongoing">${t.travelStatus === 'idle' ? '待出发' : (t.travelStatus === 'traveling' ? '行程中' : '已到达')}</span>
                        </div>
                        <div class="profile-task-amount">💰 ${t.reward}元</div>
                    </div>
                    <div class="task-actions"><button class="btn-danger" onclick="cancelAcceptedTask('${t._id}')">取消接取</button></div>
                </div>
            `).join('') || '<div class="empty-state">暂无</div>';
            
            const completedHtml = myCompleted.map(t => `
                <div class="profile-task-item">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div class="profile-task-title" onclick="viewTask('${t._id}')">${escapeHtml(t.title)}</div>
                            <span class="profile-task-status completed">已完成</span>
                        </div>
                        <div class="profile-task-amount">💰 ${t.reward}元</div>
                    </div>
                </div>
            `).join('') || '<div class="empty-state">暂无</div>';
            
            container.innerHTML = `
                <div class="profile-header" onclick="showEditProfileModal()">
                    <div class="profile-avatar">${currentUser.avatar ? `<img src="${currentUser.avatar}">` : `<span>${(currentUser.nickname || currentUser.username).charAt(0)}</span>`}</div>
                    <div><div class="profile-name">${escapeHtml(currentUser.nickname || currentUser.username)}</div><div class="profile-signature">${currentUser.signature || '点击编辑'}</div></div>
                    <span>✏️</span>
                </div>
                <div class="stats-row">
                    <div class="stat-item" onclick="showWalletDetail()"><div class="stat-number">💰</div><div class="stat-label">钱包</div></div>
                    <div class="stat-item" onclick="showCreditDetail()"><div class="stat-number">⭐${currentUser.credit || 60}</div><div class="stat-label">信用</div></div>
                    <div class="stat-item" onclick="showRealNameAuth()"><div class="stat-number">🆔</div><div class="stat-label">${currentUser.idCardVerified ? '已实名' : '未实名'}</div></div>
                </div>
                <div class="profile-collapse">
                    <div class="collapse-header" data-target="pub"><div class="collapse-title">📤 我发布 <span style="font-size:0.7rem;">(${myPub.length})</span></div><span class="collapse-icon">▶</span></div>
                    <div class="collapse-content" id="collapse-pub">${pubHtml}</div>
                </div>
                <div class="profile-collapse">
                    <div class="collapse-header" data-target="acc"><div class="collapse-title">📥 我接取 <span style="font-size:0.7rem;">(${myAcc.length})</span></div><span class="collapse-icon">▶</span></div>
                    <div class="collapse-content" id="collapse-acc">${accHtml}</div>
                </div>
                <div class="profile-collapse">
                    <div class="collapse-header" data-target="completed"><div class="collapse-title">✅ 已完成 <span style="font-size:0.7rem;">(${myCompleted.length})</span></div><span class="collapse-icon">▶</span></div>
                    <div class="collapse-content" id="collapse-completed">${completedHtml}</div>
                </div>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            `;
            
            document.querySelectorAll('.collapse-header').forEach(header => {
                header.addEventListener('click', () => {
                    const targetId = header.getAttribute('data-target');
                    const content = document.getElementById(`collapse-${targetId}`);
                    const icon = header.querySelector('.collapse-icon');
                    if (content.classList.contains('show')) { content.classList.remove('show'); icon.classList.remove('open'); }
                    else { content.classList.add('show'); icon.classList.add('open'); }
                });
            });
        } catch (err) {
            container.innerHTML = '<div class="empty-state">加载失败</div>';
        }
    }
    
    async function showWalletDetail() {
        const bills = await callApi(`/bills/${currentUser.id}`);
        const modal = document.createElement('div');
        modal.className = 'modal-mask';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>💰 钱包明细</h3>
                <div style="background:#eef2ff; padding:12px; border-radius:16px; margin-bottom:12px;">
                    <div>可用余额</div>
                    <div style="font-size:1.6rem;">¥${(currentUser.balance || 0).toFixed(2)}</div>
                    <div style="font-size:0.7rem; color:#64748b;">冻结余额: ¥${(currentUser.frozenBalance || 0).toFixed(2)}</div>
                </div>
                <div><strong>提现</strong></div>
                <button class="btn-primary" id="withdrawBtn" style="margin:6px 0;">💸 提现</button>
                <div><strong>账单明细</strong></div>
                <button class="btn-secondary" id="showBillDetailBtn" style="margin-bottom:8px;">📋 查看明细</button>
                <div id="billDetailContainer" style="max-height:200px; overflow:auto; display:none;"></div>
                <button class="btn-secondary mt-2" onclick="this.closest('.modal-mask').remove()">关闭</button>
            </div>
        `;
        document.body.appendChild(modal);
    
        modal.querySelector('#withdrawBtn').onclick = () => {
            const chooseModal = document.createElement('div');
            chooseModal.className = 'modal-mask';
            chooseModal.innerHTML = `
                <div class="modal-content">
                    <h3>选择提现方式</h3>
                    <button class="btn-primary" id="withdrawWechatBtn" style="background:#07c160; margin-bottom:8px;">💚 提现到微信</button>
                    <button class="btn-primary" id="withdrawAlipayBtn" style="background:#1677ff;">💙 提现到支付宝</button>
                    <button class="btn-secondary mt-2" onclick="this.closest('.modal-mask').remove()">取消</button>
                </div>
            `;
            document.body.appendChild(chooseModal);
            chooseModal.querySelector('#withdrawWechatBtn').onclick = () => {
                alert('提现到微信（演示模式）');
                chooseModal.remove();
                modal.remove();
            };
            chooseModal.querySelector('#withdrawAlipayBtn').onclick = () => {
                alert('提现到支付宝（演示模式）');
                chooseModal.remove();
                modal.remove();
            };
        };
    
        modal.querySelector('#showBillDetailBtn').onclick = () => {
            const container = modal.querySelector('#billDetailContainer');
            if (container.style.display === 'block') {
                container.style.display = 'none';
                modal.querySelector('#showBillDetailBtn').innerText = '📋 查看明细';
                return;
            }
            if (bills.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无记录</div>';
            } else {
                let html = '';
                for (const b of bills) {
                    html += `<div style="padding:8px 0; border-bottom:1px solid #eef2f8;">
                                <div>${b.desc}</div>
                                <div>${b.amount > 0 ? `+${b.amount}` : b.amount}元</div>
                                <div style="font-size:0.7rem;">${b.createdAt ? new Date(b.createdAt).toLocaleString() : ''}</div>
                             </div>`;
                }
                container.innerHTML = html;
            }
            container.style.display = 'block';
            modal.querySelector('#showBillDetailBtn').innerText = '🔽 收起明细';
        };
    }
    
    async function showCreditDetail() {
        const logs = await callApi(`/credit-logs/${currentUser.id}`);
        const modal = document.createElement('div');
        modal.className = 'modal-mask';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>⭐ 信用明细</h3>
                <div style="max-height:300px; overflow:auto;">
                    ${logs.map(l => `
                        <div style="padding:8px 0; border-bottom:1px solid #eef2f8;">
                            <div>${l.reason}</div>
                            <div>${l.change > 0 ? `+${l.change}` : l.change} 分</div>
                            <div style="font-size:0.7rem;">${new Date(l.createdAt).toLocaleString()}</div>
                        </div>
                    `).join('') || '<div class="empty-state">暂无记录</div>'}
                </div>
                <button class="btn-secondary mt-2" onclick="this.closest('.modal-mask').remove()">关闭</button>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    window.cancelAcceptedTask = async function(taskId) {
        if (confirm('取消接取将扣除5信用分，确定吗？')) {
            const result = await callApi(`/tasks/${taskId}/cancel-accept`, { method: 'PUT', body: JSON.stringify({ userId: currentUser.id }) });
            if (result.success) { alert('已取消接取'); loadProfile(); refreshTaskList(); } else alert(result.error || '取消失败');
        }
    };
    
    function showEditProfileModal() {
        if (!currentUser) return;
        const modal = document.createElement('div');
        modal.className = 'modal-mask';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>编辑资料</h3>
                <div class="form-group">
                    <div class="form-label">头像</div>
                    <div id="avatarPreview" style="width:70px;height:70px;border-radius:50%;background:#eef2ff;display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;">
                        ${currentUser.avatar ? `<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;">` : `<span>${(currentUser.nickname || currentUser.username).charAt(0)}</span>`}
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none;">
                    <button class="btn-secondary" id="uploadAvatarBtn">更换头像</button>
                </div>
                <div class="form-group"><label>昵称</label><input type="text" id="editNickname" class="form-input" value="${escapeHtml(currentUser.nickname || '')}"></div>
                <div class="form-group"><label>个性签名</label><textarea id="editSignature" class="form-textarea" rows="2">${escapeHtml(currentUser.signature || '')}</textarea></div>
                <div class="form-group"><label>家乡</label><input type="text" id="editHometown" class="form-input" value="${escapeHtml(currentUser.hometown || '')}"></div>
                <div class="double-btn-row" style="display:flex; gap:8px;">
                    <button class="btn-primary" id="saveProfileBtn">保存</button>
                    <button class="btn-secondary" onclick="this.closest('.modal-mask').remove()">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const avatarInput = modal.querySelector('#avatarInput');
        const avatarPreview = modal.querySelector('#avatarPreview');
        modal.querySelector('#uploadAvatarBtn').onclick = () => avatarInput.click();
        avatarInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    avatarPreview.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                    currentUser.avatar = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        };
        modal.querySelector('#saveProfileBtn').onclick = async () => {
            const updates = {
                nickname: modal.querySelector('#editNickname').value.trim() || currentUser.username,
                signature: modal.querySelector('#editSignature').value,
                hometown: modal.querySelector('#editHometown').value,
                avatar: currentUser.avatar || ''
            };
            const result = await callApi(`/user/${currentUser.id}`, { method: 'PUT', body: JSON.stringify(updates) });
            if (result.success !== false) {
                currentUser = { ...currentUser, ...updates };
                localStorage.setItem('user', JSON.stringify(currentUser));
                loadProfile();
                alert('保存成功');
                modal.remove();
            } else {
                alert('保存失败');
            }
        };
    }
    
    async function showRealNameAuth() {
        if (currentUser.idCardVerified) { alert('您已经实名认证过了'); return; }
        const modal = document.createElement('div');
        modal.className = 'modal-mask';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>🆔 实名认证</h3>
                <div class="form-group"><label>真实姓名</label><input id="realNameInput" class="form-input" placeholder="请输入真实姓名"></div>
                <div class="form-group"><label>身份证号</label><input id="idCardInput" class="form-input" placeholder="请输入身份证号"></div>
                <div class="double-btn-row" style="display:flex; gap:8px;">
                    <button class="btn-primary" id="submitAuthBtn">提交认证</button>
                    <button class="btn-secondary" onclick="this.closest('.modal-mask').remove()">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#submitAuthBtn').onclick = async () => {
            const realName = modal.querySelector('#realNameInput').value.trim();
            const idCard = modal.querySelector('#idCardInput').value.trim();
            if (!realName || idCard.length < 15) { alert('请填写正确的姓名和身份证号'); return; }
            const result = await callApi('/verify-id', { method: 'POST', body: JSON.stringify({ userId: currentUser.id, realName, idCard }) });
            if (result.success) { alert('实名认证成功'); currentUser.idCardVerified = true; localStorage.setItem('user', JSON.stringify(currentUser)); modal.remove(); loadProfile(); }
            else alert(result.error || '认证失败');
        };
    }
    
    function logout() {
        if (confirm('退出登录？')) {
            localStorage.removeItem('user');
            currentUser = null;
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginPage').classList.add('active');
            if (countdownTimer) clearInterval(countdownTimer);
            if (chatState.pollInterval) clearInterval(chatState.pollInterval);
        }
    }
    
    function switchPage(page) {
        if (page === 'message') {
            if (chatState.active) closeChat();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('messagePage').classList.add('active');
            renderMessageList();
            return;
        }
        if (page === 'publish') resetPublishForm();
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`${page}Page`).classList.add('active');
        if (page === 'home') refreshTaskList();
        if (page === 'profile') loadProfile();
    }
    
    async function initData() {
        const result = await callApi('/init', { method: 'POST' });
        alert(result.success ? '初始化成功！\n测试账号：xiaoming/123456' : '初始化失败');
    }
    
    // 事件绑定
    document.getElementById('doLoginBtn').onclick = doLogin;
    document.getElementById('doRegisterBtn').onclick = async () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPwd').value;
        const nickname = document.getElementById('regNickname').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        if (!username || !password) { alert('请填写用户名和密码'); return; }
        if (password !== confirm) { alert('两次密码不一致'); return; }
        try {
            const result = await callApi('/register', { method: 'POST', body: JSON.stringify({ username, password, nickname, phone }) });
            if (result.success) { alert('注册成功，请登录'); document.getElementById('registerPage').classList.remove('active'); document.getElementById('loginPage').classList.add('active'); }
            else alert(result.error);
        } catch (err) {
            alert('注册失败：' + err.message);
        }
    };
    document.getElementById('doPublishBtn').onclick = publishTask;
    document.getElementById('initDataBtn').onclick = initData;
    document.getElementById('showRegisterBtn').onclick = (e) => { e.preventDefault(); document.getElementById('loginPage').classList.remove('active'); document.getElementById('registerPage').classList.add('active'); };
    document.getElementById('showLoginBtn').onclick = (e) => { e.preventDefault(); document.getElementById('registerPage').classList.remove('active'); document.getElementById('loginPage').classList.add('active'); };
    document.getElementById('getLocationBtn')?.addEventListener('click', getCurrentLocation);
    document.getElementById('mediaInput')?.addEventListener('change', (e) => { if (e.target.files.length) handleMediaFiles(e.target.files); });
    
    const savedUser = localStorage.getItem('user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('loginPage').classList.remove('active');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; refreshTaskList(); },
                () => refreshTaskList()
            );
        } else refreshTaskList();
        loadProfile();
        initPullToRefresh();
        initFiltersAndCategories();
        renderMessageList();
        updateUnreadBadge();
        switchPage('home');
    }
</script>
</body>
</html>
