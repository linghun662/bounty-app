<script>
const getApiBase=()=>'https://bounty-app-production.up.railway.app/api';
const API_BASE=getApiBase();
let currentUser=null,pendingMedia=[],userLocation=null,allTasks=[],currentCategory='all',currentSort='time',countdownTimer=null,lastPage=null;
let chatState={active:false,taskId:null,otherId:null,otherName:'',reward:0,title:'',pollInterval:null,messagesArea:null,lastMessageCount:0};
let geocodeCache=new Map();

let refreshThrottle=false,networkToast=null;
let mediaRecorder=null,audioChunks=[],isRecording=false;

let mapReady=false,mapInitAttempts=0,MAX_MAP_ATTEMPTS=3,isMapOpen=false;
let filterDistance=null,filterKeyword='';

function showNetworkSlow(){if(networkToast)return;networkToast=document.createElement('div');networkToast.className='network-toast';networkToast.innerText='⚠️ 网络较慢，请稍候...';document.body.appendChild(networkToast);setTimeout(()=>{if(networkToast)networkToast.remove();networkToast=null;},3000);}
async function fetchWithTimeout(url,options={},timeout=8000,retries=1){let lastError;for(let i=0;i<=retries;i++){try{const controller=new AbortController();const id=setTimeout(()=>controller.abort(),timeout);const response=await fetch(url,{...options,signal:controller.signal});clearTimeout(id);if(!response.ok)throw new Error(`HTTP ${response.status}`);return response;}catch(err){lastError=err;if(err.name==='AbortError'){console.warn(`请求超时 (${timeout}ms)，第 ${i+1} 次重试`);if(i<retries)await new Promise(r=>setTimeout(r,800));continue;}if(i<retries){await new Promise(r=>setTimeout(r,800));showNetworkSlow();}}}throw lastError;}
async function callApi(url,options={}){const fullUrl=API_BASE+url;const token=localStorage.getItem('token');const headers={'Content-Type':'application/json',...options.headers};if(token)headers['Authorization']=`Bearer ${token}`;try{const res=await fetchWithTimeout(fullUrl,{...options,headers},10000,1);if(res.status===401){localStorage.removeItem('token');localStorage.removeItem('user');currentUser=null;document.getElementById('mainApp').style.display='none';document.getElementById('loginPage').classList.add('active');showAlert('登录已过期','请重新登录');throw new Error('Unauthorized');}const data=await res.json();if(!res.ok)throw new Error(data.error||`HTTP ${res.status}`);return data;}catch(err){console.error('[API错误]',err);if(err.name==='AbortError'){showToast('请求超时，请检查网络后重试');throw new Error('请求超时');}showNetworkSlow();throw err;}}
async function uploadFile(file){const formData=new FormData();formData.append('file',file);const fullUrl=API_BASE+'/upload';const token=localStorage.getItem('token');const res=await fetch(fullUrl,{method:'POST',headers:{'Authorization':`Bearer ${token}`},body:formData});if(!res.ok)throw new Error('上传失败');const data=await res.json();return data.url;}
function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');}
function calculateDistance(lat1,lng1,lat2,lng2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));return (R*c).toFixed(1);}
async function geocodeAddress(address){if(!address)return null;if(geocodeCache.has(address))return geocodeCache.get(address);try{const result=await callApi('/geocode',{method:'POST',body:JSON.stringify({address})});if(result&&result.lat&&result.lng){geocodeCache.set(address,result);return result;}return null;}catch(e){console.error('地理编码失败',e);return null;}}
async function enrichTasksWithDistance(tasks){if(!userLocation)return tasks;const enriched=[];for(let task of tasks){if(!task.locationAddress){enriched.push({...task,distance:null});continue;}const coords=await geocodeAddress(task.locationAddress);const distance=coords?calculateDistance(userLocation.lat,userLocation.lng,coords.lat,coords.lng):null;enriched.push({...task,distance});}return enriched;}

function initSlide(container,onComplete){const track=container.querySelector('.slide-track');const thumb=container.querySelector('.slide-thumb');if(!track||!thumb)return;if(track.clientWidth===0||thumb.clientWidth===0){setTimeout(()=>initSlide(container,onComplete),100);return;}let startX=0,isDragging=false;const maxLeft=track.clientWidth-thumb.clientWidth;function setTransform(x){thumb.style.transform=`translateX(${x}px)`;}function onMove(clientX){if(!isDragging)return;let delta=clientX-startX;let newLeft=Math.min(maxLeft,Math.max(0,delta));setTransform(newLeft);if(newLeft>=maxLeft-5){isDragging=false;container.classList.add('completed');setTransform(maxLeft);document.removeEventListener('mousemove',onMouseMove);document.removeEventListener('mouseup',onMouseUp);document.removeEventListener('touchmove',onTouchMove);document.removeEventListener('touchend',onTouchEnd);if(onComplete)onComplete();}}function onMouseMove(e){onMove(e.clientX);}function onMouseUp(){isDragging=false;setTransform(0);document.removeEventListener('mousemove',onMouseMove);document.removeEventListener('mouseup',onMouseUp);container.classList.remove('completed');}function onTouchMove(e){onMove(e.touches[0].clientX);e.preventDefault();}function onTouchEnd(){isDragging=false;setTransform(0);document.removeEventListener('touchmove',onTouchMove);document.removeEventListener('touchend',onTouchEnd);container.classList.remove('completed');}function onStart(clientX){startX=clientX;isDragging=true;document.addEventListener('mousemove',onMouseMove);document.addEventListener('mouseup',onMouseUp);document.addEventListener('touchmove',onTouchMove);document.addEventListener('touchend',onTouchEnd);}thumb.addEventListener('mousedown',(e)=>{e.preventDefault();onStart(e.clientX);});thumb.addEventListener('touchstart',(e)=>{e.preventDefault();onStart(e.touches[0].clientX);});container.classList.remove('completed');setTransform(0);}

async function refreshMessagesOnly(){if(!chatState.messagesArea||!chatState.taskId)return;try{const messages=await callApi(`/messages/${chatState.taskId}`);if(!messages||!Array.isArray(messages))return;const newCount=messages.length;const hasNew=newCount>(chatState.lastMessageCount||0);if(hasNew)updateConversationTimestamp(chatState.taskId);chatState.lastMessageCount=newCount;let html='';let lastDateKey=null;const today=new Date();today.setHours(0,0,0,0);const yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);for(const m of messages){const msgDate=new Date(m.createdAt);const dateKey=msgDate.toDateString();if(dateKey!==lastDateKey){lastDateKey=dateKey;let label='';const msgDateOnly=new Date(msgDate);msgDateOnly.setHours(0,0,0,0);if(msgDateOnly.getTime()===today.getTime()){label='今天';}else if(msgDateOnly.getTime()===yesterday.getTime()){label='昨天';}else{label=`${msgDate.getFullYear()}年${msgDate.getMonth()+1}月${msgDate.getDate()}日`;}html+=`<div class="date-separator">${label}</div>`;}const isMine=m.senderId===currentUser.id;const isNego=m.text&&m.text.includes('💰议价请求:');const priceMatch=m.text.match(/¥(\d+)/);const negoPrice=priceMatch?parseInt(priceMatch[1]):null;const imgMatch=m.text.match(/\[img\](.*?)\[\/img\]/);const audioMatch=m.text.match(/\[audio\](.*?)\[\/audio\]/);let contentHtml='';if(imgMatch){const imgUrl=imgMatch[1];contentHtml=`<div class="bubble-text ${isMine?'':'bubble-image-wrapper'}" style="background:${isMine?'#1e4a6b':'#fff'}; padding:4px 4px; border:${isMine?'none':'1px solid #e2e8f0'};"><img src="${imgUrl}" class="bubble-image" onclick="event.stopPropagation(); showImagePreview('${imgUrl}')"></div>`;}else if(audioMatch){const audioUrl=audioMatch[1];contentHtml=`<div class="bubble-text ${isMine?'':'bubble-image-wrapper'}" style="background:${isMine?'#1e4a6b':'#fff'}; padding:4px 4px; border:${isMine?'none':'1px solid #e2e8f0'};"><audio controls class="audio-player" src="${audioUrl}"></audio></div>`;}else{contentHtml=`<div class="b function showChatView(){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('messagePage').classList.add('active');document.body.classList.add('hide-bottom-nav');const container=document.getElementById('messageContainer');container.innerHTML=`<div class="chat-container" style="display:flex; flex-direction:column; height:100%;"><div class="chat-header-bar"><button class="chat-back-btn" id="chatBackBtn">←</button><span class="chat-header-name">${escapeHtml(chatState.otherName)}</span></div><div class="task-card-in-chat" onclick="viewTask('${chatState.taskId}','message')"><div><strong>${escapeHtml(chatState.title)}</strong><br><span class="reward-badge">💰 ${chatState.reward}元</span></div><span>👉 详情</span></div><div class="chat-messages-area" id="chatMsgsArea">加载中...</div><div class="chat-input-wrapper"><div class="chat-action-row"><button class="chat-icon-btn" id="chatPlusBtn">➕</button><button class="chat-icon-btn" id="voiceBtn" title="按住说话">🎤</button><input type="text" id="chatInput" class="chat-message-input" placeholder="输入消息..."><button class="send-btn" id="sendChatBtn">发送</button></div><div class="chat-plus-panel" id="chatPlusPanel"><button class="chat-icon-btn plus-item" id="imageBtn">🖼️ 图片</button><button class="chat-icon-btn plus-item" id="sendNegoBtn">💰 议价</button></div></div></div>`;chatState.messagesArea=document.getElementById('chatMsgsArea');chatState.lastMessageCount=0;document.getElementById('chatBackBtn').onclick=()=>{closeChat();switchPage('message');};document.getElementById('sendChatBtn').onclick=async()=>{const txt=document.getElementById('chatInput').value.trim();if(!txt)return;await sendMessage(chatState.taskId,txt,false);document.getElementById('chatInput').value='';await refreshMessagesOnly();updateUnreadBadge();};document.getElementById('imageBtn').onclick=()=>{const input=document.createElement('input');input.type='file';input.accept='image/*,video/*';input.multiple=false;input.onchange=async(e)=>{const file=e.target.files[0];if(!file)return;try{showToast('上传中...',1500);const url=await uploadFile(file);await sendMessage(chatState.taskId,`[img]${url}[/img]`,false);await refreshMessagesOnly();updateUnreadBadge();}catch(err){showAlert('发送失败',err.message);}input.remove();};input.click();};const voiceBtn=document.getElementById('voiceBtn');const chatInput=document.getElementById('chatInput');let isPressed=false;async function requestMicrophonePermission(){if(window.Capacitor&&window.Capacitor.isNativePlatform()){try{const{Permissions}=Capacitor.Plugins;let status=await Permissions.check({permissions:['microphone']});if(status.microphone!=='granted'){const result=await Permissions.request({permissions:['microphone']});return result.microphone==='granted';}return true;}catch(e){console.warn('权限请求失败',e);try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});stream.getTracks().forEach(track=>track.stop());return true;}catch(err){return false;}}}try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});stream.getTracks().forEach(track=>track.stop());return true;}catch(err){return false;}}const startPress=async(e)=>{e.preventDefault();if(isPressed)return;const hasPerm=await requestMicrophonePermission();if(!hasPerm){showAlert('麦克风权限被拒绝','请前往手机设置 -> 应用管理 -> 赏金集市 -> 权限，开启麦克风权限');return;}let stream;try{stream=await navigator.mediaDevices.getUserMedia({audio:true});stream.getTracks().forEach(track=>track.stop());}catch(err){if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError'){showAlert('麦克风权限被拒绝','请在浏览器设置中允许访问麦克风后重试。');}else{showAlert('录音失败',err.message||'无法访问麦克风');}return;}isPressed=true;chatInput.placeholder='录音中...松开发送';chatInput.classList.add('recording');startRecording();if(navigator.vibrate)navigator.vibrate(10);};const endPress=(e)=>{e.preventDefault();if(!isPressed)return;isPressed=false;chatInput.placeholder='输入消息...';chatInput.classList.remove('recording');if(isRecording){stopRecordingAndSend();}};voiceBtn.addEventListener('mousedown',startPress);voiceBtn.addEventListener('mouseup',endPress);voiceBtn.addEventListener('mouseleave',endPress);voiceBtn.addEventListener('touchstart',startPress);voiceBtn.addEventListener('touchend',endPress);voiceBtn.addEventListener('touchcancel',endPress);document.getElementById('sendNegoBtn').onclick=()=>{showPrompt('请输入议价金额','金额（元）',async(price)=>{await sendMessage(chatState.taskId,`💰议价请求:¥${price}`,true);showToast('议价请求已发送');await refreshMessagesOnly();updateUnreadBadge();});};if(window.__plusOutsideHandler){document.removeEventListener('click',window.__plusOutsideHandler);window.__plusOutsideHandler=null;}const plusBtn=document.getElementById('chatPlusBtn');const plusPanel=document.getElementById('chatPlusPanel');let plusOpen=false;plusBtn.addEventListener('click',()=>{plusOpen=!plusOpen;plusPanel.classList.toggle('show',plusOpen);plusBtn.textContent=plusOpen?'✖️':'➕';});const outsideClickHandler=function(e){if(plusOpen&&!e.target.closest('.chat-input-wrapper')){plusOpen=false;plusPanel.classList.remove('show');plusBtn.textContent='➕';}};window.__plusOutsideHandler=outsideClickHandler;document.addEventListener('click',outsideClickHandler);refreshMessagesOnly();if(chatState.pollInterval)clearInterval(chatState.pollInterval);chatState.pollInterval=setInterval(async()=>{if(chatState.active&&chatState.taskId){await refreshMessagesOnly();}},CHAT_POLL_INTERVAL);}

window.respondToNego=async function(taskId,price,isAccept){const task=await callApi(`/tasks/${taskId}`);if(task.status==='completed'||task.status==='cancelled'){showAlert('提示','任务已结束，无法议价');return;}if(isAccept){try{const result=await callApi(`/tasks/${taskId}/reward`,{method:'PUT',body:JSON.stringify({reward:price})});if(result.success){await sendMessage(taskId,`✅ 同意议价，价格调整为 ¥${price}`,false);showToast(`已同意议价，新价格 ¥${price}`);if(chatState.active&&chatState.taskId===taskId){chatState.reward=price;await refreshMessagesOnly();}else{renderMessageList();if(document.getElementById('detailPage').classList.contains('active'))viewTask(taskId,lastPage);}refreshTaskList(true);updateUnreadBadge();}else{showAlert('修改价格失败',result.error||'可能任务已被接取且后端不允许修改');await sendMessage(taskId,`✅ 同意议价（但价格修改失败）`,false);if(chatState.active&&chatState.taskId===taskId)await refreshMessagesOnly();}}catch(err){showAlert('修改价格失败',err.message);await sendMessage(taskId,`✅ 同意议价（但价格修改失败）`,false);if(chatState.active&&chatState.taskId===taskId)await refreshMessagesOnly();}}else{await sendMessage(taskId,`❌ 拒绝了议价`,false);showToast('已拒绝议价');if(chatState.active&&chatState.taskId===taskId)await refreshMessagesOnly();else renderMessageList();updateUnreadBadge();}};
function closeChat(){if(chatState.pollInterval)clearInterval(chatState.pollInterval);chatState.active=false;chatState.taskId=null;chatState.messagesArea=null;document.body.classList.remove('hide-bottom-nav');if(mediaRecorder&&isRecording){mediaRecorder.stop();isRecording=false;}if(window.__plusOutsideHandler){document.removeEventListener('click',window.__plusOutsideHandler);window.__plusOutsideHandler=null;}const chatInput=document.getElementById('chatInput');if(chatInput){chatInput.classList.remove('recording');chatInput.placeholder='输入消息...';}}
function renderMessageList(){const wrapper=document.getElementById('messageListWrapper');if(!wrapper)return;if(!currentUser||!currentUser.id){wrapper.innerHTML='<div class="card"><strong>📬 消息记录</strong><div class="empty-state">请先登录</div></div>';updateUnreadBadge();return;}callApi(`/user/${currentUser.id}/conversations`).then(convs=>{if(!convs||convs.length===0){wrapper.innerHTML='<div class="card"><strong>📬 消息记录</strong><div class="empty-state">暂无对话</div></div>';updateUnreadBadge();return;}let filtered=convs.filter(c=>!deletedConversations.has(c.taskId)&&c.lastMsg);filtered.sort((a,b)=>{const t1=parseInt(localStorage.getItem(`conv_time_${a.taskId}`))||0;const t2=parseInt(localStorage.getItem(`conv_time_${b.taskId}`))||0;return t2-t1;});if(filtered.length===0){wrapper.innerHTML='<div class="card"><strong>📬 消息记录</strong><div class="empty-state">暂无对话</div></div>';updateUnreadBadge();return;}let html='<div class="card"><strong>📬 消息记录</strong></div>';for(let c of filtered){let unreadHtml='';if(c.unread>0)unreadHtml=`<span style="background:#ef4444; color:white; border-radius:20px; padding:2px 6px; font-size:0.65rem; margin-left:6px;">${c.unread}</span>`;html+=`<div class="task-card-wrapper" data-taskid="${c.taskId}" data-otherid="${c.otherId}" data-othername="${escapeHtml(c.otherName)}" data-reward="${c.reward}" data-title="${escapeHtml(c.taskTitle)}"><div class="card" style="cursor:pointer;"><div class="flex-between"><span>💬 ${escapeHtml(c.otherName)}${unreadHtml}</span><span class="reward-badge">¥${c.reward}</span></div><div class="task-desc">${escapeHtml((c.lastMsg||'暂无消息').substring(0,50))}</div></div><div class="delete-btn" onclick="deleteConversation('${c.taskId}')">删除</div></div>`;}wrapper.innerHTML=html;document.querySelectorAll('.task-card-wrapper').forEach(wrapper=>{let startX=0,isDragging=false;const card=wrapper.querySelector('.card');const deleteBtn=wrapper.querySelector('.delete-btn');const threshold=60;const reset=()=>{wrapper.classList.remove('swiped');card.style.transform='';};const onTouchStart=(e)=>{startX=e.touches[0].clientX;isDragging=true;};const onTouchMove=(e)=>{if(!isDragging)return;const deltaX=e.touches[0].clientX-startX;if(deltaX<-10){e.preventDefault();const offset=Math.max(-80,Math.min(0,deltaX));card.style.transform=`translateX(${offset}px)`;deleteBtn.style.opacity=Math.min(1,Math.abs(offset)/threshold);if(offset<-threshold){wrapper.classList.add('swiped');}else{wrapper.classList.remove('swiped');}}else if(deltaX>10&&wrapper.classList.contains('swiped')){e.preventDefault();reset();}};const onTouchEnd=()=>{isDragging=false;if(!wrapper.classList.contains('swiped')){reset();}else{card.style.transform='translateX(-80px)';deleteBtn.style.opacity='1';}};card.addEventListener('click',(e)=>{if(wrapper.classList.contains('swiped')){reset();return;}const taskId=wrapper.getAttribute('data-taskid');const otherId=wrapper.getAttribute('data-otherid');const otherName=wrapper.getAttribute('data-othername');const reward=parseInt(wrapper.getAttribute('data-reward'));const title=wrapper.getAttribute('data-title');openChat(taskId,otherId,otherName,reward,title);});wrapper.addEventListener('touchstart',onTouchStart,{passive:true});wrapper.addEventListener('touchmove',onTouchMove,{passive:false});wrapper.addEventListener('touchend',onTouchEnd,{passive:true});wrapper.addEventListener('touchcancel',onTouchEnd,{passive:true});deleteBtn.onclick=(e)=>{e.stopPropagation();const taskId=wrapper.getAttribute('data-taskid');deleteConversation(taskId);};});updateUnreadBadge();}).catch(e=>{console.error('加载消息列表失败',e);wrapper.innerHTML='<div class="card"><strong>📬 消息记录</strong><div class="empty-state">加载失败，请重试</div></div>';});}
let prevUnreadCount=parseInt(localStorage.getItem('prevUnread')||'0');
async function updateUnreadBadge(){if(!currentUser)return;try{const convs=await callApi(`/user/${currentUser.id}/conversations`);const filtered=convs.filter(c=>!deletedConversations.has(c.taskId)&&c.lastMsg);const totalUnread=filtered.reduce((sum,c)=>sum+(c.unread||0),0);const badge=document.getElementById('msgBadge');if(badge){if(totalUnread>0){badge.innerText=totalUnread>99?'99+':totalUnread;badge.style.display='inline-block';}else badge.style.display='none';}if(totalUnread>prevUnreadCount&&totalUnread>0&&typeof window.showLocalNotification==='function'){if(document.hidden||document.visibilityState==='hidden'){const unreadConv=filtered.find(c=>c.unread>0);if(unreadConv){const title=`💬 ${unreadConv.otherName}`;const body=unreadConv.lastMsg||'您有新消息';window.showLocalNotification(title,body);}else{window.showLocalNotification('新消息',`您有 ${totalUnread} 条未读消息`);}}}prevUnreadCount=totalUnread;localStorage.setItem('prevUnread',totalUnread.toString());}catch(e){}}
async function loadProfile(){const container=document.getElementById('profileContainer');container.innerHTML='<div class="loading">加载中...</div>';try{const user=await callApi(`/user/${currentUser.id}`);currentUser={...currentUser,...user};localStorage.setItem('user',JSON.stringify(currentUser));const allTasks=await callApi('/tasks/all');const myPubOngoing=(allTasks||[]).filter(t=>t.publisherId===currentUser.id&&t.status!=='completed'&&t.status!=='cancelled');const myAccOngoing=(allTasks||[]).filter(t=>t.takerId===currentUser.id&&t.status!=='completed'&&t.status!=='cancelled');const myCompleted=(allTasks||[]).filter(t=>(t.publisherId===currentUser.id||t.takerId===currentUser.id)&&t.status==='completed');const pubCount=myPubOngoing.length;const accCount=myAccOngoing.length;const compCount=myCompleted.length;container.innerHTML=`<div class="profile-header" onclick="showEditProfileModal()"><div class="profile-avatar">${currentUser.avatar?`<img src="${currentUser.avatar}">`:`<span>${(currentUser.nickname||currentUser.username).charAt(0)}</span>`}</div><div><div class="profile-name">${escapeHtml(currentUser.nickname||currentUser.username)}</div><div class="profile-signature">${currentUser.signature||'点击编辑'}</div></div><span>✏️</span></div><div class="stats-row" id="walletStats"><div class="stat-item" id="walletEntry" style="cursor:pointer;"><div class="stat-number">👛</div><div class="stat-label">钱包</div></div><div class="stat-item" id="creditEntry" style="cursor:pointer;"><div class="stat-number">⭐${currentUser.credit||60}</div><div class="stat-label">信用</div></div><div class="stat-item" onclick="showRealNameAuth()"><div class="stat-number">🆔</div><div class="stat-label">${currentUser.idCardVerified?'已实名':'未实名'}</div></div></div><div class="profile-task-card" onclick="navigateToMyTasks('pub')"><div class="left"><span class="title">📤 我发布</span><span class="count">${pubCount} 个进行中</span></div><span class="arrow">›</span></div><div class="profile-task-card" onclick="navigateToMyTasks('acc')"><div class="left"><span class="title">📥 我接取</span><span class="count">${accCount} 个进行中</span></div><span class="arrow">›</span></div><div class="profile-task-card" onclick="navigateToMyTasks('completed')"><div class="left"><span class="title">✅ 已完成</span><span class="count">${compCount} 个</span></div><span class="arrow">›</span></div><button class="logout-btn" onclick="logout()">退出登录</button>`;document.getElementById('walletEntry').addEventListener('click',()=>switchPage('wallet'));document.getElementById('creditEntry').addEventListener('click',()=>switchPage('credit'));}catch(err){container.innerHTML='<div class="empty-state">加载失败</div>';}}
async function renderWalletPage(){const container=document.getElementById('walletContent');container.innerHTML='<div class="loading">加载中...</div>';try{const bills=await callApi(`/bills/${currentUser.id}`);let billHtml='';if(bills.length===0){billHtml='<div class="empty-state" style="padding:20px;">暂无账单记录</div>';}else{for(const b of bills){const icon=b.amount>0?'📈':'📉';const amountClass=b.amount>0?'income':'expense';const sign=b.amount>0?'+':'';billHtml+=`<div class="wallet-bill-item" data-bill='${JSON.stringify(b).replace(/"/g,'&quot;')}'><div class="icon">${icon}</div><div class="info"><div class="desc">${b.desc}</div><div class="time">${b.createdAt?new Date(b.createdAt).toLocaleString():''}</div></div><div class="amount ${amountClass}">${sign}${b.amount}元</div></div>`;}}container.innerHTML=`<div class="wallet-balance-box" style="margin:0 0 16px 0; background:#eef2ff; border-radius:20px; padding:20px; text-align:center;"><div class="amount">¥${(currentUser.balance||0).toFixed(2)}</div><div class="frozen">冻结余额: ¥${(currentUser.frozenBalance||0).toFixed(2)}</div><button class="btn-primary" id="walletWithdrawBtn" style="margin-top:10px;padding:8px;font-size:.85rem;">💸 提现</button></div><div style="margin-top:8px; border-top:1px solid #eef2f8; padding-top:12px;"><div style="font-weight:600; font-size:1rem; color:#1e293b; margin-bottom:8px;">📋 账单明细</div>${billHtml}</div>`;document.getElementById('walletWithdrawBtn').onclick=()=>{const chooseModal=document.createElement('div');chooseModal.className='custom-modal withdraw-modal';chooseModal.innerHTML=`<div class="custom-modal-content"><h3>选择提现方式</h3><button class="btn-primary" id="withdrawWechatBtn" style="background:#07c160; margin-bottom:8px;">💚 提现到微信</button><button class="btn-primary" id="withdrawAlipayBtn" style="background:#1677ff;">💙 提现到支付宝</button><div class="custom-modal-buttons"><button class="cancel-btn">取消</button></div></div>`;document.body.appendChild(chooseModal);chooseModal.querySelector('#withdrawWechatBtn').onclick=()=>{showToast('提现到微信（演示模式）');chooseModal.remove();};chooseModal.querySelector('#withdrawAlipayBtn').onclick=()=>{showToast('提现到支付宝（演示模式）');chooseModal.remove();};chooseModal.querySelector('.cancel-btn').onclick=()=>chooseModal.remove();};container.querySelectorAll('.wallet-bill-item').forEach(item=>{item.onclick=()=>{const bill=JSON.parse(item.getAttribute('data-bill'));renderBillDetail(bill);};});}catch(e){container.innerHTML='<div class="empty-state">加载失败</div>';}}
function renderBillDetail(bill){const container=document.getElementById('walletContent');const typeLabel=bill.type==='income'?'收入':(bill.type==='expense'?'支出':bill.type);const sign=bill.amount>0?'+':'';container.innerHTML=`<div style="padding:16px;"><div onclick="renderWalletPage()" style="font-size:1.2rem; cursor:pointer; margin-bottom:16px;">← 返回</div><div style="background:#eef2ff; border-radius:20px; padding:20px; text-align:center;"><div style="font-size:2rem; font-weight:800; color:#1e4a6b;">${sign}${bill.amount}元</div><div style="font-size:0.9rem; color:#64748b; margin-top:4px;">${typeLabel}</div></div><div style="margin-top:16px;"><div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eef2f8;"><span>说明</span><span>${bill.desc}</span></div><div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eef2f8;"><span>时间</span><span>${new Date(bill.createdAt).toLocaleString()}</span></div></div></div>`;}
async function renderCreditPage(){const container=document.getElementById('creditContent');container.innerHTML='<div class="loading">加载中...</div>';try{const logs=await callApi(`/credit-logs/${currentUser.id}`);let html=`<div style="margin-bottom:12px;font-weight:600;">当前信用分：⭐ ${currentUser.credit||60}</div>`;if(logs.length===0){html+='<div class="empty-state">暂无信用变动记录</div>';}else{html+='<div style="border-top:1px solid #eef2f8; padding-top:12px;">';for(const l of logs){html+=`<div style="padding:10px 0; border-bottom:1px solid #eef2f8;"><div>${l.reason}</div><div style="color:${l.change>0?'#059669':'#dc2626'};">${l.change>0?`+${l.change}`:l.change} 分</div><div style="font-size:0.75rem; color:#94a3b8;">${new Date(l.createdAt).toLocaleString()}</div></div>`;}html+='</div>';}container.innerHTML=html;}catch(e){container.innerHTML='<div class="empty-state">加载失败</div>';}}
let currentMyTasksType='pub';
async function navigateToMyTasks(type){currentMyTasksType=type;const titles={pub:'我发布的任务',acc:'我接取的任务',completed:'已完成的任务'};document.getElementById('myTasksTitle').innerText=titles[type]||'我的任务';document.getElementById('myTasksList').innerHTML='<div class="loading">加载中...</div>';switchPage('myTasks');await loadMyTasks(type);}
async function loadMyTasks(type){const listContainer=document.getElementById('myTasksList');try{const allTasks=await callApi('/tasks/all');let filtered=[];if(type==='pub'){filtered=allTasks.filter(t=>t.publisherId===currentUser.id&&t.status!=='cancelled');filtered.sort((a,b)=>(a.status==='ongoing'?0:1)-(b.status==='ongoing'?0:1));}else if(type==='acc'){filtered=allTasks.filter(t=>t.takerId===currentUser.id&&t.status!=='cancelled');filtered.sort((a,b)=>(a.status==='ongoing'?0:1)-(b.status==='ongoing'?0:1));}else if(type==='completed'){filtered=allTasks.filter(t=>(t.publisherId===currentUser.id||t.takerId===currentUser.id)&&t.status==='completed');filtered.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));}if(filtered.length===0){listContainer.innerHTML='<div class="empty-state">暂无任务</div>';return;}let html='';for(let task of filtered){let statusText='';let statusClass='';if(task.status==='available'){statusText='悬赏中';statusClass='available';}else if(task.status==='ongoing'){if(task.travelStatus==='idle')statusText='待出发';else if(task.travelStatus==='traveling')statusText='行程中';else if(task.travelStatus==='arrived')statusText='已到达，待凭证';else statusText='进行中';statusClass='ongoing';}else if(task.status==='completed'){statusText='已完成';statusClass='completed';}else statusText='已取消';let role='';if(task.publisherId===currentUser.id&&task.takerId)role='发布者';else if(task.takerId===currentUser.id)role='接取者';html+=`<div class="card" data-taskid="${task._id}" onclick="viewTask('${task._id}','myTasks')"><div class="task-header"><span class="task-title">${escapeHtml(task.title)}</span><span class="reward-badge">💰 ${task.reward}元</span></div><div class="task-desc">${escapeHtml((task.description||'').substring(0,60))}</div><div class="task-meta"><span>👤 ${escapeHtml(task.publisherName)}</span><span>📍 ${task.locationAddress||'未知'}</span><span class="distance-badge">${statusText}</span>${role?`<span class="distance-badge">${role}</span>`:''}</div></div>`;}listContainer.innerHTML=html;}catch(e){listContainer.innerHTML='<div class="empty-state">加载失败，请稍后重试</div>';}}

t updates={nickname:modal.querySelector('#editNickname').value.trim()||currentUser.username,signature:modal.querySelector('#editSignature').value,hometown:modal.querySelector('#editHometown').value,avatar:currentUser.avatar||''};const result=await callApi(`/user/${currentUser.id}`,{method:'PUT',body:JSON.stringify(updates)});if(result.success!==false){currentUser={...currentUser,...updates};localStorage.setItem('user',JSON.stringify(currentUser));loadProfile();showToast('保存成功');modal.remove();}else showAlert('保存失败','请重试');};modal.querySelector('#cancelEditBtn').onclick=()=>modal.remove();}

function logout(){showConfirm('确认退出','确定退出登录吗？',()=>{localStorage.removeItem('user');localStorage.removeItem('token');currentUser=null;document.getElementById('mainApp').style.display='none';document.getElementById('loginPage').classList.add('active');if(countdownTimer)clearInterval(countdownTimer);if(chatState.pollInterval)clearInterval(chatState.pollInterval);if(mediaRecorder&&isRecording){mediaRecorder.stop();isRecording=false;}if(window.__plusOutsideHandler){document.removeEventListener('click',window.__plusOutsideHandler);window.__plusOutsideHandler=null;}document.body.classList.remove('hide-bottom-nav');});}
async function publishTask(){if(!currentUser.idCardVerified){showAlert('提示','请先实名认证');return;}const title=document.getElementById('pubTitle').value.trim();if(!title){showAlert('提示','请输入标题');return;}const reward=parseFloat(document.getElementById('pubReward').value);if(isNaN(reward)||reward<=0){showAlert('提示','请输入有效金额');return;}const locationAddress=document.getElementById('pubAddress').value.trim()||'未知';const mediaList=pendingMedia.map(m=>({type:m.type,url:m.dataURL}));const btn=document.getElementById('doPublishBtn');const originalText=btn.innerText;btn.innerText='处理中...';btn.disabled=true;const modal=document.createElement('div');modal.className='custom-modal';const balance=currentUser.balance||0;const balanceEnough=balance>=reward;modal.innerHTML=`<div class="custom-modal-content"><h3>选择支付方式</h3><p style="font-size:.9rem;color:#64748b;margin-bottom:16px;">任务赏金 ¥${reward}</p><div class="payment-option ${!balanceEnough?'disabled':''}" data-pay="balance" style="${!balanceEnough?'opacity:0.5;pointer-events:none;':''}"><div class="icon">👛</div><div class="info"><div class="name">余额支付</div><div class="desc">当前余额 ¥${balance.toFixed(2)} ${!balanceEnough?'<span style="color:#dc2626;">（余额不足）</span>':''}</div></div><span style="font-size:1.2rem;">›</span></div><div class="payment-option" data-pay="wechat"><div class="icon">💚</div><div class="info"><div class="name">微信支付</div><div class="desc">推荐使用微信支付</div></div><span style="font-size:1.2rem;">›</span></div><div class="payment-option" data-pay="alipay"><div class="icon">💙</div><div class="info"><div class="name">支付宝</div><div class="desc">支付宝安全支付</div></div><span style="font-size:1.2rem;">›</span></div><div class="custom-modal-buttons"><button class="cancel-btn" id="payCancelBtn">取消</button></div></div>`;document.body.appendChild(modal);const closeModal=()=>{modal.remove();btn.innerText=originalText;btn.disabled=false;};modal.querySelector('#payCancelBtn').onclick=closeModal;const options=modal.querySelectorAll('.payment-option');options.forEach(opt=>{opt.addEventListener('click',async()=>{const method=opt.getAttribute('data-pay');if(method==='balance'){if(!balanceEnough){showAlert('余额不足','您的余额不足以支付此任务，请选择其他支付方式。');return;}showToast('余额支付成功');currentUser.balance-=reward;localStorage.setItem('user',JSON.stringify(currentUser));await doPublish(title,reward,locationAddress,mediaList);closeModal();}else if(method==='wechat'||method==='alipay'){const payName=method==='wechat'?'微信':'支付宝';const payModal=document.createElement('div');payModal.className='custom-modal';payModal.innerHTML=`<div class="custom-modal-content"><h3>${payName}支付</h3><p style="font-size:.9rem;color:#64748b;margin:12px 0;">订单金额：¥${reward}</p><p style="font-size:.9rem;color:#64748b;margin:12px 0;">订单号：${'ORD'+Date.now()}</p><div style="background:#f8fafc;padding:20px;border-radius:16px;margin:12px 0;"><div style="font-size:2rem;">${method==='wechat'?'💚':'💙'}</div><p style="font-size:.9rem;color:#1e293b;">请使用${payName}扫描二维码或打开${payName}支付</p></div><div class="custom-modal-buttons"><button class="confirm-btn" id="paySuccessBtn">模拟支付成功</button><button class="cancel-btn" id="payFailBtn">取消支付</button></div></div>`;document.body.appendChild(payModal);payModal.querySelector('#paySuccessBtn').onclick=async()=>{payModal.remove();showToast(payName+'支付成功');await doPublish(title,reward,locationAddress,mediaList);closeModal();};payModal.querySelector('#payFailBtn').onclick=()=>{payModal.remove();showToast('已取消支付');closeModal();};}});});}
async function doPublish(title,reward,locationAddress,mediaList){const btn=document.getElementById('doPublishBtn');btn.innerText='发布中...';btn.disabled=true;try{const result=await callApi('/tasks',{method:'POST',body:JSON.stringify({title,description:document.getElementById('pubDesc').value,reward,publisherName:currentUser.nickname,publisherPhone:currentUser.phone,locationAddress,mediaList,category:document.getElementById('pubCategory').value})});if(result._id){showToast('发布成功');resetPublishForm();await loadProfile();refreshTaskList(true);switchPage('home');}else{showAlert('发布失败',result.error||'未知错误');}}catch(err){showAlert('发布出错',err.message);}finally{btn.innerText='🚀 发布任务';btn.disabled=false;}}
function resetPublishForm(){document.getElementById('pubTitle').value='';document.getElementById('pubDesc').value='';document.getElementById('pubReward').value='';document.getElementById('pubAddress').value='';document.getElementById('pubCategory').value='取件';pendingMedia=[];updateMediaPreview();document.getElementById('locationHint').innerHTML='点击"选择位置"打开地图选点';}
async function cancelTask(taskId){showConfirm('确认取消','确定取消该任务吗？取消后赏金将退还到您的账户。',async()=>{try{const result=await callApi(`/tasks/${taskId}/cancel`,{method:'PUT',body:JSON.stringify({})});if(result.success){showToast('任务已取消，赏金已退还');await refreshTaskList(true);await loadProfile();if(document.getElementById('detailPage').classList.contains('active'))switchPage(lastPage||'home');}else showAlert('取消失败',result.error||'未知错误');}catch(err){showAlert('取消失败',err.message);}});}
async function doLogin(){const username=document.getElementById('loginUsername').value.trim();const password=document.getElementById('loginPassword').value;const errorDiv=document.getElementById('loginError');errorDiv.innerText='登录中...';try{const result=await callApi('/login',{method:'POST',body:JSON.stringify({username,password})});if(result.success){localStorage.setItem('token',result.token);currentUser=result.user;localStorage.setItem('user',JSON.stringify(currentUser));document.getElementById('mainApp').style.display='flex';document.getElementById('loginPage').classList.remove('active');const loc=await getNativeUserLocation();if(loc)userLocation=loc;await refreshTaskList(true);loadProfile();renderMessageList();updateUnreadBadge();const lastPage=localStorage.getItem('lastPage');if(lastPage&&['home','publish','message','profile','detail','myTasks','wallet','credit'].includes(lastPage)){switchPage(lastPage);}else{switchPage('home');}initBackButtonHandler();}else errorDiv.innerText=result.error||'登录失败';}catch(err){errorDiv.innerText=err.message;console.error('登录错误:',err);}}
function initBackButtonHandler(){if(window.Capacitor&&window.Capacitor.isNativePlatform()){const{App}=Capacitor.Plugins;App.addListener('backButton',()=>{handleBackButton();});}else{window.addEventListener('popstate',handleBackButton);}}
function handleBackButton(){const activePage=document.querySelector('.page.active');if(!activePage){if(window.Capacitor&&window.Capacitor.isNativePlatform()){Capacitor.Plugins.App.exitApp();}return;}const pageId=activePage.id;const pageStack=['home','publish','message','profile','detail','myTasks','wallet','credit'];const currentIndex=pageStack.indexOf(pageId);if(pageId==='home'||currentIndex===-1){if(backPressedOnce){if(window.Capacitor&&window.Capacitor.isNativePlatform()){Capacitor.Plugins.App.exitApp();}else{window.close();}}else{backPressedOnce=true;showToast('再按一次退出应用');setTimeout(()=>{backPressedOnce=false;},2000);}return;}if(pageId==='detail'){document.getElementById('detailBackBtn')?.click();}else if(pageId==='myTasks'){document.getElementById('myTasksBackBtn')?.click();}else if(pageId==='wallet'){document.getElementById('walletBackBtn')?.click();}else if(pageId==='credit'){document.getElementById('creditBackBtn')?.click();}else{switchPage('home');}backPressedOnce=false;}
async function startRecording(){const hasPerm=await requestMicrophonePermission();if(!hasPerm){showAlert('麦克风权限被拒绝','请前往手机设置 -> 应用管理 -> 赏金集市 -> 权限，开启麦克风权限');return;}try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});mediaRecorder=new MediaRecorder(stream);audioChunks=[];mediaRecorder.ondataavailable=event=>{audioChunks.push(event.data);};mediaRecorder.onstop=async()=>{const audioBlob=new Blob(audioChunks,{type:'audio/webm'});const file=new File([audioBlob],`audio_${Date.now()}.webm`,{type:'audio/webm'});try{showToast('上传语音中...',1500);const url=await uploadFile(file);await sendMessage(chatState.taskId,`[audio]${url}[/audio]`,false);await refreshMessagesOnly();updateUnreadBadge();}catch(err){showAlert('发送语音失败',err.message);}stream.getTracks().forEach(track=>track.stop());};mediaRecorder.start();isRecording=true;}catch(err){let msg='无法访问麦克风，请检查浏览器权限或在 HTTPS 环境下使用';if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError'){msg='麦克风权限被拒绝，请在浏览器设置中允许访问麦克风后重试';}else if(err.name==='NotFoundError'||err.name==='DevicesNotFoundError'){msg='未检测到麦克风设备';}showAlert('录音失败',msg);isRecording=false;}}
function stopRecordingAndSend(){if(mediaRecorder&&isRecording){mediaRecorder.stop();isRecording=false;}}
async function getRating(taskId){try{return await callApi(`/ratings/task/${taskId}/user/${currentUser.id}`);}catch(e){return null;}}
async function submitRating(taskId,toUserId,rating,comment){try{return await callApi('/ratings',{method:'POST',body:JSON.stringify({taskId,toUserId,rating,comment})});}catch(e){showAlert('评价失败',e.message);return null;}}
async function submitProof(taskId,proofFiles){const proofMedia=[];for(let file of proofFiles){const dataURL=await new Promise((resolve)=>{const reader=new FileReader();reader.onload=(e)=>resolve(e.target.result);reader.readAsDataURL(file);});proofMedia.push({type:file.type.startsWith('image/')?'image':'video',url:dataURL});}const result=await callApi(`/tasks/${taskId}/submit-proof`,{method:'POST',body:JSON.stringify({userId:currentUser.id,proofMedia})});return result;}
async function chooseProofFiles(){return new Promise((resolve)=>{const modal=document.createElement('div');modal.className='custom-modal';modal.innerHTML=`<div class="custom-modal-content"><h3>选择凭证</h3><div style="display:flex; flex-direction:column; gap:12px;"><button class="btn-primary" id="takePhotoBtn">📷 拍照</button><button class="btn-primary" id="chooseFromAlbumBtn" style="background:#3b82f6;">📁 从相册选择</button><button class="btn-secondary" id="cancelChoose">取消</button></div></div>`;document.body.appendChild(modal);const takePhotoBtn=modal.querySelector('#takePhotoBtn');const albumBtn=modal.querySelector('#chooseFromAlbumBtn');const cancelBtn=modal.querySelector('#cancelChoose');const cleanup=()=>modal.remove();takePhotoBtn.onclick=()=>{cleanup();const input=document.createElement('input');input.type='file';input.accept='image/*,video/*';input.setAttribute('capture','environment');input.onchange=(e)=>{const files=Array.from(e.target.files);resolve(files);};input.click();};albumBtn.onclick=()=>{cleanup();const input=document.createElement('input');input.type='file';input.accept='image/*,video/*';input.onchange=(e)=>{const files=Array.from(e.target.files);resolve(files);};input.click();};cancelBtn.onclick=()=>{cleanup();resolve([]);};});}
function showImagePreview(url){const modal=document.createElement('div');modal.className='image-preview-modal';modal.innerHTML=`<div class="close-preview">✕</div><img src="${url}">`;document.body.appendChild(modal);modal.querySelector('.close-preview').onclick=()=>modal.remove();modal.onclick=(e)=>{if(e.target===modal)modal.remove();};}
async function navigateTo(lat,lng,address){const destName=encodeURIComponent(address||'目的地');let url='';if(/iphone|ipad|ipod/i.test(navigator.userAgent)){url=`iosamap://navi?sourceApplication=赏金集市&poiname=${destName}&lat=${lat}&lon=${lng}&dev=0&style=2`;}else if(/android/i.test(navigator.userAgent)){url=`androidamap://navi?sourceApplication=赏金集市&poiname=${destName}&lat=${lat}&lon=${lng}&dev=0&style=2`;}else{url=`https://uri.amap.com/navigation?to=${lng},${lat},${destName}&mode=car&callnative=1`;}window.location.href=url;setTimeout(()=>{if(document.hasFocus()){window.location.href=`https://uri.amap.com/navigation?to=${lng},${lat},${destName}&mode=car&callnative=1`;}},2500);}
function compressImage(file,quality=0.5,maxWidth=600,maxHeight=600){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.readAsDataURL(file);reader.onload=(e)=>{const img=new Image();img.src=e.target.result;img.onload=()=>{const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');let width=img.width,height=img.height;if(width>height){if(width>maxWidth){height*=maxWidth/width;width=maxWidth;}}else{if(height>maxHeight){width*=maxHeight/height;height=maxHeight;}}canvas.width=width;canvas.height=height;ctx.drawImage(img,0,0,width,height);const dataUrl=canvas.toDataURL('image/jpeg',quality);resolve(dataUrl);};img.onerror=reject;};reader.onerror=reject;});}
async function handleMediaFiles(files){let remain=3-pendingMedia.length;if(files.length>remain){showAlert('提示',`最多上传3个，当前已有${pendingMedia.length}个`);files=Array.from(files).slice(0,remain);}for(let file of files){if(!file.type.startsWith('image/')&&!file.type.startsWith('video/'))continue;let dataURL;if(file.type.startsWith('image/')){dataURL=await compressImage(file);}else{dataURL=await new Promise((resolve)=>{const reader=new FileReader();reader.onload=(e)=>resolve(e.target.result);reader.readAsDataURL(file);});}pendingMedia.push({type:file.type.startsWith('image/')?'image':'video',dataURL,file});updateMediaPreview();}document.getElementById('mediaInput').value='';}
function updateMediaPreview(){const container=document.getElementById('mediaPreview');if(!container)return;if(pendingMedia.length===0){container.innerHTML='';return;}container.innerHTML=pendingMedia.map((m,idx)=>`<div class="preview-img-wrapper">${m.type==='image'?`<img src="${m.dataURL}">`:`<video src="${m.dataURL}" style="width:100%;height:100%;object-fit:cover;"></video>`}<div class="remove-img-btn" data-index="${idx}">✕</div></div>`).join('');document.querySelectorAll('#mediaPreview .remove-img-btn').forEach(btn=>{btn.onclick=(e)=>{const idx=parseInt(btn.getAttribute('data-index'));pendingMedia.splice(idx,1);updateMediaPreview();};});}
function initSearchAndFilter(){const searchToggle=document.getElementById('searchToggleBtn');const searchPanel=document.getElementById('searchPanel');const searchClose=document.getElementById('searchCloseBtn');const searchInput=document.getElementById('searchInput');searchToggle.addEventListener('click',()=>{searchPanel.classList.toggle('show');if(searchPanel.classList.contains('show')){searchInput.focus();}});searchClose.addEventListener('click',()=>{searchPanel.classList.remove('show');searchInput.value='';filterKeyword='';applyFilterAndSort();});document.addEventListener('click',(e)=>{if(!e.target.closest('.category-bar')&&!e.target.closest('.search-panel')){searchPanel.classList.remove('show');}});searchInput.addEventListener('input',(e)=>{filterKeyword=e.target.value.trim();updateFilterStatus();applyFilterAndSort();});const filterToggle=document.getElementById('filterToggleBtn');const filterOverlay=document.getElementById('filterOverlay');const filterPanel=document.getElementById('filterPanel');filterToggle.addEventListener('click',(e)=>{e.stopPropagation();searchPanel.classList.remove('show');filterOverlay.classList.toggle('show');const sortBar=document.getElementById('sortBar');const rect=sortBar.getBoundingClientRect();const top=rect.bottom+window.scrollY;const left=rect.right-180;filterPanel.style.top=top+'px';filterPanel.style.left=Math.max(10,left)+'px';});filterOverlay.addEventListener('click',()=>{filterOverlay.classList.remove('show');});filterPanel.addEventListener('click',(e)=>e.stopPropagation());document.querySelectorAll('.dist-option[data-dist]').forEach(el=>{el.addEventListener('click',()=>{const dist=parseFloat(el.getAttribute('data-dist'));filterDistance=dist;updateFilterStatus();applyFilterAndSort();filterOverlay.classList.remove('show');});});document.getElementById('applyCustomDist').addEventListener('click',()=>{const input=document.getElementById('customDistInput');const val=parseFloat(input.value);if(!isNaN(val)&&val>0){filterDistance=val;updateFilterStatus();applyFilterAndSort();filterOverlay.classList.remove('show');input.value='';}else{showAlert('提示','请输入有效距离（公里）');}});document.getElementById('resetFilterBtn').addEventListener('click',()=>{filterDistance=null;filterKeyword='';searchInput.value='';updateFilterStatus();applyFilterAndSort();filterOverlay.classList.remove('show');});}
function initPullToRefresh(){const homePage=document.getElementById('homePage');let startY=0,isRefreshing=false;const indicator=document.getElementById('refreshIndicator');homePage.addEventListener('touchstart',(e)=>{if(homePage.scrollTop===0)startY=e.touches[0].clientY;});homePage.addEventListener('touchmove',(e)=>{if(isRefreshing||homePage.scrollTop>0)return;const diff=e.touches[0].clientY-startY;if(diff>30){e.preventDefault();indicator.style.display='block';indicator.style.transform=`translateY(${Math.min(diff-30,60)}px)`;}});homePage.addEventListener('touchend',async()=>{if(indicator.style.display==='block'){indicator.style.transform='';indicator.style.display='none';isRefreshing=true;indicator.innerText='刷新中...';indicator.style.display='block';await refreshTaskList(true);isRefreshing=false;indicator.style.display='none';indicator.innerText='↓ 下拉刷新';}});}
function initMessagePullToRefresh(){const container=document.getElementById('messageContainer');const wrapper=document.getElementById('messageListWrapper');const indicator=document.getElementById('msgPullIndicator');if(!container||!wrapper||!indicator)return;let startY=0,isRefreshing=false,isPulling=false;container.addEventListener('touchstart',(e)=>{if(container.scrollTop<=0&&!isRefreshing){startY=e.touches[0].clientY;isPulling=true;}},{passive:true});container.addEventListener('touchmove',(e)=>{if(!isPulling||isRefreshing)return;const diff=e.touches[0].clientY-startY;if(diff>30){e.preventDefault();indicator.style.display='block';indicator.style.transform=`translateY(${Math.min(diff-30,60)}px)`;indicator.innerText='松开刷新';}else{indicator.style.transform='';indicator.innerText='↓ 下拉刷新';}},{passive:false});container.addEventListener('touchend',async()=>{isPulling=false;if(indicator.style.display==='block'&&indicator.style.transform!==''){isRefreshing=true;indicator.innerText='刷新中...';indicator.style.transform='';await renderMessageList();isRefreshing=false;indicator.style.display='none';indicator.innerText='↓ 下拉刷新';showToast('消息已刷新');}else{indicator.style.display='none';indicator.style.transform='';indicator.innerText='↓ 下拉刷新';}},{passive:true});}
function initFiltersAndCategories(){document.querySelectorAll('.category-chip').forEach(chip=>{chip.addEventListener('click',()=>{document.querySelectorAll('.category-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');currentCategory=chip.getAttribute('data-cat');applyFilterAndSort();});});document.querySelectorAll('.sort-chip').forEach(chip=>{chip.addEventListener('click',()=>{document.querySelectorAll('.sort-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');currentSort=chip.getAttribute('data-sort');applyFilterAndSort();});});}
document.addEventListener('DOMContentLoaded',()=>{initPullToRefresh();initFiltersAndCategories();initSearchAndFilter();initMessagePullToRefresh();document.getElementById('walletBackBtn').addEventListener('click',()=>switchPage('profile'));document.getElementById('creditBackBtn').addEventListener('click',()=>switchPage('profile'));document.getElementById('openMapBtn').addEventListener('click',openMapModal);document.getElementById('mapCancelBtn').addEventListener('click',closeMapModal);document.getElementById('mapConfirmBtn').addEventListener('click',confirmLocation);document.getElementById('myTasksBackBtn').addEventListener('click',()=>{switchPage('profile');loadProfile();});document.getElementById('doLoginBtn').onclick=doLogin;document.getElementById('doRegisterBtn').onclick=async()=>{const username=document.getElementById('regUsername').value.trim();const password=document.getElementById('regPassword').value;const confirm=document.getElementById('regConfirmPwd').value;const nickname=document.getElementById('regNickname').value.trim();const phone=document.getElementById('regPhone').value.trim();if(!username||!password){showAlert('提示','请填写用户名和密码');return;}if(password!==confirm){showAlert('提示','两次密码不一致');return;}try{const result=await callApi('/register',{method:'POST',body:JSON.stringify({username,password,nickname,phone})});if(result.success){showToast('注册成功，请登录');document.getElementById('registerPage').classList.remove('active');document.getElementById('loginPage').classList.add('active');}else showAlert('注册失败',result.error);}catch(err){showAlert('注册失败',err.message);}};document.getElementById('doPublishBtn').onclick=publishTask;document.getElementById('showRegisterBtn').onclick=(e)=>{e.preventDefault();document.getElementById('loginPage').classList.remove('active');document.getElementById('registerPage').classList.add('active');};document.getElementById('showLoginBtn').onclick=(e)=>{e.preventDefault();document.getElementById('registerPage').classList.remove('active');document.getElementById('loginPage').classList.add('active');};document.getElementById('mediaInput')?.addEventListener('change',(e)=>{if(e.target.files.length)handleMediaFiles(e.target.files);});if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').then(()=>console.log('SW registered')).catch(err=>console.warn('SW registration failed:',err));}if(window.Capacitor&&window.Capacitor.isNativePlatform()){setTimeout(()=>{initBackButtonHandler();},500);}else{initBackButtonHandler();}});
(async()=>{const savedUser=localStorage.getItem('user');if(savedUser&&localStorage.getItem('token')){currentUser=JSON.parse(savedUser);document.getElementById('mainApp').style.display='flex';document.getElementById('loginPage').classList.remove('active');const loc=await getNativeUserLocation();if(loc)userLocation=loc;const cached=localStorage.getItem('tasksCache');if(cached){try{const parsed=JSON.parse(cached);if(parsed.data&&(Date.now()-parsed.timestamp)<parsed.ttl){tasksCache=parsed;allTasks=parsed.data;applyFilterAndSort();}}catch(e){}}refreshTaskList(false);loadProfile();renderMessageList();updateUnreadBadge();const lastPage=localStorage.getItem('lastPage');if(lastPage&&['home','publish','message','profile','detail','myTasks','wallet','credit'].includes(lastPage)){switchPage(lastPage);}else{switchPage('home');}if(window.Capacitor&&window.Capacitor.isNativePlatform()){setTimeout(()=>{initBackButtonHandler();},300);}}})();
</script>
